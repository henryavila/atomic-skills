version: '0.3'

# Optional callout rendered under `## Skills` as a versioned `> Note`.
# Version string is pulled from package.json automatically; only the body
# text lives here. Leave the block out entirely to suppress the note.
release_highlight:
  body: |
    First major bump since 1.8.x. Review skills consolidated from 4 → 2 (`review-plan` + `review-code`) with a Step 0 mode picker (`local` | `codex` | `both`). `project-status` + `project-plan` unified into a single `project` skill — a thin router with lazy-loaded detail files (git-style subcommands, a `verify` reconciliation command, and the aiDeck contract quarantined behind one constant). Catalog moved to schema v0.2 and was renamed to `meta/catalog.yaml`. README + dashboard are now generated from five marker-bounded regions; husky pre-commit auto-regenerates on staged catalog changes.
    See [CHANGELOG.md](CHANGELOG.md) for the full migration matrix.

product:
  what_is: >
    Battle-tested skill prompts that make AI coding agents follow through —
    each skill encodes one hard-won workflow behind Iron Laws and HARD-GATEs
    so "the agent should do X" becomes "the agent will not proceed without X."
  what_is_not:
    - A copy-paste prompt pack or chat snippet library
    - A replacement for your IDE, model, or git workflow
    - An engineering archive of plans, audits, or design notes
    - A claim that every host adapter is day-to-day tested (only Claude Code, Cursor, Codex, and Grok Build are)
  docs_url: 'https://atomic-skills.henryavila.com'
  install:
    primary: 'npx @henryavila/atomic-skills install'

core:
  fix:
    name: fix
    title: 'Fix — Root Cause + TDD'
    description: 'Root cause diagnosis + TDD fix. Use when you find a bug or unexpected behavior.'
    value_pitch: >
      AI agents love to jump to fixes — patch the first plausible line,
      declare victory, ship the regression. `fix` forces the detective path
      instead: reproduce the failure, trace it to the exact root cause, write
      a test that fails for that reason, *then* fix. The reproducing test
      stays in the suite — so the bug it caught can never silently return.
    purpose: >
      Find the true root cause of a bug, prove it with a failing test, then
      make the minimal fix — a detective's process, not a firefighter's. The
      reproducing test outlives the fix and guards against regression.
    when_to_use:
      - 'You observed a bug or unexpected behavior'
      - 'A test is failing for unclear reasons'
      - 'A regression appeared after a recent change'
    when_not_to_use:
      - 'You want to add a new feature (use prompt)'
      - 'The issue is in design, not implementation'
      - 'You have no symptom to reproduce'
    examples:
      - command: '/atomic-skills:fix "duplicates in /musicas listing"'
        description: 'Diagnose and fix with provided symptom'
      - command: '/atomic-skills:fix'
        description: 'Skill prompts you for the symptom interactively'
    related: [hunt, review-code]
    tags: [quality, debugging, tdd, core]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: false
    mutates_repo: true
    network_required: false
    one_liner: 'Diagnose root cause → write test → fix → verify'
    emoji: '🔧'
    version_added: '1.0.0'
    argument_hint: '[symptom]'
    args:
      - name: symptom
        kind: positional
        required: false
        description: 'Observed bug or unexpected behavior. If omitted, skill prompts interactively.'
    dependencies: [git]
    iron_law: 'NO FIX WITHOUT ROOT CAUSE.'
    schema_version: '0.2'

  save-and-push:
    name: save-and-push
    title: 'Save & Push — Commit + Memory + Push'
    description: 'Review conversation, save learnings to memory, commit and push work.'
    value_pitch: >
      Ending a session sloppily means a leaked `.env`, one giant unrelated
      blob commit, and learnings lost to context death. `save-and-push`
      scans the diff for secrets and sensitive files before staging, groups
      changes into logical commits (never `git add .`), persists durable
      learnings to memory, and refuses to push to main/master without
      confirmation. The next session resumes with clean history and context
      intact.
    purpose: >
      Close out a work session safely: extract durable learnings to memory,
      scan the diff for secrets, group changes into logical commits with
      conventional messages, and push — refusing to touch main/master
      without explicit confirmation.
    when_to_use:
      - 'You finished a coherent piece of work'
      - 'About to switch context or end the session'
      - 'You want learnings persisted before forgetting'
    when_not_to_use:
      - 'Work in progress, not yet a coherent commit'
      - 'Tests still failing'
      - 'You only want to commit (use git directly)'
    examples:
      - command: '/atomic-skills:save-and-push'
        description: 'Full flow: memory + commits + push'
    related: [project, init-memory]
    tags: [workflow, git, memory, core]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: false
    mutates_repo: true
    network_required: true
    one_liner: 'Scan for secrets, group commits, save learnings, push safely'
    emoji: '💾'
    version_added: '1.0.0'
    dependencies: [git]
    iron_law: 'NO PUSH WITHOUT FRESH VERIFICATION.'
    schema_version: '0.2'

  review-plan:
    name: review-plan
    title: 'Review Plan — Adversarial (Local + Codex)'
    description: 'Adversarial review of an implementation plan. Step 0 picks mode: local self-loop, codex cross-model envelope, or both (local first → codex on cleaned plan). Optional cross-reference against external artifacts.'
    value_pitch: >
      A plan reviewed by its own author inherits every blind spot that wrote
      it — the gaps read as completeness from the inside. `review-plan` runs
      adversarial passes that actively hunt for what's missing: a fast local
      self-loop, a cross-model codex envelope that can't see your intent, or
      both. It surfaces the unhandled edge case, the optimistic assumption,
      and the silent dependency *before* execution turns them into rework —
      and never approves without cited evidence.
    purpose: >
      Adversarially review an implementation plan before it runs — locally
      (fast, cheap), via a cross-model codex envelope (~$1-2), or both
      (default: local first, then codex on the cleaned plan in a sealed
      envelope) — hunting for gaps, missing edge cases, and optimistic
      assumptions, and approving only on cited evidence. Optionally
      cross-references the plan against its source PRD/spec.
    when_to_use:
      - 'You finished writing a plan and want a structural review'
      - 'Significant plan about to enter execution (both mode recommended)'
      - 'Cross-model bug hunt against self-preference bias (codex or both)'
      - 'Plan was derived from a PRD/spec and you want coverage verification'
    when_not_to_use:
      - 'Plan is still brainstorming (not structured yet)'
      - 'Trivial plan (skip review entirely)'
      - 'Codex CLI not installed and you need codex mode (use --mode=local)'
    examples:
      - command: '/atomic-skills:review-plan docs/plans/migration.md'
        description: 'Interactive picker — chooses mode + cross-ref'
      - command: '/atomic-skills:review-plan docs/plans/migration.md --mode=local'
        description: 'Force local-only self-loop'
      - command: '/atomic-skills:review-plan docs/plans/migration.md --mode=both'
        description: 'Local then codex (sealed envelope)'
    related: [review-code]
    tags: [review, planning, adversarial, cross-model]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: true
    mutates_repo: true
    network_required: true
    one_liner: 'Adversarial plan review with local/codex/both mode picker'
    emoji: '🔍'
    version_added: '2.0.0'
    argument_hint: '<plan.md> [--mode=local|codex|grok|claude|both*|ext-both] [--model=ID|--ask-model] [xref flags]'
    args:
      - name: plan-path
        kind: positional
        required: true
        description: 'Path to the plan markdown file under review.'
      - name: '--mode'
        kind: option
        required: false
        description: 'Force a review mode (local, codex, grok, both*, external-both, or the v2.x alias internal). Skips the Step 0a picker.'
      - name: '--model'
        kind: option
        required: false
        description: 'Force external reviewer model id (skips model picker). Use cli-default for empty --model flag. Also --model-codex / --model-grok / --ask-model.'
      - name: '--ask-model'
        kind: flag
        required: false
        description: 'Prefer the catalog-recommended model for the external provider.'
      - name: '--no-cross-ref'
        kind: flag
        required: false
        description: 'Skip the Step 0b cross-ref picker; force internal-only.'
      - name: '--cross-ref'
        kind: option
        required: false
        description: 'Comma-separated list of artifact paths to cross-reference against. Skips the picker.'
      - name: '--artifacts'
        kind: option
        required: false
        description: 'Alias of --cross-ref (compat with v2.x).'
      - name: '--allow-dirty'
        kind: flag
        required: false
        description: 'Pass through to the codex pre-flight; suppresses the dirty-tree abort.'
    output_artifacts:
      - '.atomic-skills/reviews/YYYY-MM-DD-HHMM-<slug>.md (codex/both modes)'
      - '.atomic-skills/reviews/INDEX.md'
    dependencies: [codex, git]
    iron_law: 'NO APPROVAL WITHOUT EVIDENCE.'
    schema_version: '0.2'

  review-code:
    name: review-code
    title: 'Review Code — Adversarial (Local + Codex)'
    description: 'Adversarial review of code changes given a git ref (branch, commit, or range), a scope keyword (wip | branch | all), or no argument (interactive scope picker over uncommitted work and branch commits). Step 0 picks mode: local self-loop, codex cross-model envelope, or both (local first → codex on the same captured diff).'
    value_pitch: >
      Reviewing your own diff in the same context that wrote it inherits
      every blind spot and rationalization. `review-code` captures the diff
      once and hands it to a sealed reviewer with clean context — locally,
      cross-model via codex, or both — stripped of commit messages and intent
      so framing can't suppress findings. Every finding cites file:line; no
      evidence, no approval.
    purpose: >
      Adversarially review code changes — a git ref (branch, commit, range),
      a scope keyword (wip = uncommitted work, branch = merge-base..HEAD,
      all = both), or no argument for an interactive scope picker — in clean
      context, with every finding tied to a file:line and no approval without
      evidence. Mode picker: local (fast, cheap), codex (cross-model via the
      OpenAI Codex CLI, ~$1-2), or both (default: local first, then codex on
      the byte-identical captured diff in a sealed envelope).
    when_to_use:
      - 'You finished a coherent code change'
      - 'You just implemented something and it is still uncommitted (wip scope)'
      - 'Significant change about to merge (both mode recommended)'
      - 'Critical path (auth, payments, data integrity) — both mode'
      - 'Cheap pre-merge sanity check (local mode)'
    when_not_to_use:
      - 'Nothing to review (clean tree, no commits ahead of base)'
      - 'Trivial change already heavily reviewed'
      - 'Codex CLI not installed and you need codex mode (use --mode=local)'
    examples:
      - command: '/atomic-skills:review-code'
        description: 'No argument — picks scope (wip/branch/all) then mode'
      - command: '/atomic-skills:review-code wip --mode=local'
        description: 'Review uncommitted work, local-only self-loop'
      - command: '/atomic-skills:review-code feat/new-feature --mode=local'
        description: 'Force local-only self-loop'
      - command: '/atomic-skills:review-code main..HEAD --mode=both'
        description: 'Local then codex (sealed envelope)'
    related: [review-plan, fix, hunt]
    tags: [review, code, adversarial, cross-model]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: false
    mutates_repo: true
    network_required: true
    one_liner: 'Adversarial code review with local/codex/both mode picker'
    emoji: '🔬'
    version_added: '2.0.0'
    argument_hint: '[ref|wip|branch|all] [--mode=local|codex|grok|claude|both*|ext-both] [--model=ID|--ask-model]'
    args:
      - name: git-ref
        kind: positional
        required: false
        description: 'Git ref (branch, commit, a..b / a...b) or scope keyword: wip (uncommitted), branch (merge-base..HEAD), all (both). Empty → interactive scope picker.'
      - name: '--mode'
        kind: option
        required: false
        description: 'Force a review mode (local, codex, grok, both*, external-both). Skips the Step 0 picker.'
      - name: '--model'
        kind: option
        required: false
        description: 'Force external reviewer model id (skips model picker). Use cli-default for empty --model flag. Also --model-codex / --model-grok / --ask-model.'
      - name: '--ask-model'
        kind: flag
        required: false
        description: 'Prefer the catalog-recommended model for the external provider.'
      - name: '--allow-dirty'
        kind: flag
        required: false
        description: 'Include working-tree changes in the captured diff; suppresses the dirty-tree abort.'
    output_artifacts:
      - '.atomic-skills/reviews/YYYY-MM-DD-HHMM-<slug>.md (codex/both modes)'
      - '.atomic-skills/reviews/INDEX.md'
    dependencies: [codex, git]
    iron_law: 'NO APPROVAL WITHOUT EVIDENCE.'
    schema_version: '0.2'

  project:
    name: project
    title: 'Project — Plan / Initiative / Task Tracking'
    description: "Single entry-point for Plan/Initiative/Task state in .atomic-skills/, git-style subcommands with lazy-loaded detail. View (compact + browser dashboard), daily mutations (push/pop, park/emerge, promote, done, phase transitions, archive), creation (new plan/initiative), discover/adopt/migrate, scope-creep + codex review tracking, and a state-vs-code verify. Fuses the former project-status + project-plan skills."
    value_pitch: >
      Resume a multi-day project and the agent has forgotten which phase
      you're in, what's parked, and why a task exists. `project` keeps
      Plan/Initiative/Task state in `.atomic-skills/` so every session
      reloads the exact frame — stack frames for side-investigations,
      an emergence ladder that classifies new work before it lands, exit
      gates that block advancing until criteria are met, and scope-creep
      detection. One git-style command for the whole lifecycle: view,
      create, mutate, discover, migrate, verify.
    purpose: >
      Track work via a Plan/Initiative/Task hierarchy through one
      thin-router skill: view current state (compact terminal or browser
      dashboard), create plans/initiatives, run daily mutations and phase
      transitions, discover in-flight work, adopt existing markdown plans,
      migrate legacy state, report drift, and reconcile state against code.
      Procedures load on demand from project-assets per subcommand.
    when_to_use:
      - 'Resuming after a break — view current state (`status`)'
      - 'Starting a new multi-phase plan (`new plan`) or initiative (`new initiative`)'
      - 'Daily mutations: push/pop, park/emerge, promote, done, phase-done'
      - 'Organizing in-flight work scattered across repo (`discover`)'
      - 'Capturing an existing markdown plan (`adopt`)'
      - 'Migrating legacy state files (`migrate`)'
      - 'Checking drift / un-reviewed code / state-vs-code coherence (`scope-creep`, `verify`)'
    when_not_to_use:
      - 'One-shot questions or work that fits in the current session'
      - 'Editing .atomic-skills/ files by hand (use the subcommands — they set provenance + validate)'
    examples:
      - command: '/atomic-skills:project'
        description: 'Compact 5-line summary of the active plan/initiative'
      - command: '/atomic-skills:project status --browser'
        description: 'Open the aiDeck dashboard'
      - command: '/atomic-skills:project new plan v3-redesign'
        description: 'Bootstrap a new multi-phase Plan (7-stage flow)'
      - command: '/atomic-skills:project done T-005'
        description: 'Close a task (triggers phase-completion check if last)'
      - command: '/atomic-skills:project verify'
        description: 'Reconcile .atomic-skills/ state against the code'
    related: [fix, save-and-push, review-plan]
    tags: [tracking, anchoring, planning, bootstrap, create, migrate, core]
    ide_compatibility: [claude-code, gemini, cursor, codex, opencode, github-copilot]
    requires_args: false
    mutates_repo: true
    network_required: true
    # Grammar-order prefix (≤120 chars). Full subcommand index is `subcommands[]`
    # below; this string is what Claude Code + Grok Build show in slash autocomplete.
    argument_hint: '[status|help|verify|review|new|idea|materialize|done|phase-done|finalize|reconcile|…]'
    one_liner: 'Plan / Initiative / Task state your agent reloads every session'
    emoji: '📊'
    version_added: '1.5.0'
    subcommands:
      - name: status
        group: 'View'
        signature: '[--browser|--terminal|--list|--plan|--phase|--stack|--archived|--report]'
        description: 'View current state: compact summary, browser dashboard, full terminal view, or filtered tables'
        example: '/atomic-skills:project status --browser'
      - name: help
        group: 'View'
        signature: '[--html]'
        description: 'Terminal GPS: where am I + the next concrete step, derived from real state; lifecycle-order blockers surface predecessor commands before archive/teardown (alias: next; --html opens the visual guide)'
        example: '/atomic-skills:project help'
      - name: verify
        group: 'View'
        signature: '[--fix] [--slug <slug>]'
        description: 'Reconcile .atomic-skills/ against the repo: schema, legacy-layout, branch match, scope coverage, orphans, aiDeck coherence (read-only unless --fix)'
        example: '/atomic-skills:project verify'
      - name: new
        group: 'Create'
        signature: '[plan|initiative] <slug>'
        description: 'Create a Plan (multi-phase bootstrap) or an Initiative (standalone or anchored to a phase); bare `new` prints the menu'
        example: '/atomic-skills:project new plan v3-redesign'
      - name: discover
        group: 'Create'
        signature: '[--dry-run|--commit] [--scope=<list>] [--scan=<path>]'
        description: 'Scan the repo (git, PRs, docs, roadmaps, memory), cluster signals, and propose Plans + Initiatives for approve/reject'
        example: '/atomic-skills:project discover'
      - name: adopt
        group: 'Create'
        signature: '<file.md>'
        description: 'Capture an existing free-form markdown plan into structured Plan + Initiatives + Tasks; previews before materializing'
        example: '/atomic-skills:project adopt docs/plans/v3-redesign/00-master.md'
      - name: push
        group: 'Stack frames'
        signature: '<description>'
        description: 'Open a lateral stack frame on top of the current work; type is inferred from the verb'
        example: '/atomic-skills:project push "investigating slow query"'
      - name: pop
        group: 'Stack frames'
        signature: '[--resolve|--park|--emerge]'
        description: 'Close the top frame with a destination: --resolve (drop), --park (note), or --emerge (follow-up)'
        example: '/atomic-skills:project pop --park'
      - name: park
        group: 'Backlog'
        signature: '<description>'
        description: 'File a low-commitment note for later into parked[]; ratify gate forces a readable solves/trigger'
        example: '/atomic-skills:project park "consider caching layer"'
      - name: emerge
        group: 'Backlog'
        signature: '<description>'
        description: 'File a real follow-up into emerged[] (same ratify gate); --target <phaseId> lands it in another phase'
        example: '/atomic-skills:project emerge "auth refactor needed"'
      - name: promote
        group: 'Backlog'
        signature: '<title-or-idx>'
        description: 'Turn a parked item into a real task (assigns next T-NNN, carries its context forward)'
        example: '/atomic-skills:project promote 2'
      - name: idea
        group: 'Backlog'
        signature: '[list | promote <n>]'
        description: 'Capture a raw idea into the ideas.md inbox (fork: just save / analyze); `idea list` is a zero-token view; `idea promote <n>` routes idea #n through the emergence ladder (ratify-gated)'
        example: '/atomic-skills:project idea list'
      - name: done
        group: 'Tasks & phases'
        signature: '<task-id>'
        description: 'Mark a task done and stamp closedAt; if it was the last open task, surfaces phase-done or archive'
        example: '/atomic-skills:project done T-005'
      - name: reconcile
        group: 'Tasks & phases'
        signature: ''
        description: 'Dispose tasks/gates that look done in the repo — the only detection-drift-triggered completion-mutation path (done stays task closure authority); verifier-aware (Run verifier when one exists, Mark done only when verifier-absent); never silent auto-close'
        example: '/atomic-skills:project reconcile'
      - name: materialize
        group: 'Tasks & phases'
        signature: '<phase-id>'
        description: 'Turn a descriptor-only phase into a full initiative file, capturing the businessIntent spine (value/workflow/rules/outOfScope/doneWhen) at a HARD gate — the bridge from a decomposed plan to `implement`'
        example: '/atomic-skills:project materialize F1'
      - name: unblock
        group: 'Tasks & phases'
        signature: '<task-id>'
        description: 'Return a blocked task to workable state (does NOT close it) — the documented forward exit from `blocked`; surfaces blockedBy[] blockers and their status first'
        example: '/atomic-skills:project unblock T-006'
      - name: phase-done
        group: 'Tasks & phases'
        signature: ''
        description: 'Verify every exit-gate criterion via its verifier, run a mandatory code review, then advance currentPhase'
        example: '/atomic-skills:project phase-done'
      - name: phase-reopen
        group: 'Tasks & phases'
        signature: '[<phase-id>]'
        description: 'Reverse a phase-done: restore the initiative to active, clear metAt on criteria, reset tasks to pending'
        example: '/atomic-skills:project phase-reopen F2'
      - name: split-phase
        group: 'Tasks & phases'
        signature: '<id>'
        description: 'Split an over-sized phase into sub-phases, moving tasks (preserving provenance); archives the original as archived, not done'
        example: '/atomic-skills:project split-phase F2'
      - name: finalize
        group: 'Lifecycle'
        signature: '<slug>'
        description: 'Publish the finished plan branch as a PR: push plan/<slug> + gh pr create --base <integrationRef>, record the PR url in plan state; requires explicit slug and runs before merge/archive'
        example: '/atomic-skills:project finalize v3-redesign'
      - name: consolidate
        group: 'Lifecycle'
        signature: ''
        description: 'Merge-train integrate the READY plans across ≥2 live worktrees into ONE integration branch + PR (the 1:N counterpart to finalize): typed-allowlist conflict policy, revert-of-revert for merged-then-reverted heads, eject-and-continue HALT; operator-prompted (<2 live worktrees = no-op → use finalize)'
        example: '/atomic-skills:project consolidate'
      - name: archive
        group: 'Lifecycle'
        signature: '[<slug>]'
        description: 'Move a finished plan or initiative to archive/ after lifecycle-order guard confirms finalize/merge/integration; archiving a plan cascades to its child initiatives'
        example: '/atomic-skills:project archive v3-redesign'
      - name: switch
        group: 'Lifecycle'
        signature: '<slug>'
        description: 'Pause the current plan/initiative and activate the target; offers to switch the plan too if it differs'
        example: '/atomic-skills:project switch my-feature'
      - name: migrate
        group: 'Lifecycle'
        signature: '[<slug>]'
        description: 'Two modes: `migrate <slug>` converts a legacy (pre-0.1) initiative to schemaVersion 0.1 (field-mapping diff + placeholder flags); bare `migrate` runs the flat→projects/<id>/<slug>/ layout cut-over (deterministic copy-verify-delete behind a tar snapshot)'
        example: '/atomic-skills:project migrate'
      - name: re-bootstrap
        group: 'Lifecycle'
        signature: '<slug>'
        description: 'After migrate: batch re-articulate every parked/emerged item still holding a placeholder into real ratified context'
        example: '/atomic-skills:project re-bootstrap sample-legacy'
      - name: why
        group: 'Context & drift'
        signature: '<id>'
        description: 'Read-only deep view of one item: status, ratified solves/trigger/assumptions, provenance, staleness'
        example: '/atomic-skills:project why T-005'
      - name: re-ratify
        group: 'Context & drift'
        signature: '<id>'
        description: 'Refresh a stale item: re-confirm the premises (bump review date) or rewrite solves/trigger/assumptions'
        example: '/atomic-skills:project re-ratify P-3'
      - name: scope-creep
        group: 'Context & drift'
        signature: ''
        description: 'Read-only drift report: phase growth %, scope expansion %, parked zombies, and stale-context items'
        example: '/atomic-skills:project scope-creep'
      - name: detect-scope
        group: 'Context & drift'
        signature: ''
        description: 'Suggest a scope.paths value from recent git activity on the branch, as a checklist you accept'
        example: '/atomic-skills:project detect-scope'
      - name: review
        group: 'Review'
        signature: '[<slug>] [--with-code] [--mode=local|both]'
        description: 'Mutation-gated adversarial audit of a plan/initiative — delegates to review-plan (and review-code with --with-code); reports findings only, NEVER closes tasks or advances phases'
        example: '/atomic-skills:project review v3-redesign --with-code'
      - name: review-due
        group: 'Review'
        signature: ''
        description: 'Run a cross-model codex review on the diff since the last review and record the result for the default view'
        example: '/atomic-skills:project review-due'
      - name: depend
        group: 'Dependencies'
        signature: 'list [<plan>] | add <dependent> <prerequisite> | remove <dependent> <prerequisite> | resolve <dependent> <prerequisite> --archived'
        description: 'Manage cross-plan execution dependencies (dependsOnPlans[]): list edges, add/remove a prerequisite, or resolve one against an archived plan; drives the dashboard Caminho de execucao lanes (Liberado/Em andamento/Bloqueado/Concluido)'
        example: '/atomic-skills:project depend add p2-api p1-schema'
    args:
      - name: '--browser'
        kind: flag
        required: false
        description: 'Open the aiDeck dashboard in the browser (status view)'
      - name: '--terminal'
        kind: flag
        required: false
        description: 'Full terminal-only view, no browser (status view)'
      - name: '--list'
        kind: flag
        required: false
        description: 'List all plans + standalone initiatives (status view)'
      - name: '--plan'
        kind: option
        required: false
        description: 'Filter view to a specific plan slug (status view)'
      - name: '--phase'
        kind: option
        required: false
        description: 'Filter view to a specific phase id (status view)'
      - name: '--scan'
        kind: option
        required: false
        description: 'Extra source paths for discover (comma-separated). E.g. --scan=NOTES/,~/team-plans/'
      - name: '--scope'
        kind: option
        required: false
        description: 'Discover: comma-separated source kinds (git,github,docs,roadmap,memory-local,memory-claude,claude-mem)'
    output_artifacts:
      - '.atomic-skills/PROJECT-STATUS.md'
      - '.atomic-skills/projects/<project-id>/<slug>/plan.md (nested canonical)'
      - '.atomic-skills/projects/<project-id>/<slug>/phases/f<N>-*.md (phase initiatives)'
      - '.atomic-skills/status/config.json'
      - '.atomic-skills/bootstrap-drafts/ (discover output)'
      - 'legacy flat plans/ + initiatives/ remain readable during migration'
    dependencies: [git]
    iron_law: 'NO IMPLEMENTATION WITHOUT ANCHORED INITIATIVE.'
    schema_version: '0.2'
  prompt:
    name: prompt
    title: 'Prompt — Generate Optimized Prompt'
    description: 'Generate an optimized, self-contained prompt from a task description. Use when you need a precise prompt with exact file paths and guardrails.'
    value_pitch: >
      Hand an agent a vague task and you get a vague result — it guesses
      paths, invents constraints, and drifts from what you meant. `prompt`
      reads your actual codebase first, then writes a precise, self-contained
      brief: exact file paths, explicit guardrails, and acceptance criteria
      the receiving agent can check itself against. Hand it to a parallel
      session or a fresh context and the work comes back on-target the first
      time.
    purpose: >
      Turn a one-line task into a self-contained, codebase-grounded prompt —
      real file paths, explicit guardrails, and acceptance criteria — ready
      to drive a parallel agent or a fresh session without back-and-forth.
    when_to_use:
      - 'You have a vague task and want to make it actionable'
      - 'You need to brief a parallel agent precisely'
      - 'You will hand off the work to a different session'
    when_not_to_use:
      - 'You will execute the task in this same session'
      - 'You need a multi-phase plan (use project)'
      - 'You want to dispatch many tasks (use parallel-dispatch)'
    examples:
      - command: '/atomic-skills:prompt "refactor auth middleware to use new session API"'
        description: 'Generate a precise prompt with file paths and guards'
      - command: '/atomic-skills:prompt'
        description: 'Skill asks for task interactively'
    related: [parallel-dispatch, fix, project]
    tags: [meta, generation, planning]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: false
    mutates_repo: false
    network_required: false
    argument_hint: '[task description]'
    one_liner: 'Generate a self-contained prompt with exact paths and guardrails'
    emoji: '📝'
    version_added: '1.0.0'
    args:
      - name: task
        kind: positional
        required: false
        description: 'Task description in natural language. If omitted, skill asks interactively.'
    iron_law: 'NO PROMPT WITHOUT CODEBASE ANALYSIS.'
    schema_version: '0.2'

  hunt:
    name: hunt
    title: 'Hunt — Adversarial Tests'
    description: 'Write adversarial tests for existing code to find hidden bugs. Use when code lacks tests or you suspect untested edge cases. Requires a bounded scope — one class or function per run.'
    value_pitch: >
      Asking an agent to "add tests" produces happy-path tests that mirror
      the code — they confirm bugs instead of catching them. `hunt` writes
      adversarial tests whose expected values come from the spec, not the
      implementation (a HARD-GATE rejects any assertion derived from the
      code), and goes deep on one class or function per run instead of
      skimming. It maps every execution path, then tries to break the
      boundaries and error cases the code never anticipated.
    purpose: >
      Write tests that try to *break* one class or function — expected values
      drawn from the spec, never the implementation — to surface the edge
      cases, boundaries, and error paths the code never anticipated. Bounded
      to a single class or function per run so the hunt goes deep, not wide.
    when_to_use:
      - 'Code lacks tests'
      - 'You suspect untested edge cases'
      - 'Pre-merge quality check'
    when_not_to_use:
      - 'Scope larger than 1 class or function'
      - 'Existing test suite is already comprehensive'
      - 'You want to add features (use prompt instead)'
    examples:
      - command: '/atomic-skills:hunt src/matcher.php'
        description: 'Hunt bugs in a single file'
      - command: '/atomic-skills:hunt src/auth/'
        description: 'Triage mode for directory (max 30 files)'
    related: [fix, review-code]
    tags: [testing, quality, pre-implementation]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: true
    mutates_repo: true
    network_required: false
    argument_hint: '<file|dir|class|function>'
    one_liner: 'Adversarial tests from the spec, not the code — depth over breadth'
    emoji: '🎯'
    version_added: '1.0.0'
    args:
      - name: target
        kind: positional
        required: true
        description: 'File, directory, or function/class to hunt. Directory mode caps at 30 files.'
    dependencies: [git]
    iron_law: 'NO HUNT WITHOUT BOUNDED SCOPE.'
    schema_version: '0.2'

  parallel-dispatch:
    name: parallel-dispatch
    title: 'Parallel Dispatch — Independent Tasks'
    description: "Dispatch a user-provided list of independent tasks to N parallel sessions with verified scope isolation and a batch id for tracking. Validates parallelism benefit (Q1-Q4 HARD-GATE) before exploring; proves scope disjointness via pairwise grep before generating prompts. Use when the user brings a consolidated task list — this skill does NOT invent tasks."
    value_pitch: >
      Fire off parallel agents that happen to touch the same files and you
      get merge conflicts, clobbered work, and runs you throw away.
      `parallel-dispatch` refuses to launch until it has *proven* the task
      scopes are disjoint — pairwise grep across every pair, verified
      isolation rather than hopeful isolation — then dispatches the batch
      under one tracking id. You walk away; N agents work in true parallel
      and their results merge clean.
    purpose: >
      Validate that a finalized task list is genuinely parallelizable, prove
      scope disjointness mechanically, and dispatch it to N isolated sessions
      under one batch id — so independent work runs concurrently without
      collisions. This skill dispatches your list; it does not invent tasks.
    when_to_use:
      - 'You have a finalized list of independent tasks'
      - 'Tasks have concrete file-path scopes'
      - 'You will be away while agents run'
    when_not_to_use:
      - 'Work fits in the current session'
      - 'The list is still exploratory'
      - 'Tasks have hard sequential dependencies'
    examples:
      - command: '/atomic-skills:parallel-dispatch task-list.md'
        description: 'Dispatch validated task list'
    related: [parallel-dispatch-audit, prompt]
    tags: [parallelism, dispatch, workflow]
    ide_compatibility: [claude-code]
    requires_args: true
    mutates_repo: true
    network_required: false
    argument_hint: '<task-list.md|inline tasks>'
    one_liner: 'Dispatch a task list to N parallel sessions with verified isolation'
    emoji: '🚀'
    version_added: '1.6.0'
    args:
      - name: task-list
        kind: positional
        required: true
        description: 'Path to the markdown file containing the finalized task list.'
    output_artifacts:
      - '.atomic-skills/dispatches/<batch-id>.md'
    dependencies: [git]
    iron_law: 'NO LAUNCH WITHOUT MECHANICAL SCOPE ISOLATION.'
    schema_version: '0.2'

  parallel-dispatch-audit:
    name: parallel-dispatch-audit
    title: 'Parallel Dispatch — Audit'
    description: "Audit the output of a parallel-dispatch batch. Reads the plan file, verifies each agent's deliverables on disk against the user's original request, applies cosmetic fixes, and produces a report with pending decisions. HARD-GATEs on active batch (<2min commits) and read-only mode (≥5 issues). Use after parallel-dispatch agents complete."
    value_pitch: >
      A green commit can sit on top of an empty file, and a still-running
      agent looks identical to a failed one. `parallel-dispatch-audit` opens
      each deliverable on disk and reads the content against the original
      plan — commit messages don't count as proof. It applies cosmetic fixes
      only when the batch is clean; the moment it finds five or more issues
      (or scope drift, a missing deliverable, a destructive op) it flips to
      read-only and escalates with evidence, because piecemeal fixes would
      hide that the plan itself was wrong.
    purpose: >
      Independently verify what a parallel-dispatch batch actually produced —
      reading each deliverable on disk against the original request, applying
      only cosmetic fixes, and flipping to read-only escalation with evidence
      the moment the work diverges (≥5 issues, scope drift, or a missing
      deliverable).
    when_to_use:
      - 'A parallel-dispatch batch has completed'
      - 'You need objective verification of agent outputs'
    when_not_to_use:
      - 'Agents are still running (commits less than 2 min old)'
      - 'You want to refactor what agents wrote (out of scope)'
    examples:
      - command: '/atomic-skills:parallel-dispatch-audit onboard-ci'
        description: 'Audit batch by slug'
    related: [parallel-dispatch]
    tags: [parallelism, audit, review, quality]
    ide_compatibility: [claude-code]
    requires_args: false
    mutates_repo: true
    network_required: false
    argument_hint: '[batch-slug]'
    one_liner: 'Verify each batch deliverable on disk; fix or escalate with evidence'
    emoji: '👁️'
    version_added: '1.6.0'
    args:
      - name: slug
        kind: positional
        required: false
        description: 'Batch slug to audit. Defaults to the most recent dispatch.'
    output_artifacts:
      - '.atomic-skills/dispatches/<slug>.md (annotated with audit results)'
    dependencies: [git]
    iron_law: 'NO CONCLUSION WITHOUT EVIDENCE FROM DISK.'
    schema_version: '0.2'

  brainstorm:
    name: brainstorm
    title: 'Brainstorm — Divergent DESIGN front-half'
    description: 'Turn an open idea into a committed, critic-approved design.md — the divergent front-half of DESIGN. Use before writing a multi-phase plan, when the WHAT/WHY and the chosen approach are not yet decided.'
    value_pitch: >
      The failure this prevents is premature convergence — locking onto the
      first workable approach and writing it up as "the design". `brainstorm`
      widens before it narrows: it frames the real forks, diverges via a
      gate-mode debate panel (only when the decision is expensive-to-reverse),
      lets the user ratify, writes a sectioned `design.md`, and gates it with a
      fresh independent critic — never panel consensus. PLAN refuses to start
      without that approved, lint-clean design.
    purpose: >
      Drive an open idea to a committed, section-linted, critic-approved
      design.md — diverging across real alternatives before converging — so
      the plan that follows is built on a deliberate decision, not the first
      approach that happened to work. The head of the lifecycle chain that
      `project new plan` decomposes.
    when_to_use:
      - 'Starting a multi-phase plan whose approach is not yet decided'
      - 'There are ≥2 viable approaches and the decision is expensive to reverse'
      - 'You need a committed design.md before decomposing into tasks'
    when_not_to_use:
      - 'An ad-hoc or single-task change (triage exempts it from DESIGN)'
      - 'The design is already committed and critic-approved'
      - 'You only need divergent perspectives, not a committed artifact (use debate)'
    examples:
      - command: '/atomic-skills:brainstorm "self-host the project lifecycle"'
        description: 'Run the DESIGN front-half and land a critic-approved design.md'
      - command: '/atomic-skills:brainstorm'
        description: 'Skill asks for the problem, goal, project-id, and slug interactively'
    related: [debate, project, review-plan]
    tags: [design, brainstorming, lifecycle, core]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: false
    mutates_repo: true
    network_required: false
    one_liner: 'Diverge, decide, then write a critic-gated design.md before any plan'
    emoji: '💡'
    version_added: '2.2.0'
    argument_hint: '[goal]'
    args:
      - name: goal
        kind: positional
        required: false
        description: 'The problem/goal to design. If omitted, the skill asks interactively.'
    dependencies: [git]
    iron_law: 'NO PLAN WITHOUT AN APPROVED DESIGN.'
    schema_version: '0.2'

  design-brief:
    name: design-brief
    title: 'Design Brief — DS + screens prompts, contamination-free'
    description: 'From a real app (code + product intent), generate the Design System + screens prompts for a design agent (e.g. claude.ai/design) — silence on visual form, but interaction behaviour and philosophy specified with concrete values mined from the code. Use to hand a faithful brief to the design agent without contaminating the visual decision.'
    value_pitch: >
      The failure this prevents is the inverse of over-design: it is
      under-specification. "Don't dictate the visuals" is a layer-1-only rule;
      extending that silence to the interaction model and the product
      philosophy lets the design agent fill the gaps with its conventional
      default — which is usually the product's anti-pattern. `design-brief`
      keeps silence on visual form but pins behaviour and who-decides-what with
      concrete values mined from the real code, names the forbidden anti-pattern
      on risky screens, and ships the DS-first so every screen consumes the
      inherited Design System instead of redefining it.
    purpose: >
      Generate the two design prompts (Design System, then screens that consume
      the inherited DS) from a real app and its product intent, encoding the
      three-layer model: visual form stays the design agent's (silence), while
      interaction behaviour and philosophy are product requirements specified
      with concrete values — so the redesign is faithful, not a plausible
      anti-pattern.
    when_to_use:
      - 'You are handing an existing app to a design agent (e.g. claude.ai/design) for a redesign'
      - 'You need a Design System prompt plus per-screen prompts that consume it'
      - 'A prior hand-written brief produced anti-patterns by leaving behaviour/philosophy unspecified'
    when_not_to_use:
      - 'You only need the product decision, not the design prompts (use brainstorm)'
      - 'There is no real app to mine behavioural parameters from'
      - 'The design system and screens already exist and are faithful'
    examples:
      - command: '/atomic-skills:design-brief "redesign the review dashboard at src/dashboard"'
        description: 'Mine the app + intent, emit the DS prompt then the screens prompts'
      - command: '/atomic-skills:design-brief'
        description: 'Skill asks for the app/scope and the product intent interactively'
    related: [brainstorm, project]
    tags: [design, prompts, anti-contamination, core]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: false
    mutates_repo: true
    network_required: false
    one_liner: 'Generate DS + screens prompts for a design agent, contamination-free'
    emoji: '🎨'
    version_added: '2.3.0'
    argument_hint: '[app path or scope]'
    args:
      - name: scope
        kind: positional
        required: false
        description: 'The target app/scope (repo path + product intent). If omitted, the skill asks interactively.'
    iron_law: 'NEVER SILENCE BEHAVIOUR OR PHILOSOPHY — SILENCE IS FOR VISUAL FORM ONLY.'
    schema_version: '0.2'

  debate:
    name: debate
    title: 'Debate — Multi-Agent Roundtable'
    description: 'Facilitate a multi-voice debate where 2-4 personas argue as real, independent subagents — each spawned separately so it thinks for itself, presented unblended. Use for design debates, brainstorming, adversarial panels, or any time you want genuinely divergent perspectives instead of one model''s averaged take.'
    value_pitch: >
      Ask one model for "the architect''s view and the QA view" and both
      collapse toward the same voice — convergent, performative, useless for
      finding blind spots. `debate` spawns each persona as its own subagent
      so they genuinely disagree, and presents every response unabridged instead
      of digesting them into your summary. The roster is pluggable (inline list,
      `.claude/agents/*.md`, `personas/*.md`, or a shipped default), so it runs
      in any repo. It''s the divergent, human-in-the-loop step that produces the
      consolidated direction `parallel-dispatch` consumes.
    purpose: >
      Run a multi-persona roundtable as independent subagents for divergent
      thinking — design debates, brainstorming, adversarial review panels — with
      the human steering each round.
    when_to_use:
      - 'You want genuinely divergent perspectives on an open question'
      - 'Debating a design, architecture, or product trade-off'
      - 'Brainstorming or widening the option space before deciding'
      - 'Running an adversarial review panel (dev + architect + QA cross-talk)'
    when_not_to_use:
      - 'You have a finalized, disjoint task list (use parallel-dispatch)'
      - 'You need a single converged answer or committed artifacts'
      - 'A one-shot factual question with no perspectives to weigh'
    examples:
      - command: '/atomic-skills:debate "should we split the monolith now or after launch?"'
        description: 'Debate an open decision using the auto-detected roster'
      - command: '/atomic-skills:debate --solo "review this API design"'
        description: 'Single-LLM role-play fallback when subagents are unavailable'
      - command: '/atomic-skills:debate --roster personas/security-panel.yaml'
        description: 'Convene a specific named panel from a roster file'
    related: [parallel-dispatch, review-plan, review-code]
    tags: [brainstorming, multi-agent, roundtable, divergent, core]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: false
    mutates_repo: false
    network_required: false
    argument_hint: '[topic] [--solo] [--model <m>] [--roster <path>] [--context <file>] [--gate [agenda]]'
    one_liner: 'Roundtable of independent subagent personas for divergent thinking'
    emoji: '🎭'
    version_added: '2.1.0'
    args:
      - name: topic
        kind: positional
        required: false
        description: 'Opening topic for the roundtable. If omitted, the skill asks after showing the roster.'
      - name: '--solo'
        kind: flag
        required: false
        description: 'Role-play all personas in one response instead of spawning subagents (fallback when the spawn tool is unavailable).'
      - name: '--model'
        kind: option
        required: false
        description: 'Force all subagents onto a specific model.'
        default: 'model matched to each round''s depth'
      - name: '--roster'
        kind: option
        required: false
        description: 'Explicit roster file (YAML list or directory of persona files) instead of auto-detection.'
      - name: '--gate'
        kind: flag
        required: false
        description: 'Gate-mode: bounded agenda + mandatory contrarian every round + a machine-readable Synthesis verdict block handed to a critic. Produces evidence for a stage gate; never decides.'
    dependencies: []
    iron_law: 'NO SYNTHESIS WITHOUT INDEPENDENT VOICES.'
    schema_version: '0.2'

  implement:
    name: implement
    title: 'Implement — Mode 2-aware Execution Driver'
    description: 'Drive the SPEC-admitted tasks of a decomposed plan to DONE — the single-threaded execution driver at the tail of the lifecycle. Default Mode 1 is session-writer; opt-in --mode=automate is pure maestro (code-only phase writers, forced phase/complex both review, plan-end external-both + user validation). Close each task only through verify-on-done; event-driven session handoffs make a fresh session resume cheaply.'
    value_pitch: >
      The lifecycle ends in execution, and execution is where state gets
      lost — work marked done on a claim, context evicted mid-task, a resume
      that cold-re-investigates. `implement` is a serial loop with durable
      checkpoints: code one task, gate it through verify-on-done (never a
      self-asserted pass), snapshot a self-sufficient `## Session handoff`
      block on observable events (after each task / before each dispatch /
      phase boundary) — never on a fabricated context-% gauge. Coding stays
      single-threaded; only heavy reads fan out. Opt-in `--mode=automate`
      makes the host a pure maestro (one code-only phase writer per phase;
      no silent Mode-1 fallback). The next session resumes from the handoff,
      and `resume` refuses on a dirty tree or a placeholder.
    purpose: >
      Read the materialized Tasks a plan produced and drive them to done one
      at a time, gating each completion on its deterministic verifier and
      keeping durable state recoverable across sessions.
    when_to_use:
      - 'A plan has been decomposed and its tasks admitted by the SPEC gate'
      - 'You are implementing a phase task-by-task and want verifier-gated completion'
      - 'Resuming a prior implementation session from its handoff block'
      - 'You want pure-maestro multi-phase execution with --mode=automate (phase writers + forced cross-model review)'
    when_not_to_use:
      - 'There is no plan/design yet (use brainstorm, then project new plan)'
      - 'A one-off bug fix with a known root cause (use fix)'
      - 'You only need to verify a single claim, not drive a plan (use verify-claim)'
    examples:
      - command: '/atomic-skills:implement migration-self-host'
        description: 'Drive the active phase of a plan to done, task-by-task'
      - command: '/atomic-skills:implement my-plan --mode=automate'
        description: 'Pure maestro: one code-only phase writer per phase; stamps executionMode: automate'
      - command: '/atomic-skills:implement'
        description: 'Implement the active plan/initiative; resume from its handoff if present'
    related: [project, verify-claim, fix]
    tags: [execution, lifecycle, implement, core]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: false
    mutates_repo: true
    network_required: false
    one_liner: 'Drive plan tasks to done; optional --mode=automate pure maestro'
    emoji: '⚙️'
    version_added: '2.3.0'
    argument_hint: '[[project-id/]plan-slug] [--mode=automate|1] [--clear-execution-mode]'
    args:
      - name: plan-slug
        kind: positional
        required: false
        description: 'The plan (or project-id/plan-slug) to implement. If omitted, uses the active plan/initiative.'
      - name: '--mode'
        kind: flag
        required: false
        description: 'Opt-in execution mode. automate = pure maestro + phase writers; 1/default = Mode 1 session writer. Stamps plan executionMode on first automate entry.'
      - name: '--clear-execution-mode'
        kind: flag
        required: false
        description: 'Leave durable automate (unstamp executionMode). Refuses while a writer lease is active or malformed.'
    dependencies: [git]
    iron_law: 'CODING STAYS SINGLE-THREADED (ONE WRITER PER WORKTREE).'
    schema_version: '0.2'

  verify-claim:
    name: verify-claim
    title: 'Verify Claim — Completion-Evidence Gate'
    description: 'Turn a claim of completion (done / passes / fixed) into a verified fact from a fresh run, or a binary FAIL. Use before marking a task done, when an agent or a cheap/foreign executor reports success, or to gate any "it works" claim on the observed result instead of the narrative.'
    value_pitch: >
      A self-graded "it works" is worthless precisely when it matters most —
      the producer is the party least able to see its own blind spot.
      `verify-claim` is the completion-evidence gate `implement` calls before
      any task closes: it reads the VCS diff (not the report), re-executes the
      task's deterministic verifier, and derives a BINARY verdict from the real
      result — exit 0 AND, for tests, a non-zero collected count, so a green
      run of zero tests is the false-green it catches. A cheap or cross-provider
      executor self-checks but never self-certifies.
    purpose: >
      Verify a completion claim by executing its deterministic verifier and
      citing the observed evidence, producing a binary pass/fail that no
      producer can self-grant.
    when_to_use:
      - 'About to mark a task done and need its verifier run for real first'
      - 'An agent, subagent, or Codex reported success and you must adjudicate it'
      - 'Gating any "the tests pass / the bug is fixed" claim on captured evidence'
    when_not_to_use:
      - 'The claim is a human-judgement / UI observation (use the manual-acceptance gate)'
      - 'There is no deterministic verifier (the task failed SPEC admission — surface it)'
      - 'You are diagnosing a bug, not verifying a fix (use fix)'
    examples:
      - command: '/atomic-skills:verify-claim T-004'
        description: 'Run the task''s verifier, derive a binary verdict, cite the evidence'
      - command: '/atomic-skills:verify-claim "the parser handles empty input"'
        description: 'Gate an "it works" claim on a fresh, captured run'
    related: [implement, fix, project]
    tags: [quality, verification, gate, core]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: false
    mutates_repo: true
    network_required: false
    one_liner: 'No success claim without fresh verification — run it, cite it'
    emoji: '✅'
    version_added: '2.3.0'
    argument_hint: '[claim]'
    args:
      - name: claim
        kind: positional
        required: false
        description: 'The claim or task id under verification. If omitted, the skill asks for the claim and its verifier.'
    dependencies: [git]
    iron_law: 'NO SUCCESS CLAIM WITHOUT FRESH VERIFICATION.'
    schema_version: '0.2'

  init-memory:
    name: init-memory
    title: 'Init Memory — Persistent Context'
    description: 'Initialize persistent memory structure for cross-session context.'
    value_pitch: >
      Memory often already exists but is scattered across `.memory/`,
      `docs/memory/`, and Claude's auto-memory dir — duplicated,
      contradictory, or never actually read because it was never wired up.
      `init-memory` consolidates it into one indexed `.ai/memory/`, connects
      it via `autoMemoryDirectory` (the durable path, not the fragile
      redirect), and keeps `MEMORY.md` under the 200-line load limit.
      Originals are deleted only after an ls-compare confirms every file
      copied.
    purpose: >
      Bootstrap the persistent memory directory and index so that future
      sessions can pick up where this one left off.
    when_to_use:
      - 'First time using atomic-skills in a project'
      - 'Memory directory missing or corrupted'
      - 'You want to standardize the memory layout'
    when_not_to_use:
      - 'Memory already initialized and healthy'
    examples:
      - command: '/atomic-skills:init-memory'
        description: 'Bootstrap memory in the current project'
    related: [save-and-push]
    tags: [memory, setup]
    ide_compatibility: [claude-code, gemini, cursor, codex]
    requires_args: false
    mutates_repo: true
    network_required: false
    one_liner: 'Consolidate scattered memory into .ai/memory/ and wire it to the IDE'
    emoji: '🧠'
    version_added: '1.0.0'
    output_artifacts:
      - '.ai/memory/MEMORY.md'
    iron_law: 'NO DELETION WITHOUT CONFIRMED BACKUP.'
    schema_version: '0.2'
