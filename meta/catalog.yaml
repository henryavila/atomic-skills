version: '0.2'

# Optional callout rendered under `## Skills` as a versioned `> Note`.
# Version string is pulled from package.json automatically; only the body
# text lives here. Leave the block out entirely to suppress the note.
release_highlight:
  body: |
    First major bump since 1.8.x. Review skills consolidated from 4 → 2 (`review-plan` + `review-code`) with a Step 0 mode picker (`local` | `codex` | `both`). Catalog moved to schema v0.2 and was renamed to `meta/catalog.yaml`. README + dashboard are now generated from five marker-bounded regions; husky pre-commit auto-regenerates on staged catalog changes.
    See [CHANGELOG.md](CHANGELOG.md) for the full migration matrix.

core:
  fix:
    name: fix
    title: 'Fix — Root Cause + TDD'
    description: 'Root cause diagnosis + TDD fix. Use when you find a bug or unexpected behavior.'
    value_pitch: >
      AI agents love to jump to fixes. `fix` forces the detective path:
      reproduce first, understand the root cause, write a failing test,
      *then* fix. The test stays — so the bug never comes back.
    purpose: >
      Identify the root cause of a bug, write a reproducing test, and only
      then apply the fix. Detective mindset, not firefighter.
    when_to_use:
      - 'You observed a bug or unexpected behavior'
      - 'A test is failing for unclear reasons'
      - 'A regression appeared after a recent change'
    when_not_to_use:
      - 'You want to add a new feature (use prompt)'
      - 'The issue is in design, not implementation'
      - 'You have no symptom to reproduce'
    examples:
      - command: '/atomic-skills:fix "duplicates in /musicas listing"'
        description: 'Diagnose and fix with provided symptom'
      - command: '/atomic-skills:fix'
        description: 'Skill prompts you for the symptom interactively'
    related: [hunt, review-code]
    tags: [quality, debugging, tdd, core]
    ide_compatibility: [claude-code, gemini, cursor]
    requires_args: false
    mutates_repo: true
    network_required: false
    one_liner: 'Diagnose root cause → write test → fix → verify'
    emoji: '🔧'
    version_added: '1.0.0'
    argument_hint: '[symptom]'
    args:
      - name: symptom
        kind: positional
        required: false
        description: 'Observed bug or unexpected behavior. If omitted, skill prompts interactively.'
    dependencies: [git]
    schema_version: '0.2'

  save-and-push:
    name: save-and-push
    title: 'Save & Push — Commit + Memory + Push'
    description: 'Review conversation, save learnings to memory, commit and push work.'
    value_pitch: >
      Ending a session sloppily means a leaked `.env`, one giant unrelated
      blob commit, and learnings lost to context death. `save-and-push`
      scans the diff for secrets and sensitive files before staging, groups
      changes into logical commits (never `git add .`), persists durable
      learnings to memory, and refuses to push to main/master without
      confirmation. The next session resumes with clean history and context
      intact.
    purpose: >
      End-of-session ritual: extract learnings to persistent memory, stage
      relevant files, commit with conventional message, push to remote.
    when_to_use:
      - 'You finished a coherent piece of work'
      - 'About to switch context or end the session'
      - 'You want learnings persisted before forgetting'
    when_not_to_use:
      - 'Work in progress, not yet a coherent commit'
      - 'Tests still failing'
      - 'You only want to commit (use git directly)'
    examples:
      - command: '/atomic-skills:save-and-push'
        description: 'Full flow: memory + commits + push'
    related: [project-status, init-memory]
    tags: [workflow, git, memory, core]
    ide_compatibility: [claude-code, gemini, cursor]
    requires_args: false
    mutates_repo: true
    network_required: true
    one_liner: 'Scan for secrets, group commits, save learnings, push safely'
    emoji: '💾'
    version_added: '1.0.0'
    dependencies: [git]
    schema_version: '0.2'

  review-plan:
    name: review-plan
    title: 'Review Plan — Adversarial (Local + Codex)'
    description: 'Adversarial review of an implementation plan. Step 0 picks mode: local self-loop, codex cross-model envelope, or both (local first → codex on cleaned plan). Optional cross-reference against external artifacts.'
    value_pitch: >
      Plans fail when the author reviews their own work. `review-plan` runs
      adversarial passes — locally, via a cross-model codex envelope, or
      both — to catch gaps, missing edge cases, and optimistic assumptions
      before execution begins.
    purpose: >
      Adversarial review with mode picker: local (cheap, fast), codex
      (cross-model via OpenAI Codex CLI, ~$1-2), or both (default — local
      first, codex second on cleaned plan with sealed envelope).
      Optionally cross-references against source artifacts. Iterates up
      to 3 passes in local; two-pass envelope in codex.
    when_to_use:
      - 'You finished writing a plan and want a structural review'
      - 'Significant plan about to enter execution (both mode recommended)'
      - 'Cross-model bug hunt against self-preference bias (codex or both)'
      - 'Plan was derived from a PRD/spec and you want coverage verification'
    when_not_to_use:
      - 'Plan is still brainstorming (not structured yet)'
      - 'Trivial plan (skip review entirely)'
      - 'Codex CLI not installed and you need codex mode (use --mode=local)'
    examples:
      - command: '/atomic-skills:review-plan docs/plans/migration.md'
        description: 'Interactive picker — chooses mode + cross-ref'
      - command: '/atomic-skills:review-plan docs/plans/migration.md --mode=local'
        description: 'Force local-only self-loop'
      - command: '/atomic-skills:review-plan docs/plans/migration.md --mode=both'
        description: 'Local then codex (sealed envelope)'
    related: [review-code]
    tags: [review, planning, adversarial, cross-model]
    ide_compatibility: [claude-code, gemini, cursor]
    requires_args: true
    mutates_repo: true
    network_required: true
    one_liner: 'Adversarial plan review with local/codex/both mode picker'
    emoji: '🔍'
    version_added: '2.0.0'
    argument_hint: '<plan.md> [--mode=local|codex|both] [--cross-ref=paths] [--allow-dirty]'
    args:
      - name: plan-path
        kind: positional
        required: true
        description: 'Path to the plan markdown file under review.'
      - name: '--mode'
        kind: option
        required: false
        description: 'Force a review mode (local, codex, both, or the v2.x alias internal). Skips the Step 0a picker.'
      - name: '--no-cross-ref'
        kind: flag
        required: false
        description: 'Skip the Step 0b cross-ref picker; force internal-only.'
      - name: '--cross-ref'
        kind: option
        required: false
        description: 'Comma-separated list of artifact paths to cross-reference against. Skips the picker.'
      - name: '--artifacts'
        kind: option
        required: false
        description: 'Alias of --cross-ref (compat with v2.x).'
      - name: '--allow-dirty'
        kind: flag
        required: false
        description: 'Pass through to the codex pre-flight; suppresses the dirty-tree abort.'
    output_artifacts:
      - '.atomic-skills/reviews/YYYY-MM-DD-HHMM-<slug>.md (codex/both modes)'
      - '.atomic-skills/reviews/INDEX.md'
    dependencies: [codex, git]
    schema_version: '0.2'

  review-code:
    name: review-code
    title: 'Review Code — Adversarial (Local + Codex)'
    description: 'Adversarial review of code changes given a git ref (branch, commit, or range). Step 0 picks mode: local self-loop, codex cross-model envelope, or both (local first → codex on the same captured diff).'
    value_pitch: >
      Reviewing your own diff in the same context that wrote it inherits
      every blind spot and rationalization. `review-code` captures the diff
      once and hands it to a sealed reviewer with clean context — locally,
      cross-model via codex, or both — stripped of commit messages and intent
      so framing can't suppress findings. Every finding cites file:line; no
      evidence, no approval.
    purpose: >
      Review a git ref (branch, commit, or range) adversarially. Mode
      picker: local (cheap, fast), codex (cross-model via OpenAI Codex
      CLI, ~$1-2), or both (default — local first, codex second on the
      byte-identical captured diff with sealed envelope). Range-aware
      ref validation + shape-specific diff command.
    when_to_use:
      - 'You finished a coherent code change'
      - 'Significant change about to merge (both mode recommended)'
      - 'Critical path (auth, payments, data integrity) — both mode'
      - 'Cheap pre-merge sanity check (local mode)'
    when_not_to_use:
      - 'No git ref to review (and you don''t want to commit/stash first)'
      - 'Trivial change already heavily reviewed'
      - 'Codex CLI not installed and you need codex mode (use --mode=local)'
    examples:
      - command: '/atomic-skills:review-code main..HEAD'
        description: 'Interactive picker — chooses mode'
      - command: '/atomic-skills:review-code feat/new-feature --mode=local'
        description: 'Force local-only self-loop'
      - command: '/atomic-skills:review-code main..HEAD --mode=both'
        description: 'Local then codex (sealed envelope)'
    related: [review-plan, fix, hunt]
    tags: [review, code, adversarial, cross-model]
    ide_compatibility: [claude-code, gemini, cursor]
    requires_args: true
    mutates_repo: true
    network_required: true
    one_liner: 'Adversarial code review with local/codex/both mode picker'
    emoji: '🔬'
    version_added: '2.0.0'
    argument_hint: '<branch | commit | main..HEAD> [--mode=local|codex|both] [--allow-dirty]'
    args:
      - name: git-ref
        kind: positional
        required: true
        description: 'Branch, single commit, or commit range (a..b / a...b).'
      - name: '--mode'
        kind: option
        required: false
        description: 'Force a review mode (local, codex, both). Skips the Step 0 picker.'
      - name: '--allow-dirty'
        kind: flag
        required: false
        description: 'Include working-tree changes in the captured diff; suppresses the dirty-tree abort.'
    output_artifacts:
      - '.atomic-skills/reviews/YYYY-MM-DD-HHMM-<slug>.md (codex/both modes)'
      - '.atomic-skills/reviews/INDEX.md'
    dependencies: [codex, git]
    schema_version: '0.2'

  project-status:
    name: project-status
    title: 'Project Status — Initiative Tracking'
    description: "View and daily-mutate Plan/Initiative/Task state in .atomic-skills/. Compact terminal view + browser via mdprobe. Stack frames, parked/emerged items, task transitions, phase-done/reopen, archive, scope-creep, codex review tracking. Creation, migration, and structural commands live in atomic-skills:project-plan."
    value_pitch: >
      Resume a multi-day project and the agent has forgotten which phase
      you're in, what's parked, and why a task exists. `project-status`
      keeps Plan/Initiative/Task state in `.atomic-skills/` so every session
      reloads the exact frame — with stack frames for side-investigations,
      scope-creep detection, and phase exit-gates that block advancing until
      criteria are met. Compact terminal view or browser dashboard, no
      re-explaining required.
    purpose: >
      Track work via Plan/Initiative/Task hierarchy: view current state,
      manage stack/parked/emerged, transition tasks/phases, archive,
      report drift. Sibling skill `project-plan` handles all CREATE
      and structural operations.
    when_to_use:
      - 'Resuming after a break — view current state'
      - 'Pushing or popping a stack frame (lateral expansion)'
      - 'Parking lateral findings or surfacing emerged work'
      - 'Marking tasks done, advancing phases'
      - 'Archiving completed plans/initiatives'
      - 'Viewing drift / scope-creep / un-reviewed code'
    when_not_to_use:
      - 'Starting a new plan — use atomic-skills:project-plan'
      - 'Creating a new initiative / task / phase — use atomic-skills:project-plan'
      - 'Migrating legacy files — use atomic-skills:project-plan migrate'
      - 'One-shot questions or work that fits in the current session'
    examples:
      - command: '/atomic-skills:project-status'
        description: 'View current state'
      - command: '/atomic-skills:project-status push "investigating slow query"'
        description: 'Push a side-investigation frame'
      - command: '/atomic-skills:project-status done T-005'
        description: 'Close a task (triggers phase-completion check if last)'
      - command: '/atomic-skills:project-status phase-done'
        description: 'Verify exit gates and advance the plan'
    related: [fix, save-and-push, project-plan]
    tags: [tracking, anchoring, planning, core]
    ide_compatibility: [claude-code, gemini, cursor]
    requires_args: false
    mutates_repo: true
    network_required: false
    argument_hint: 'done | push | pop | phase-done | park | emerge | promote | switch | archive | why | scope-creep | review-due | phase-reopen | re-ratify | detect-scope'
    one_liner: 'View + daily mutations on the .atomic-skills/ tree'
    emoji: '📊'
    version_added: '1.5.0'
    subcommands:
      - name: push
        group: 'Stack frames'
        signature: '<description>'
        description: 'Open a lateral stack frame on top of the current work; type is inferred from the verb'
        example: '/atomic-skills:project-status push "investigating slow query"'
      - name: pop
        group: 'Stack frames'
        signature: '[--resolve|--park|--emerge]'
        description: 'Close the top frame with a destination: --resolve (drop), --park (note), or --emerge (follow-up)'
        example: '/atomic-skills:project-status pop --park'
      - name: park
        group: 'Backlog'
        signature: '<description>'
        description: 'File a low-commitment note for later into parked[]; ratify gate forces a readable solves/trigger'
        example: '/atomic-skills:project-status park "consider caching layer"'
      - name: emerge
        group: 'Backlog'
        signature: '<description>'
        description: 'File a real follow-up into emerged[] (same ratify gate); --target <phaseId> lands it in another phase'
        example: '/atomic-skills:project-status emerge "auth refactor needed"'
      - name: promote
        group: 'Backlog'
        signature: '<title-or-idx>'
        description: 'Turn a parked item into a real task (assigns next T-NNN, carries its context forward)'
        example: '/atomic-skills:project-status promote 2'
      - name: done
        group: 'Tasks & phases'
        signature: '<task-id>'
        description: 'Mark a task done and stamp closedAt; if it was the last open task, surfaces phase-done or archive'
        example: '/atomic-skills:project-status done T-005'
      - name: phase-done
        group: 'Tasks & phases'
        signature: ''
        description: 'Verify every exit-gate criterion via its verifier, run a mandatory code review, then advance currentPhase'
        example: '/atomic-skills:project-status phase-done'
      - name: phase-reopen
        group: 'Tasks & phases'
        signature: '[<phase-id>]'
        description: 'Reverse a phase-done: restore the initiative to active, clear metAt on criteria, reset tasks to pending'
        example: '/atomic-skills:project-status phase-reopen F2'
      - name: archive
        group: 'Lifecycle'
        signature: '[<slug>]'
        description: 'Move a finished plan or initiative to archive/ (archiving a plan cascades to its child initiatives)'
        example: '/atomic-skills:project-status archive v3-redesign'
      - name: switch
        group: 'Lifecycle'
        signature: '<slug>'
        description: 'Pause the current plan/initiative and activate the target; offers to switch the plan too if it differs'
        example: '/atomic-skills:project-status switch my-feature'
      - name: why
        group: 'Context & drift'
        signature: '<id>'
        description: 'Read-only deep view of one item: status, ratified solves/trigger/assumptions, provenance, staleness'
        example: '/atomic-skills:project-status why T-005'
      - name: re-ratify
        group: 'Context & drift'
        signature: '<id>'
        description: 'Refresh a stale item: re-confirm the premises (bump review date) or rewrite solves/trigger/assumptions'
        example: '/atomic-skills:project-status re-ratify P-3'
      - name: scope-creep
        group: 'Context & drift'
        signature: ''
        description: 'Read-only drift report: phase growth %, scope expansion %, parked zombies, and stale-context items'
        example: '/atomic-skills:project-status scope-creep'
      - name: detect-scope
        group: 'Context & drift'
        signature: ''
        description: 'Suggest a scope.paths value from recent git activity on the branch, as a checklist you accept'
        example: '/atomic-skills:project-status detect-scope'
      - name: review-due
        group: 'Review'
        signature: ''
        description: 'Run a cross-model codex review on the diff since the last review and record the result for the default view'
        example: '/atomic-skills:project-status review-due'
    args:
      - name: '--list'
        kind: flag
        required: false
        description: 'List all initiatives across all plans'
      - name: '--plan'
        kind: option
        required: false
        description: 'Filter view to a specific plan slug'
      - name: '--phase'
        kind: option
        required: false
        description: 'Filter view to a specific phase id'
      - name: '--stack'
        kind: flag
        required: false
        description: 'Show only the active stack (compact view)'
      - name: '--archived'
        kind: flag
        required: false
        description: 'Show archived items'
    output_artifacts:
      - '.atomic-skills/PROJECT-STATUS.md'
      - '.atomic-skills/plans/<slug>.md'
      - '.atomic-skills/initiatives/<slug>.md'
      - '.atomic-skills/status/config.json'
      - '.atomic-skills/dispatches/<slug>.md (when promote-to-dispatch)'
    dependencies: [git]
    schema_version: '0.2'

  project-plan:
    name: project-plan
    title: 'Project Plan — Create, Discover, Migrate'
    description: "Single entry-point for CREATE and STRUCTURAL operations on .atomic-skills/. Bootstrap multi-phase Plans, discover in-flight work across the repo (multi-source scan), adopt existing markdown plans, migrate legacy state, add initiatives/tasks/phases, split overgrown phases, batch re-articulate placeholder context. Sibling skill project-status handles VIEW + daily mutations."
    value_pitch: >
      Plans rot into bare frontmatter or live as scattered intent across
      docs, branches, and memory. `project-plan` is the single
      create-and-restructure entry point: bootstrap a multi-phase Plan
      interactively, adopt an existing markdown plan, or `discover` in-flight
      work and cluster it — and it refuses to emit a plan without a real
      narrative (Context, Principles, Phase tree). Daily tracking then flows
      through `project-status`.
    purpose: >
      All paths that CREATE or RESTRUCTURE state in `.atomic-skills/`:
      bootstrap fresh Plans (interactive 7-stage), discover in-flight
      work from memory + docs + git, adopt existing markdown plans,
      add initiatives/tasks/phases, split phases, migrate legacy.
    when_to_use:
      - 'Want to organize what the repo already has → `discover`'
      - 'Multi-phase project described in conversation → default bootstrap'
      - 'Existing markdown plan to capture → `adopt`'
      - 'Standalone initiative for single-phase work → `new`'
      - 'Add task/phase to active plan → `new-task` / `new-phase` / `split-phase`'
      - 'Legacy initiative needs schema 0.1 → `migrate`'
      - 'Post-migration batch context re-articulation → `re-bootstrap`'
    when_not_to_use:
      - '.atomic-skills/ does not exist yet (run atomic-skills:project-status setup first)'
      - 'Daily tracking (view, push/pop, done, phase-done, etc.) — use project-status'
      - 'Just viewing existing plans (use project-status --plan <slug>)'
    examples:
      - command: '/atomic-skills:project-plan discover'
        description: 'Multi-source scan: propose Plans + Initiatives from .ai/memory, docs, git'
      - command: '/atomic-skills:project-plan v3-redesign'
        description: 'Bootstrap a new Plan interactively (7-stage flow)'
      - command: '/atomic-skills:project-plan adopt docs/plans/v3-redesign/00-master.md'
        description: 'Capture an existing markdown plan into structured state'
      - command: '/atomic-skills:project-plan migrate mesh-restructure'
        description: 'Convert a legacy initiative file to schema 0.1'
    related: [project-status, review-plan]
    tags: [planning, bootstrap, create, migrate, core]
    ide_compatibility: [claude-code, gemini, cursor]
    requires_args: false
    mutates_repo: true
    network_required: false
    argument_hint: 'discover | adopt | new | new-task | new-phase | split-phase | migrate | re-bootstrap'
    one_liner: 'Create + restructure + discover Plans and Initiatives'
    emoji: '🗺️'
    version_added: '2.0.0'
    subcommands:
      - name: discover
        group: 'Discover & adopt'
        signature: '[--dry-run|--commit] [--scope=<list>] [--scan=<path>]'
        description: 'Scan the whole repo (git, PRs, docs, roadmaps, memory), cluster signals, and propose Plans + Initiatives for approve/reject'
        example: '/atomic-skills:project-plan discover'
      - name: adopt
        group: 'Discover & adopt'
        signature: '<file.md>'
        description: 'Capture an existing free-form markdown plan into structured Plan + Initiatives + Tasks; previews before materializing'
        example: '/atomic-skills:project-plan adopt docs/plans/v3-redesign/00-master.md'
      - name: new
        group: 'Create units'
        signature: '<slug>'
        description: "Create one Initiative from the template, standalone or anchored to an active plan's phase; offers scope auto-detect"
        example: '/atomic-skills:project-plan new my-feature'
      - name: new-task
        group: 'Create units'
        signature: '"<title>" [--target <phaseId>] [--blocked-by <id>] [--tags ...]'
        description: 'Add a task to the active (or --target) initiative; records provenance and requires a ratified context block'
        example: '/atomic-skills:project-plan new-task --target F2 "Add canary smoke test"'
      - name: new-phase
        group: 'Create units'
        signature: '<id> "<title>" --after <other-id>'
        description: 'Insert a new phase into the active plan and materialize its initiative; sets dependsOn via --after, requires ratified context'
        example: '/atomic-skills:project-plan new-phase F0.5 "Validation" --after F0'
      - name: split-phase
        group: 'Restructure'
        signature: '<id>'
        description: 'Split an over-sized phase into sub-phases, moving tasks (preserving provenance); archives the original as archived, not done'
        example: '/atomic-skills:project-plan split-phase F2'
      - name: migrate
        group: 'Migrate legacy'
        signature: '<slug>'
        description: 'Convert a legacy (pre-0.1) initiative file to schemaVersion 0.1; reports the field-mapping diff and flags placeholder context'
        example: '/atomic-skills:project-plan migrate sample-legacy'
      - name: re-bootstrap
        group: 'Migrate legacy'
        signature: '<slug>'
        description: 'After migrate: batch re-articulate every parked/emerged item still holding a placeholder into real ratified context'
        example: '/atomic-skills:project-plan re-bootstrap sample-legacy'
    args:
      - name: slug
        kind: positional
        required: false
        description: 'Plan slug for the default (bootstrap) flow. Omit and the skill prompts interactively.'
      - name: '--scan'
        kind: option
        required: false
        description: 'Extra source paths for discover (comma-separated). E.g. --scan=NOTES/,~/team-plans/'
      - name: '--scope'
        kind: option
        required: false
        description: 'Discover: comma-separated source kinds (git,github,docs,roadmap,memory-local,memory-claude,claude-mem)'
    output_artifacts:
      - '.atomic-skills/plans/<slug>.md'
      - '.atomic-skills/initiatives/<slug>.md'
      - '.atomic-skills/bootstrap-drafts/ (discover output)'
    dependencies: [git]
    schema_version: '0.2'

  prompt:
    name: prompt
    title: 'Prompt — Generate Optimized Prompt'
    description: 'Generate an optimized, self-contained prompt from a task description. Use when you need a precise prompt with exact file paths and guardrails.'
    value_pitch: >
      Vague tasks produce vague results. `prompt` analyzes your codebase and
      generates a precise, self-contained prompt with exact file paths,
      guardrails, and acceptance criteria — ready to hand off to a parallel
      agent or a fresh session.
    purpose: >
      Turn a vague task description into an optimized, self-contained prompt
      with file paths, guardrails, and acceptance criteria. Use as input to
      another AI session.
    when_to_use:
      - 'You have a vague task and want to make it actionable'
      - 'You need to brief a parallel agent precisely'
      - 'You will hand off the work to a different session'
    when_not_to_use:
      - 'You will execute the task in this same session'
      - 'You need a multi-phase plan (use project-plan)'
      - 'You want to dispatch many tasks (use parallel-dispatch)'
    examples:
      - command: '/atomic-skills:prompt "refactor auth middleware to use new session API"'
        description: 'Generate a precise prompt with file paths and guards'
      - command: '/atomic-skills:prompt'
        description: 'Skill asks for task interactively'
    related: [parallel-dispatch, fix, project-plan]
    tags: [meta, generation, planning]
    ide_compatibility: [claude-code, gemini, cursor]
    requires_args: false
    mutates_repo: false
    network_required: false
    argument_hint: '[task description]'
    one_liner: 'Generate a self-contained prompt with exact paths and guardrails'
    emoji: '📝'
    version_added: '1.0.0'
    args:
      - name: task
        kind: positional
        required: false
        description: 'Task description in natural language. If omitted, skill asks interactively.'
    schema_version: '0.2'

  hunt:
    name: hunt
    title: 'Hunt — Adversarial Tests'
    description: 'Write adversarial tests for existing code to find hidden bugs. Use when code lacks tests or you suspect untested edge cases. Requires a bounded scope — one class or function per run.'
    value_pitch: >
      Asking an agent to "add tests" produces happy-path tests that mirror
      the code — they confirm bugs instead of catching them. `hunt` writes
      adversarial tests whose expected values come from the spec, not the
      implementation (a HARD-GATE rejects any assertion derived from the
      code), and goes deep on one class or function per run instead of
      skimming. It maps every execution path, then tries to break the
      boundaries and error cases the code never anticipated.
    purpose: >
      Write adversarial tests to break code and find hidden bugs.
      Bounded to one class or function per run.
    when_to_use:
      - 'Code lacks tests'
      - 'You suspect untested edge cases'
      - 'Pre-merge quality check'
    when_not_to_use:
      - 'Scope larger than 1 class or function'
      - 'Existing test suite is already comprehensive'
      - 'You want to add features (use prompt instead)'
    examples:
      - command: '/atomic-skills:hunt src/matcher.php'
        description: 'Hunt bugs in a single file'
      - command: '/atomic-skills:hunt src/auth/'
        description: 'Triage mode for directory (max 30 files)'
    related: [fix, review-code]
    tags: [testing, quality, pre-implementation]
    ide_compatibility: [claude-code, gemini, cursor]
    requires_args: true
    mutates_repo: true
    network_required: false
    argument_hint: '<file|dir|function>'
    one_liner: 'Adversarial tests from the spec, not the code — depth over breadth'
    emoji: '🎯'
    version_added: '1.0.0'
    args:
      - name: target
        kind: positional
        required: true
        description: 'File, directory, or function/class to hunt. Directory mode caps at 30 files.'
    dependencies: [git]
    schema_version: '0.2'

  parallel-dispatch:
    name: parallel-dispatch
    title: 'Parallel Dispatch — Independent Tasks'
    description: "Dispatch a user-provided list of independent tasks to N parallel sessions with verified scope isolation and a batch id for tracking. Validates parallelism benefit (Q1-Q4 HARD-GATE) before exploring; proves scope disjointness via pairwise grep before generating prompts. Use when the user brings a consolidated task list — this skill does NOT invent tasks."
    value_pitch: >
      Parallel agents that touch the same files produce merge conflicts and
      wasted runs. `parallel-dispatch` proves scope disjointness via pairwise
      grep *before* launching — verified isolation, not hopeful isolation.
    purpose: >
      Verify, isolate, and dispatch a user-provided task list to N parallel
      sessions. Mechanical scope isolation, batch id, and audit pass.
    when_to_use:
      - 'You have a finalized list of independent tasks'
      - 'Tasks have concrete file-path scopes'
      - 'You will be away while agents run'
    when_not_to_use:
      - 'Work fits in the current session'
      - 'The list is still exploratory'
      - 'Tasks have hard sequential dependencies'
    examples:
      - command: '/atomic-skills:parallel-dispatch task-list.md'
        description: 'Dispatch validated task list'
    related: [parallel-dispatch-audit, prompt]
    tags: [parallelism, dispatch, workflow]
    ide_compatibility: [claude-code]
    requires_args: true
    mutates_repo: true
    network_required: false
    argument_hint: '<task-list.md>'
    one_liner: 'Dispatch a task list to N parallel sessions with verified isolation'
    emoji: '🚀'
    version_added: '1.6.0'
    args:
      - name: task-list
        kind: positional
        required: true
        description: 'Path to the markdown file containing the finalized task list.'
    output_artifacts:
      - '.atomic-skills/dispatches/<batch-id>.md'
    dependencies: [git]
    schema_version: '0.2'

  parallel-dispatch-audit:
    name: parallel-dispatch-audit
    title: 'Parallel Dispatch — Audit'
    description: "Audit the output of a parallel-dispatch batch. Reads the plan file, verifies each agent's deliverables on disk against the user's original request, applies cosmetic fixes, and produces a report with pending decisions. HARD-GATEs on active batch (<2min commits) and read-only mode (≥5 issues). Use after parallel-dispatch agents complete."
    value_pitch: >
      A green commit can sit on top of an empty file, and a still-running
      agent looks identical to a failed one. `parallel-dispatch-audit` opens
      each deliverable on disk and reads the content against the original
      plan — commit messages don't count as proof. It applies cosmetic fixes
      only when the batch is clean; the moment it finds five or more issues
      (or scope drift, a missing deliverable, a destructive op) it flips to
      read-only and escalates with evidence, because piecemeal fixes would
      hide that the plan itself was wrong.
    purpose: >
      Verify each dispatched agent's deliverables on disk against the
      original plan. Cosmetic fixes only; ≥5 issues triggers read-only mode.
    when_to_use:
      - 'A parallel-dispatch batch has completed'
      - 'You need objective verification of agent outputs'
    when_not_to_use:
      - 'Agents are still running (commits less than 2 min old)'
      - 'You want to refactor what agents wrote (out of scope)'
    examples:
      - command: '/atomic-skills:parallel-dispatch-audit onboard-ci'
        description: 'Audit batch by slug'
    related: [parallel-dispatch]
    tags: [parallelism, audit, review, quality]
    ide_compatibility: [claude-code]
    requires_args: false
    mutates_repo: true
    network_required: false
    argument_hint: '[batch-slug]'
    one_liner: 'Verify each batch deliverable on disk; fix or escalate with evidence'
    emoji: '👁️'
    version_added: '1.6.0'
    args:
      - name: slug
        kind: positional
        required: false
        description: 'Batch slug to audit. Defaults to the most recent dispatch.'
    output_artifacts:
      - '.atomic-skills/dispatches/<slug>.md (annotated with audit results)'
    dependencies: [git]
    schema_version: '0.2'

modules:
  codex-bridge: {}
  auto-update: {}
  memory:
    init-memory:
      name: init-memory
      title: 'Init Memory — Persistent Context'
      description: 'Initialize persistent memory structure for cross-session context.'
      value_pitch: >
        Memory often already exists but is scattered across `.memory/`,
        `docs/memory/`, and Claude's auto-memory dir — duplicated,
        contradictory, or never actually read because it was never wired up.
        `init-memory` consolidates it into one indexed `.ai/memory/`, connects
        it via `autoMemoryDirectory` (the durable path, not the fragile
        redirect), and keeps `MEMORY.md` under the 200-line load limit.
        Originals are deleted only after an ls-compare confirms every file
        copied.
      purpose: >
        Bootstrap the persistent memory directory and index so that future
        sessions can pick up where this one left off.
      when_to_use:
        - 'First time using atomic-skills in a project'
        - 'Memory directory missing or corrupted'
        - 'You want to standardize the memory layout'
      when_not_to_use:
        - 'Memory already initialized and healthy'
      examples:
        - command: '/atomic-skills:init-memory'
          description: 'Bootstrap memory in the current project'
      related: [save-and-push]
      tags: [memory, setup]
      ide_compatibility: [claude-code, gemini, cursor]
      requires_args: false
      mutates_repo: true
      network_required: false
      one_liner: 'Consolidate scattered memory into .ai/memory/ and wire it to the IDE'
      emoji: '🧠'
      version_added: '1.0.0'
      output_artifacts:
        - '.ai/memory/MEMORY.md'
      schema_version: '0.2'

# Documentation for the Modules section of README.md. Keys MUST match
# entries under `modules:` above. Order here drives section order in the
# rendered README.
module_meta:
  memory:
    title: 'Memory'
    intro: 'Persistent context across sessions. The agent saves learnings, decisions, and feedback that survive between conversations.'
    features:
      - 'Configurable path (default: `.ai/memory/`)'
      - 'Adds the `atomic-skills:init-memory` skill'
      - "Supports Claude Code's `autoMemoryDirectory` for direct integration (no redirect needed)"
      - 'Available in both project and user scope installations'
  codex-bridge:
    title: 'Codex Bridge'
    version_added: '1.8.0'
    intro: 'Shared infrastructure for the codex sub-flow inside `review-plan` and `review-code`. Asset-only module (no invocable skills of its own) — bundles the 11 templates and checklists consumed by the codex envelope:'
    features:
      - 'Anti-framing directive (literal text injected into every briefing)'
      - 'Pre-flight checks, canonical Codex invocation, output validation checklist'
      - 'Pass 1 / Pass 2 output templates + Pass 2 prompt suffix (reconciliation block)'
      - 'Briefing templates (plan + code) and consolidated review file template'
      - 'Reviews INDEX.md row template'
    notes: 'Assets are installed per-IDE at `<ide-namespace>/_assets/` (e.g. `.claude/commands/atomic-skills/_assets/`) and referenced from the skills via the `{{ASSETS_PATH}}` template variable.'
  auto-update:
    title: 'Auto-Update'
    version_added: '1.8.0'
    intro: 'SessionStart hook that notifies you when a new version is available on npm — without polling or interrupting your flow.'
    features:
      - 'Hook script installed at `~/.atomic-skills/hooks/version-check.sh`'
      - 'Merged into `~/.claude/settings.json` non-destructively (coexists with existing hooks)'
      - '24h TTL on npm checks; async background fetch (0ms perceived latency)'
      - 'Opt-out via `ATOMIC_SKILLS_NO_UPDATE_CHECK=1` env var'
      - 'Configurable TTL via `ATOMIC_SKILLS_UPDATE_CHECK_TTL=<seconds>`'
      - 'Currently covers **Claude Code** only (Cursor, Gemini CLI, Codex, OpenCode, GitHub Copilot have different lifecycles)'
