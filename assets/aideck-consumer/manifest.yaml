# This is THE atomic-skills consumer (one shared consumer, Q10). The project
# skill provisions it verbatim into ~/.aideck/consumers/atomic-skills/ — id
# `atomic-skills`, mcpNamespace `atomic_skills`, title `Atomic Skills` (no
# per-project stamping; see src/provision-consumer.js). Every consuming repo is
# registered as a *project* (POST /api/projects/register) and the dashboard
# scopes by the `:projectId` route param; `root: project` dataSources resolve
# per-project via /api/consumers/atomic-skills/projects/<projectId>/data/<ds>.
#
# DASHBOARD v2 (DS v2.1 widgets, runtime schemaVersion 0.1). Every dataSource
# binds to the DENORMALIZED projection emitted by scripts/emit-consumer-state.js
# (run `npm run emit-state`; re-run on serve / on state mutation). The v0.1
# runtime has NO aggregation/operator/reactive engine, so every count, ratio,
# bucket and relative-time below is PRECOMPUTED into the emitted records; status
# is mapped to a DS tone per-widget via the &statusvocab anchor; selection is
# route navigation (no in-page reactive selection — the client router caps detail
# routes at /:projectId/:slug). See docs/handoffs/atomic-skills-v2-answers.md.
schemaVersion: '0.1'
id: atomic-skills
mcpNamespace: atomic_skills
title: 'Atomic Skills'
icon: 'mdi:clipboard-check'

# Emitted flat state (root: project ⇒ git-tracked AND watched for SSE live-refresh;
# a consumer-dir file is read but never watched). Each file is a bare JSON array.
dataSources:
  - { id: projects,    path: '.atomic-skills/.aideck/state/projects.json',    format: json, root: project }
  - { id: plans,       path: '.atomic-skills/.aideck/state/plans.json',        format: json, root: project }
  - { id: phases,      path: '.atomic-skills/.aideck/state/phases.json',       format: json, root: project }
  - { id: initiatives, path: '.atomic-skills/.aideck/state/initiatives.json',  format: json, root: project }
  - { id: tasks,       path: '.atomic-skills/.aideck/state/tasks.json',         format: json, root: project }
  - { id: gates,       path: '.atomic-skills/.aideck/state/gates.json',         format: json, root: project }
  - { id: phaseGates,  path: '.atomic-skills/.aideck/state/phaseGates.json',    format: json, root: project }
  - { id: stack,       path: '.atomic-skills/.aideck/state/stack.json',         format: json, root: project }
  - { id: parked,      path: '.atomic-skills/.aideck/state/parked.json',        format: json, root: project }
  - { id: emerged,     path: '.atomic-skills/.aideck/state/emerged.json',       format: json, root: project }
  - { id: totals,      path: '.atomic-skills/.aideck/state/totals.json',        format: json, root: project }
  # Skill catalog projection (scripts/generate-catalog-json.js) → the Ajuda page.
  - { id: catalog,     path: 'meta/catalog.json', format: json, root: project }
  # Inbox: the MCP mutation handlers append intents here (jsonl ⇒ a writable dir).
  - { id: inbox,       path: '.atomic-skills/bootstrap-drafts/inbox/*.jsonl', format: jsonl, root: project }

nav:
  style: tabs
  showIcons: true

pages:
  # ── FOCO (default) — "onde estou agora", uma frente-card por plano ATIVO. ─────
  # A card per active plan (repeat: slug); its body composes the macro phase
  # stepper (scoped to THIS plan's phases via $parent), the current-phase task
  # meter, and the próxima-ação callout — all precomputed onto the plan record.
  - slug: foco
    title: 'Foco'
    icon: 'mdi:target'
    default: true
    layout: sections
    sections:
      - title: 'Frentes em foco'
        widgets:
          - widget: card
            colSpan: 12
            source: { ref: plans, filter: { status: active } }
            repeat: slug
            repeatLabelField: title   # group header = plan title; auto-hidden for 1 active plan, shown for ≥2
            repeatDirection: vertical
            config:
              titleField: title
              subtitleField: currentPhaseText
              linkTo: 'plan/:projectId/:slug'
            slots:
              body:
                # Macro phase track for THIS plan. $parent = the plan record, so the
                # filter scopes phases to it (the runtime can't join plan→phase).
                - widget: stepper
                  source: { ref: phases, filter: { projectId: '$parent.projectId', planSlug: '$parent.slug' } }
                  config:
                    orientation: horizontal
                    idField: id
                    labelField: title
                    statusField: status
                    dependsOnField: dependsOn
                    metricField: tasksText
                    currentField: isCurrent
                    linkTo: 'phase/:projectId/:slug'   # each step → its initiative detail
                    # Consumer status vocabulary (§2 "own your words"): defined here as a
                    # YAML anchor and aliased (*statusvocab) by every later status widget,
                    # so this anchor must stay above its first alias (document order).
                    statuses: &statusvocab
                      active:   { tone: info,    glyph: '◉' }
                      pending:  { tone: neutral, glyph: '·' }
                      paused:   { tone: warning, glyph: '‖' }
                      blocked:  { tone: error,   glyph: '!' }
                      done:     { tone: success, glyph: '✓' }
                      archived: { tone: neutral, glyph: '▪', label: 'archived' }
                      met:      { tone: success, glyph: '✓' }
                      deferred: { tone: warning, glyph: '⏸' }
                # Tasks of the current phase (precomputed onto the plan record).
                - widget: progress-bar
                  config:
                    label: 'Tasks da fase atual'
                    valueField: focusTasksPct
                    max: 100
                    valueTextField: focusTasksText   # "5/12"
                    captionField: focusMeta          # "gates 1/1 · 1 frame"
                # Próxima ação — the one actionable next step.
                - widget: callout
                  config: { eyebrow: 'PRÓXIMA AÇÃO', bodyField: nextText, tone: info }
      - title: 'Suspenso & travado'
        widgets:
          - widget: table
            colSpan: 12
            # `suspended` = precomputed bucket boolean (paused|blocked) — replaces
            # the array-OR filter the v0.1 runtime silently zeros out.
            source: { ref: plans, filter: { suspended: true } }
            config:
              columns: [title, status, currentPhaseText, nextText]
              linkTo: 'plan/:projectId/:slug'
              linkField: title
              statuses: *statusvocab
              emptyNote: 'Nada suspenso ou travado.'

  # ── PANORAMA — landing cross-project: totais + grid de projetos. ─────────────
  - slug: panorama
    title: 'Panorama'
    icon: 'mdi:view-dashboard'
    layout: sections
    sections:
      - title: 'Panorama'
        columns: 12
        gap: 16
        widgets:
          # Cross-cutting totals: precomputed single-record source, one stat per field
          # (the runtime can't aggregate across sources or count boolean fields).
          - widget: stat
            colSpan: 3
            source: { ref: totals }
            config: { value: 'field(projetos)', label: 'PROJETOS' }
          - widget: stat
            colSpan: 3
            source: { ref: totals }
            config: { value: 'field(frentesAtivas)', label: 'FRENTES ATIVAS', tone: info }
          - widget: stat
            colSpan: 3
            source: { ref: totals }
            config: { value: 'field(emParalelo)', label: 'EM PARALELO', tone: info }
          - widget: stat
            colSpan: 3
            source: { ref: totals }
            config: { value: 'field(tasksTravadas)', label: 'TASKS TRAVADAS', tone: error }
      - title: 'Projetos'
        widgets:
          - widget: collection-grid
            colSpan: 12
            source: { ref: projects }
            config:
              minColWidth: 340
              titleField: name
              badgeField: mode                          # "paralelo N" | "isolado" | "ocioso"
              badgeToneField: parallelTone
              fields: [plansSummary, phasesActiveText]
              live: { when: hasActiveFront }
              attention: { when: blockedCount, gt: 0, tone: error }
              statuses: *statusvocab
            slots:
              body:
                # Frentes vivas do projeto (até o que houver) — $parent = o projeto.
                - widget: status-list
                  source: { ref: plans, filter: { projectId: '$parent.id', status: active } }
                  config:
                    idField: slug
                    labelField: title
                    statusField: status
                    statuses: *statusvocab

  # ── PLANOS — portfolio: stats + tabela + grid por projeto. ───────────────────
  - slug: planos
    title: 'Planos'
    icon: 'mdi:format-list-checks'
    layout: sections
    sections:
      - title: 'Portfolio'
        columns: 12
        gap: 16
        widgets:
          # `count(field=value)` is the StatWidget's own single-equality expression
          # (string field only — booleans go through totals above).
          - widget: stat
            colSpan: 3
            source: { ref: plans }
            config: { value: 'count(status=active)', label: 'Ativas', tone: info }
          - widget: stat
            colSpan: 3
            source: { ref: plans }
            config: { value: 'count(status=paused)', label: 'Pausadas', tone: warning }
          - widget: stat
            colSpan: 3
            source: { ref: plans }
            config: { value: 'count(status=done)', label: 'Concluídas', tone: success }
          - widget: stat
            colSpan: 3
            source: { ref: plans }
            config: { value: 'count(status=archived)', label: 'Arquivadas' }
      - title: 'Todos os planos'
        widgets:
          - widget: table
            colSpan: 12
            source: { ref: plans }
            config:
              columns: [title, status, currentPhaseText, branch, projectId]
              linkTo: 'plan/:projectId/:slug'
              linkField: title
              statuses: *statusvocab
              emptyNote: 'Nenhum plano rastreado ainda — rode a skill project para começar.'
      - title: 'Por projeto'
        widgets:
          - widget: collection-grid
            colSpan: 12
            source: { ref: plans }
            repeat: projectId
            repeatDirection: vertical
            config:
              minColWidth: 300
              titleField: title
              subtitleField: currentPhaseText
              badgeField: status
              badgeToneField: status
              fields: [branch]
              linkTo: 'plan/:projectId/:slug'
              statuses: *statusvocab

  # ── PLAN detail (drill-down, /plan/:projectId/:slug). ────────────────────────
  - slug: plan
    title: 'Detalhe do plano'
    icon: 'mdi:file-tree-outline'
    layout: sections
    sections:
      - title: 'Plano'
        widgets:
          # Selector in place of tabs: selection = navigation (RouterLinks); current
          # resolved from the route. Switches between the live plans.
          - widget: record-switcher
            colSpan: 12
            source: { ref: plans, filter: { liveFront: true } }
            config:
              idField: slug
              paramField: slug
              titleField: title
              captionField: switcherCaption
              statusField: status
              linkTo: 'plan/:projectId/:slug'
              statuses: *statusvocab
          - widget: key-value
            colSpan: 12
            source: { ref: plans, param: { match: [projectId, slug] } }
            config:
              fields: [status, currentPhaseText, branch, started, lastUpdated]
              statuses: *statusvocab
      - title: 'Roteiro'
        widgets:
          # Vertical selectable roteiro: each step links to its initiative detail
          # (route-driven selection — the v0.1-native equivalent of $selectedPhase).
          - widget: stepper
            colSpan: 12
            source: { ref: phases, param: { match: [projectId, { field: planSlug, param: slug }] } }
            config:
              orientation: vertical
              selectable: true
              idField: id
              labelField: title
              statusField: status
              dependsOnField: dependsOn
              metricField: tasksText
              currentField: isCurrent
              linkTo: 'phase/:projectId/:slug'
              statuses: *statusvocab
      - title: 'Exit gates da fase'
        widgets:
          - widget: table
            colSpan: 12
            source: { ref: phaseGates, param: { match: [projectId, { field: planSlug, param: slug }] } }
            config:
              columns: [phaseId, id, description, status, verifierLabel, evidenceSummary]
              statuses: *statusvocab
              emptyNote: 'Sem exit gates de fase.'

  # ── PHASE / Initiative detail (drill-down, /phase/:projectId/:slug). ─────────
  - slug: phase
    title: 'Detalhe da iniciativa'
    icon: 'mdi:flag-checkered'
    layout: sections
    sections:
      - title: 'Iniciativa'
        widgets:
          - widget: callout
            colSpan: 12
            source: { ref: initiatives, param: { match: [projectId, slug] } }
            config: { variant: attention, eyebrow: 'PRÓXIMA AÇÃO', bodyField: nextText }
          - widget: key-value
            colSpan: 12
            source: { ref: initiatives, param: { match: [projectId, slug] } }
            config:
              fields: [status, phaseId, parentPlan, lastUpdated]
              statuses: *statusvocab
      - title: 'Tasks'
        widgets:
          # Grouped by status (precomputed `blockedByText` as the annotation).
          - widget: status-list
            colSpan: 12
            source: { ref: tasks, param: { match: [projectId, { field: initiativeId, param: slug }] } }
            config:
              idField: id
              labelField: title
              statusField: status
              annotationField: blockedByText
              groupBy: status
              groupOrder: [active, blocked, pending, done]
              statuses: *statusvocab
      - title: 'Exit gates'
        widgets:
          - widget: status-list
            colSpan: 12
            source: { ref: gates, param: { match: [projectId, { field: initiativeId, param: slug }] } }
            config:
              idField: id
              labelField: description
              statusField: status
              annotationField: verifierLabel
              statuses: *statusvocab
      - title: 'Stack, parked & emerged'
        columns: 12
        gap: 16
        widgets:
          - widget: list
            colSpan: 4
            source: { ref: stack, param: { match: [projectId, { field: initiativeId, param: slug }] } }
            config: { title: 'Stack', titleField: title, subtitleField: type, emptyNote: 'Stack vazia.' }
          - widget: list
            colSpan: 4
            source: { ref: parked, param: { match: [projectId, { field: initiativeId, param: slug }] } }
            config: { title: 'Parked', titleField: title, emptyNote: 'Nada parqueado.' }
          - widget: list
            colSpan: 4
            source: { ref: emerged, param: { match: [projectId, { field: initiativeId, param: slug }] } }
            config: { title: 'Emerged', titleField: title, emptyNote: 'Nada emergido.' }

  # ── CONCLUÍDOS (layout: single) — tabela de planos done/archived. ────────────
  - slug: concluidos
    title: 'Concluídos'
    icon: 'mdi:check-all'
    layout: single
    widget: table
    source: { ref: plans, filter: { concluded: true } }
    config:
      columns: [title, status, phasesText, updatedRel]
      linkTo: 'plan/:projectId/:slug'
      linkField: title
      statuses: *statusvocab
      emptyNote: 'Nada concluído ainda.'

  # ── AJUDA (layout: single) — catálogo de skills (master-detail interno). ─────
  - slug: help
    title: 'Ajuda'
    icon: 'mdi:help-circle-outline'
    layout: single
    widget: catalog
    source: { ref: catalog }
    config: {}

# MCP tools — registered as aideck_atomic_skills_<name>. Script handlers read the
# pre-loaded data map (the emitted flat state, project-scoped) and, for mutations,
# append an intent to the repo's .atomic-skills/bootstrap-drafts/inbox/ which the
# atomic-skills skill applies.
tools:
  - name: mark_task_done
    description: 'Record an intent to mark a task done; returns phaseCompleteHint when it was the last open task.'
    input:
      type: object
      required: [initiativeSlug, taskId]
      properties:
        initiativeSlug: { type: string }
        taskId: { type: string }
        # Optional: disambiguates a slug shared across projects/<id>/ (F-001). Omit
        # in a single-project repo; required only when a slug collides.
        projectId: { type: string }
        verifierResultId: { type: string }
        by: { type: string, enum: [human, ai] }
    handler: { type: script, source: handlers/mark-task-done.js }

  - name: verify_exit_gate
    description: 'Record an exit-gate criterion result (met|deferred) on a plan phase or initiative; hints allGatesMet. A failed verification leaves the criterion pending — gate status is pending/met/deferred only.'
    input:
      type: object
      required: [criterionId, result]
      properties:
        initiativeSlug: { type: string }
        planSlug: { type: string }
        phaseId: { type: string }
        projectId: { type: string }   # optional project scope (F-001)
        criterionId: { type: string }
        result: { type: string, enum: [met, deferred] }
        deferredReason: { type: string }
        evidence: { type: object }
        by: { type: string, enum: [human, ai] }
    handler: { type: script, source: handlers/verify-exit-gate.js }

  - name: get_next_action
    description: 'Compute the next recommended action across plans and initiatives.'
    input:
      type: object
      properties:
        planSlug: { type: string }
        initiativeSlug: { type: string }
        projectId: { type: string }   # optional project scope (F-001)
    handler: { type: script, source: handlers/get-next-action.js }

  - name: get_dependencies
    description: 'Resolve dependencies for a phase (plan) or task (initiative).'
    input:
      type: object
      required: [scope]
      properties:
        scope: { type: string, enum: [phase, task] }
        planSlug: { type: string }
        phaseId: { type: string }
        initiativeSlug: { type: string }
        taskId: { type: string }
        projectId: { type: string }   # optional project scope (F-001)
    handler: { type: script, source: handlers/get-dependencies.js }

  - name: health
    description: 'Cross-entity health: stale initiatives, unmet gates, unconsumed inbox intents.'
    input:
      type: object
      properties:
        staleDays: { type: number }
    handler: { type: script, source: handlers/health.js }

  - name: pop_frame
    description: 'Record an intent to pop the top stack frame from an initiative.'
    input:
      type: object
      required: [initiativeSlug]
      properties:
        initiativeSlug: { type: string }
        destination: { type: string }
        projectId: { type: string }   # optional project scope (F-001)
        by: { type: string, enum: [human, ai] }
    handler: { type: script, source: handlers/pop-frame.js }

  - name: promote_parked
    description: 'Record an intent to promote a parked item (by title or index) to a task.'
    input:
      type: object
      required: [initiativeSlug, parkedTitleOrIndex]
      properties:
        initiativeSlug: { type: string }
        parkedTitleOrIndex: {}
        projectId: { type: string }   # optional project scope (F-001)
        by: { type: string, enum: [human, ai] }
    handler: { type: script, source: handlers/promote-parked.js }
