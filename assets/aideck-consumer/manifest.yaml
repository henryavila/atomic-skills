# This is THE atomic-skills consumer (one shared consumer, Q10). The project
# skill provisions it verbatim into ~/.aideck/consumers/atomic-skills/ — id
# `atomic-skills`, mcpNamespace `atomic_skills`, title `Atomic Skills` (no
# per-project stamping; see src/provision-consumer.js). Every consuming repo is
# registered as a *project* (POST /api/projects/register) and the dashboard
# scopes by the `:projectId` route param; `root: project` dataSources resolve
# per-project via /api/consumers/atomic-skills/projects/<projectId>/data/<ds>.
#
# DASHBOARD v2 on the aiDeck v0.1 ENGINE (DS v2.1 widgets, schemaVersion 0.1).
# The runtime now computes read-time aggregation (`source: { agg, where, of }`),
# array-membership filters (`status: [active, paused]`), a top-level `statusMap`
# (consumer status words → DS tones, declared once), `repeat: { ref, filter }`
# fan-out, a chrome `?` help button (`help:`) and a ⌘K record palette
# (`commandPalette.records`). So this manifest binds those capabilities directly
# instead of precomputing counts/buckets — the emitter (scripts/emit-consumer-
# state.js) now only writes per-record rollups + relationship/flag fields aiDeck
# cannot derive (a join engine is out of scope). See the engine contract in
# /home/henry/aideck/docs/handoffs/to-atomic-skills-v2-engine-contracts.md.
#
# Detail pages scope by route params (param.match) AND the cross-widget page-state
# bus: the plan roteiro stepper `emits: { select: { set: selectedPhase } }`, and the
# folded "Fase selecionada"/"Backlog da fase" widgets read it via param.match
# `{ field, state }`. The client router caps detail routes at
# /:consumerId/:pageSlug/:projectId/:slug.
schemaVersion: '0.1'
id: atomic-skills
mcpNamespace: atomic_skills
title: 'Atomic Skills'
icon: '📋'

# Project-centric shell (aiDeck nav.style: 'projects'): pins the Panorama landing
# at the top, then lists the registered PROJETOS in the sidebar; selecting a project
# scopes the per-project pages (foco-agora/visão-geral/plano/concluídos). The group
# label is consumer-owned (manifest-provided, never hardcoded in aiDeck). The chrome
# `?` opens the help (catálogo) page; help is showInNav:false (off the sidebar).
nav:
  style: projects
  showIcons: true
  projectsLabel: 'PROJETOS'
  landingPage: panorama
help: help

# Consumer status vocabulary → DS tones, declared ONCE (§A4). Threaded to every
# status-rendering widget as the default; a widget's own config.statuses would
# still win per-key, but none repeat it anymore. Domain words stay consumer-owned.
statusMap:
  active:   { tone: info,    glyph: '◉' }
  pending:  { tone: neutral, glyph: '·' }
  paused:   { tone: warning, glyph: '‖' }
  blocked:  { tone: error,   glyph: '!' }
  done:     { tone: success, glyph: '✓' }
  archived: { tone: neutral, glyph: '▪', label: 'archived' }
  met:      { tone: success, glyph: '✓' }
  deferred: { tone: warning, glyph: '⏸' }

# ⌘K palette indexes records (titled by titleField, navigating to the resolved
# route — :consumerId + record-field tokens). Records appear above pages (§A9).
# Only plans are indexed: the phase/initiative detail folds into the plan page
# (no /phase route), so an initiative record has nowhere of its own to navigate.
commandPalette:
  records:
    - { ref: plans, titleField: title, subtitleField: branch, route: '/:consumerId/plan/:projectId/:slug' }

# Emitted flat state (root: project ⇒ git-tracked AND watched for SSE live-refresh;
# a consumer-dir file is read but never watched). Each file is a bare JSON array.
dataSources:
  - { id: projects,    path: '.atomic-skills/.aideck/state/projects.json',    format: json, root: project }
  - { id: plans,       path: '.atomic-skills/.aideck/state/plans.json',        format: json, root: project }
  - { id: phases,      path: '.atomic-skills/.aideck/state/phases.json',       format: json, root: project }
  - { id: initiatives, path: '.atomic-skills/.aideck/state/initiatives.json',  format: json, root: project }
  - { id: tasks,       path: '.atomic-skills/.aideck/state/tasks.json',         format: json, root: project }
  - { id: gates,       path: '.atomic-skills/.aideck/state/gates.json',         format: json, root: project }
  - { id: phaseGates,  path: '.atomic-skills/.aideck/state/phaseGates.json',    format: json, root: project }
  - { id: stack,       path: '.atomic-skills/.aideck/state/stack.json',         format: json, root: project }
  - { id: parked,      path: '.atomic-skills/.aideck/state/parked.json',        format: json, root: project }
  - { id: emerged,     path: '.atomic-skills/.aideck/state/emerged.json',       format: json, root: project }
  # Forecast earned-value series + SPI — precomputed per-plan (planSlug) by
  # emit-consumer-state.js (buildSeries); the v0.1 runtime has no series-aggregation
  # engine, so the manifest binds these bare arrays directly (no read-time agg).
  - { id: burnup,      path: '.atomic-skills/.aideck/state/burnup.json',        format: json, root: project }
  - { id: spi,         path: '.atomic-skills/.aideck/state/spi.json',           format: json, root: project }
  # Skill catalog projection (scripts/generate-catalog-json.js) → the Ajuda page.
  - { id: catalog,     path: 'meta/catalog.json', format: json, root: project }
  # Inbox: the MCP mutation handlers append intents here (jsonl ⇒ a writable dir).
  - { id: inbox,       path: '.atomic-skills/bootstrap-drafts/inbox/*.jsonl', format: jsonl, root: project }

pages:
  # ── PANORAMA (default landing) — cross-project: totais + grid de projetos. ────
  # The landing has NO selected project, so every source reads scope: all-projects
  # (aiDeck merges every registered project, tagging each record with the
  # registered projectId). default: true + first position ⇒ opens at /atomic-skills
  # and sits at the top of the sidebar.
  - slug: panorama
    title: 'Panorama'
    icon: '🗺️'
    default: true
    layout: sections
    sections:
      # Untitled lead section — the page header ("Atomic Skills · Panorama")
      # already names it; a "Panorama" section title here just duplicates it.
      - columns: 12
        gap: 16
        widgets:
          # §A5 read-time aggregation + cross-project scope: each stat merges
          # EVERY registered project (scope: all-projects) and counts on read.
          - widget: stat
            colSpan: 3
            source: { ref: projects, scope: all-projects, agg: count }
            config: { label: 'PROJETOS' }
          - widget: stat
            colSpan: 3
            source: { ref: plans, scope: all-projects, agg: count, where: { status: active } }
            config: { label: 'FRENTES ATIVAS', tone: info }
          - widget: stat
            colSpan: 3
            # EM PARALELO = projects running >1 active front (activeCount is a
            # per-record rollup the emitter still writes — aiDeck only counts it).
            source: { ref: projects, scope: all-projects, agg: count, where: { activeCount: { gt: 1 } } }
            config: { label: 'EM PARALELO', tone: info }
          - widget: stat
            colSpan: 3
            source: { ref: tasks, scope: all-projects, agg: count, where: { blocked: true } }
            config: { label: 'TASKS TRAVADAS', tone: error }
      - title: 'Projetos'
        widgets:
          - widget: collection-grid
            colSpan: 12
            # One card per registered project (cross-repo overview). Renders the DS
            # record-card preset (rc-head/body/foot) exactly — incl. per-row hover.
            source: { ref: projects, scope: all-projects }
            config:
              minColWidth: 340
              titleField: name
              linkTo: 'foco-agora?project=:id'          # title-link → enter the project's Foco
              dotToneField: dotTone                     # leading status dot (error/info/neutral)
              badgeField: mode                          # "paralelo N" | "isolado" | "ocioso"
              badgeToneField: parallelTone
              # Metric strip (value-on-top + label): plans summary · active phases · blocked (red).
              fields: [plansSummary, phasesActiveText, blockedCount]
              fieldLabels: ['planos', 'fases ativas', 'travadas']
              alertField: blockedCount
              # Nested "frentes vivas" mini-list — denormalized onto the project record
              # by emit-consumer-state.js (the dashboard can't join). 2-line rows:
              # dot · (title / next-action) · phase code. Each row links to the plan.
              nestedField: fronts
              nestedTitleField: title
              nestedSubField: nextAction
              nestedCodeField: phaseId
              nestedDotToneField: dotTone
              nestedLinkTo: 'plan/:projectId/:slug'
              nestedLabel: 'frentes vivas'
              moreField: moreText                       # "+N frente(s)" overflow
              idleField: idleText                       # "sem planos ainda" / "sem frente ativa"
              footerField: updatedRel                   # "3d" + LIVE pill (when hasActiveFront)
              live: { when: hasActiveFront }
              attention: { when: blockedCount, gt: 0, tone: error }

  # ── FOCO AGORA — "onde estou agora", uma frente-card por plano ATIVO (do projeto).
  # Project-scoped (no scope: all-projects ⇒ the selected project). Leads with the
  # parallelism banner, then §A8 object-form repeat: ONE card instance per active
  # plan; its body composes the macro phase stepper (scoped to THIS plan via $parent
  # — the runtime can't join plan→phase), the current-phase task meter, and the
  # próxima-ação callout — all read off the repeat (plan) record.
  - slug: foco-agora
    title: 'Foco agora'
    icon: '🎯'
    layout: sections
    sections:
      # Parallelism banner: big number = nº de frentes (source.length), uma faixa
      # tonalizada por frente (laneStatusField). title/sub são TEXTO LITERAL no
      # HeadlineBannerWidget (não field-ref), então ficam fixos aqui.
      - widgets:
          - widget: headline-banner
            colSpan: 12
            source: { ref: plans, filter: { status: [active, paused] } }
            config:
              title: 'Frentes do projeto'
              sub: 'ativas e suspensas — uma faixa por frente, tonalizada pelo status'
              tone: info
              laneStatusField: status
              laneTitleField: title
      - title: 'Frentes em foco'
        subtitle: 'onde estou — fase atual e próxima ação de cada frente viva'
        widgets:
          # One record-card per active plan, laid out in the DS .cgrid (auto-fit
          # grid — cards sit side by side). The card BODY is composed from inline
          # (frame:false) slot widgets so the phase track + tasks + próxima-ação
          # flow inside a single rcard, matching the design (not nested boxes).
          - widget: collection-grid
            colSpan: 12
            source: { ref: plans, filter: { status: active } }
            config:
              minColWidth: 360
              titleField: title
              subField: currentPhaseText        # rc-sub (current phase)
              linkTo: 'plan/:projectId/:slug'   # title-link → plan detail
              footerField: updatedRel           # rc-foot timestamp ("3d")
              live: { when: status }            # active cards carry the live pill
            slots:
              body:
                # roteiro de fases — macro phase track (inline hstep). $parent = the
                # card (plan) record, so the filter scopes phases to it.
                - widget: stepper
                  source: { ref: phases, filter: { projectId: '$parent.projectId', planSlug: '$parent.slug' } }
                  config:
                    frame: false                # inline, no widget box
                    orientation: horizontal
                    label: 'roteiro de fases'
                    summaryLabel: 'concluídas'
                    idField: id
                    labelField: title
                    statusField: status
                    dependsOnField: dependsOn
                    metricField: tasksText
                    currentField: isCurrent
                    # Each phase marker links to the plan detail, opened directly at
                    # that phase (?phase=<id> seeds the detail's selectedPhase bus).
                    linkTo: 'plan/:projectId/:planSlug?phase=:id'
                # Tasks of the current phase (precomputed onto the plan record).
                - widget: progress-bar
                  config:
                    frame: false                # inline pblock
                    label: 'Tasks da fase atual'
                    valueField: focusTasksPct
                    max: 100
                    valueTextField: focusTasksText   # "5/12"
                    captionField: focusMeta          # "gates 1/1 · 1 frame"
                # Próxima ação — the one actionable next step (callout is already inline).
                - widget: callout
                  config: { eyebrow: 'PRÓXIMA AÇÃO', bodyField: nextText, tone: info }
      - title: 'Suspenso & travado'
        subtitle: 'o que não está andando — e por quê'
        widgets:
          - widget: table
            colSpan: 12
            # §A6 array membership replaces the old precomputed `suspended` bucket.
            source: { ref: plans, filter: { status: [paused, blocked] } }
            config:
              columns: [title, status, currentPhaseText, nextText]
              columnLabels:
                title: 'Frente'
                status: 'Status'
                currentPhaseText: 'Fase atual'
                nextText: 'Próxima ação'
              linkTo: 'plan/:projectId/:slug'
              linkField: title
              emptyNote: 'Nada suspenso ou travado.'

  # ── VISÃO GERAL — métricas do projeto selecionado + tabela de frentes vivas. ──
  # Project-scoped (no scope: all-projects ⇒ the selected project). §A5 read-time
  # aggregation: count/ratio via source.agg, injected into the stat as config.value.
  - slug: visao-geral
    title: 'Visão geral'
    icon: '🗂️'
    layout: sections
    sections:
      - title: 'Métricas do projeto'
        columns: 12
        gap: 16
        widgets:
          - widget: stat
            colSpan: 2
            source: { ref: plans, agg: count, where: { status: active } }
            config: { label: 'FRENTES ATIVAS', tone: info }
          - widget: stat
            colSpan: 2
            source: { ref: plans, agg: count, where: { status: paused } }
            config: { label: 'SUSPENSAS', tone: warning }
          - widget: stat
            colSpan: 2
            source: { ref: phases, agg: count, where: { status: active } }
            config: { label: 'FASES ATIVAS' }
          - widget: stat
            colSpan: 2
            # ratio numerator predicate is a STRING ("field==value"); shows "31%".
            source: { ref: tasks, agg: ratio, of: 'status==done' }
            config: { label: 'TASKS' }
          - widget: stat
            colSpan: 2
            source: { ref: gates, agg: ratio, of: 'status==met' }
            config: { label: 'EXIT GATES' }
          - widget: stat
            colSpan: 2
            source: { ref: tasks, agg: count, where: { blocked: true } }
            config: { label: 'TASKS TRAVADAS', tone: error }
      - title: 'Frentes vivas'
        widgets:
          - widget: table
            colSpan: 12
            source: { ref: plans, filter: { status: [active, paused, blocked] } }
            config:
              columns: [title, status, currentPhaseText, nextText, updatedRel]
              columnLabels:
                title: 'Frente'
                status: 'Status'
                currentPhaseText: 'Fase atual'
                nextText: 'Próxima ação'
                updatedRel: 'Atualizado'
              linkTo: 'plan/:projectId/:slug'
              linkField: title
              emptyNote: 'Nenhuma frente aberta — veja Concluídas recentes ou Arquivados.'
      - title: 'Concluídas recentes'
        widgets:
          - widget: table
            colSpan: 12
            source: { ref: plans, filter: { status: done } }
            config:
              columns: [title, status, phasesText, updatedRel]
              columnLabels:
                title: 'Frente'
                status: 'Status'
                phasesText: 'Fases'
                updatedRel: 'Atualizado'
              linkTo: 'plan/:projectId/:slug'
              linkField: title
              emptyNote: 'Nenhuma conclusão recente.'

  # ── PLAN detail (drill-down, /plan/:projectId/:slug). ────────────────────────
  - slug: plan
    title: 'Detalhe do plano'
    icon: '🌳'
    layout: sections
    # In the sidebar (após Visão geral, antes de Arquivados), como no design. Opened
    # from the nav it arrives with no :slug; the record-switcher below self-selects
    # the first live plan (router.replace → /plan/:projectId/:slug) so the page opens
    # populated instead of empty. Also reachable by clicking a plan or via ⌘K.
    sections:
      # ── Title row = the plan selector. record-switcher renders the plan title
      # AND switches between the live plans (selection navigates). No separate
      # key-value meta block — the design carries branch in the switcher caption
      # and status in the switcher chip (manifest.sample §plan, section 1).
      - widgets:
          - widget: record-switcher
            colSpan: 12
            source: { ref: plans, filter: { status: [active, paused] } }
            config:
              idField: slug
              paramField: slug
              titleField: title
              captionField: switcherCaption
              statusField: status
              # Opened from the sidebar (no :slug), self-select the ACTIVE plan
              # (not just the first in source order, which may be paused).
              defaultStatus: active
              linkTo: 'plan/:projectId/:slug'

      # ── Master-detail (THE hero of this screen): roteiro on the left, the
      # selected phase's detail on the right. The vertical stepper writes
      # pageState.selectedPhase (seeded to the current phase on load); the right
      # card re-scopes to that phase reactively. Two columns of a 12-grid: 5 | 7.
      - columns: 12
        gap: 16
        widgets:
          # LEFT (5/12) — selectable roteiro with dependencies + per-phase task
          # metric. Selecting a phase drives the detail card; no linkTo (that would
          # navigate instead of select).
          - widget: stepper
            colSpan: 5
            source: { ref: phases, param: { match: [projectId, { field: planSlug, param: slug }] } }
            emits: { select: { set: selectedPhase } }
            config:
              label: 'Roteiro de fases'
              orientation: vertical
              selectable: true
              idField: id
              # Rail circle reads the phase id (F0, F1…) so it agrees with the
              # card's "at <id>" meta and the "depends on <id>" lines — one
              # numbering scheme instead of circle-ordinal vs id.
              circleField: id
              labelField: title
              statusField: status
              dependsOnField: dependsOn
              metricField: tasksText
              currentField: isCurrent
              # Deep-link target: when arrived at via a phase marker (?phase=<id>),
              # open with that phase selected instead of the current one.
              selectParam: phase
          # RIGHT (7/12) — the SELECTED phase as one record-detail card. Source is
          # the phase's initiative (1 record via the selectedPhase bus). The head
          # shows the phase name + "F1 · fase atual"; a TASKS/GATES/STACK metric
          # strip; then a composed body (próxima-ação callout · task status-list ·
          # exit-gate checklist). Body widgets bind to the card record via $parent
          # — the same composition pattern as the Foco agora card.
          - widget: collection-grid
            colSpan: 7
            source: { ref: initiatives, param: { match: [projectId, { field: planSlug, param: slug }, { field: phaseId, state: selectedPhase }] } }
            config:
              minColWidth: 280
              titleField: title
              subField: selectedPhaseLabel
              fields: [tasksText, gatesText, stackText]
              fieldLabels: ['TASKS', 'GATES', 'STACK']
            slots:
              body:
                # Próxima ação — the one actionable next step for this phase.
                # titleField:'' suppresses the default `title` field so the callout
                # shows ONLY the eyebrow + próxima-ação body (the card head already
                # names the phase — no redundant title line). For a done phase
                # nextText is empty → eyebrow-only → the callout collapses to nothing.
                - widget: callout
                  config: { eyebrow: 'PRÓXIMA AÇÃO', bodyField: nextText, titleField: '', tone: info }
                # Tasks of the phase, grouped by status (active → blocked → pending → done).
                - widget: status-list
                  source: { ref: tasks, filter: { projectId: '$parent.projectId', planSlug: '$parent.planSlug', phaseId: '$parent.phaseId' } }
                  config:
                    title: 'Tasks da fase'
                    idField: id
                    labelField: title
                    statusField: status
                    annotationField: blockedByText
                    groupBy: status
                    groupOrder: [active, blocked, pending, done]
                # Exit-gate criteria as a checklist (square mark · criterion · verifier).
                - widget: status-list
                  source: { ref: phaseGates, filter: { projectId: '$parent.projectId', planSlug: '$parent.planSlug', phaseId: '$parent.phaseId' } }
                  config:
                    title: 'Exit gates'
                    variant: checklist
                    idField: id
                    labelField: description
                    statusField: status
                    metaField: verifierLabel
      # ── Backlog da fase (folded from the phase page): stack/parked/emerged of the
      # selected phase's initiative, re-scoped via the same bus + route. stack/
      # parked/emerged carry projectId + planSlug + phaseId (emit-consumer-state.js).
      - title: 'Backlog da fase'
        columns: 12
        gap: 16
        widgets:
          - widget: list
            colSpan: 4
            source: { ref: stack, param: { match: [projectId, { field: planSlug, param: slug }, { field: phaseId, state: selectedPhase }] } }
            config: { title: 'Stack', titleField: title, subtitleField: type, emptyNote: 'Stack vazia.' }
          - widget: list
            colSpan: 4
            source: { ref: parked, param: { match: [projectId, { field: planSlug, param: slug }, { field: phaseId, state: selectedPhase }] } }
            config: { title: 'Parked', titleField: title, emptyNote: 'Nada parqueado.' }
          - widget: list
            colSpan: 4
            source: { ref: emerged, param: { match: [projectId, { field: planSlug, param: slug }, { field: phaseId, state: selectedPhase }] } }
            config: { title: 'Emerged', titleField: title, emptyNote: 'Nada emergido.' }
      # ── Ritmo (burn-up / earned-value): ganho acumulado vs a linha planejada até o
      # deadline do plano, + o SPI. Séries pré-computadas em burnup.json/spi.json
      # (o engine v0.1 não agrega séries) e scoped ao plano da rota (projectId +
      # planSlug). plannedValue/SPI são null sem `deadline` no plano → a linha
      # planejada e o SPI ficam em 0 (tolerância a null do runtime) e ganham sentido
      # quando o plano declara deadline. SPI via `gauge`/`key-value` (valueField/
      # fields): `stat` só computa via `value: count()/field()`, aposentado no
      # contrato v2.1 — gauge é o widget publicado p/ um escalar pré-computado.
      - title: 'Ritmo'
        columns: 12
        gap: 16
        widgets:
          - widget: line-chart
            colSpan: 8
            source: { ref: burnup, param: { match: [projectId, { field: planSlug, param: slug }] } }
            config:
              title: 'Burn-up (planejado vs ganho)'
              xField: date
              series: [plannedValue, earnedCount, earnedProxy]
              area: false
          - widget: gauge
            colSpan: 2
            source: { ref: spi, param: { match: [projectId, { field: planSlug, param: slug }] } }
            config: { valueField: spiProxy, max: 2, label: 'SPI (proxy)' }
          - widget: key-value
            colSpan: 2
            source: { ref: spi, param: { match: [projectId, { field: planSlug, param: slug }] } }
            config: { fields: [spiProxy, spiCount, deadline, asOf] }

  # ── ARQUIVADOS (layout: single) — histórico frio, sem planos done recentes. ──
  - slug: arquivados
    title: 'Arquivados'
    icon: '🗄️'
    layout: single
    widget: table
    source: { ref: plans, filter: { status: archived } }
    config:
      columns: [title, status, phasesText, updatedRel]
      columnLabels:
        title: 'Frente'
        status: 'Status'
        phasesText: 'Fases'
        updatedRel: 'Atualizado'
      linkTo: 'plan/:projectId/:slug'
      linkField: title
      emptyNote: 'Nada arquivado ainda.'

  # ── AJUDA (layout: single) — catálogo de skills (master-detail interno).
  # Reached ONLY from the chrome `?` (help: help), not the sidebar: showInNav: false
  # is the generic page-level nav-visibility flag specified for the F1 shell work
  # (nav-style-projects-impl.md §6). Until that lands the runtime strips the unknown
  # key (help still renders, just also shows in nav); once shipped, it drops from nav.
  - slug: help
    title: 'Ajuda'
    icon: '❓'
    layout: single
    showInNav: false
    widget: catalog
    source: { ref: catalog }
    config: {}

# MCP tools — registered as aideck_atomic_skills_<name>. Script handlers read the
# pre-loaded data map (the emitted flat state, project-scoped) and, for mutations,
# append an intent to the repo's .atomic-skills/bootstrap-drafts/inbox/ which the
# atomic-skills skill applies.
tools:
  - name: mark_task_done
    description: 'Record an intent to mark a task done; returns phaseCompleteHint when it was the last open task.'
    input:
      type: object
      required: [initiativeSlug, taskId]
      properties:
        initiativeSlug: { type: string }
        taskId: { type: string }
        # Optional: disambiguates a slug shared across projects/<id>/ (F-001). Omit
        # in a single-project repo; required only when a slug collides.
        projectId: { type: string }
        verifierResultId: { type: string }
        by: { type: string, enum: [human, ai] }
    handler: { type: script, source: handlers/mark-task-done.js }

  - name: verify_exit_gate
    description: 'Record an exit-gate criterion result (met|deferred) on a plan phase or initiative; hints allGatesMet. A failed verification leaves the criterion pending — gate status is pending/met/deferred only.'
    input:
      type: object
      required: [criterionId, result]
