# This file is a TEMPLATE. The project skill provisions a per-project copy under
# ~/.aideck/consumers/<projectId>/ and STAMPS the top-level `id` + `title` to the
# consuming repo (id = projectId, title = humanized name) — see src/provision-consumer.js.
# The values below are only the sane default for the atomic-skills repo itself.
schemaVersion: '0.1'
id: atomic-skills
mcpNamespace: atomic_skills
title: 'Atomic Skills'
icon: 'mdi:clipboard-check'

# Read the repo's git-tracked nested tree in place (root: project), no copy into
# the consumer dir. captures inject the path-derived grouping onto every record.
dataSources:
  - id: plans
    path: '.atomic-skills/projects/*/*/plan.md'
    format: frontmatter
    root: project
    captures: [projectId, planSlug]
  - id: initiatives
    path: '.atomic-skills/projects/*/*/phases/*.md'
    format: frontmatter
    root: project
    captures: [projectId, planSlug, phaseFile]
  - id: initiatives_archive
    path: '.atomic-skills/projects/*/*/phases/archive/*.md'
    format: frontmatter
    root: project
    captures: [projectId, planSlug, phaseFile]
  - id: discover
    path: '.atomic-skills/bootstrap-drafts/discover-run.json'
    format: json
    root: project
  - id: inbox
    path: '.atomic-skills/bootstrap-drafts/inbox/*.jsonl'
    format: jsonl
    root: project

  # Derived/exploded sources (§2a array-explode): one record per nested-array
  # element, carrying the parent's scalars (+ injected captures) down onto each
  # child, plus _parentId/_index. These power the per-row detail-page widgets
  # (task list, exit gates, stack, parked/emerged) and the dependency view.
  - id: phases
    derivesFrom: plans
    explode: phases
    carry: [projectId, planSlug, currentPhase, branch, planActive, planTitle]
  - id: tasks
    derivesFrom: initiatives
    explode: tasks
    carry: [projectId, planSlug, slug, phaseId, parentPlan, current]
  - id: exit_gates
    derivesFrom: initiatives
    explode: exitGates
    carry: [projectId, planSlug, slug, phaseId]
  - id: stack_frames
    derivesFrom: initiatives
    explode: stack
    carry: [projectId, planSlug, slug, phaseId]
  - id: parked_items
    derivesFrom: initiatives
    explode: parked
    carry: [projectId, planSlug, slug, phaseId]
  - id: emerged_items
    derivesFrom: initiatives
    explode: emerged
    carry: [projectId, planSlug, slug, phaseId]

nav:
  style: tabs
  showIcons: true

pages:
  # ── Home = FOCUS (default). Answers: what am I implementing, what am I doing
  # now, and how the current phase fits — scoped to the ACTIVE plan(s) via the
  # reconcile-focus markers (current / planActive). The global portfolio view is
  # the secondary "Overview" tab. ──────────────────────────────────────────────
  - slug: home
    title: 'Foco'
    icon: 'mdi:target'
    default: true
    layout: sections
    sections:
      # Agora = the current phase, stated concisely (summary, not the nextAction
      # status-dump) + its TASKS (the actual actionable work), not raw rollup
      # numbers. Scoped to the active plan's currentPhase via the `current` marker.
      - title: 'Agora'
        widgets:
          # Plan banner (full-width): the active plan's human title as a header, once
          # per plan (titleField: planTitle, precomputed by reconcile-focus.js). This
          # is the single plan label for the block — the widgets below repeat by the
          # same parentPlan but their auto group-headers stay hidden for a single
          # active plan, so there's no duplication. (A header spanning ABOVE the
          # 2-col row natively needs aiDeck §2d/section-repeat; until then this
          # dedicated full-width banner is the clean stand-in.)
          - widget: callout
            colSpan: 12
            source: { ref: initiatives, filter: { current: true } }
            repeat: parentPlan
            repeatLabel: never
            repeatDirection: vertical
            # Labeled banner: "Plano em foco" (static label) + the plan's human name
            # (bodyField: planTitle) — so the title reads as context, not loose text.
            # Click → the plan detail. The plan slug = the `planSlug` capture on the
            # current initiative; the route shape (plan/:projectId/:planSlug) is OURS
            # (consumer domain) — aiDeck only interpolates the :tokens generically.
            config: { variant: info, title: 'Plano em foco', bodyField: planTitle, linkTo: 'plan/:projectId/:planSlug', actionLabel: 'Abrir' }
          # Header row: the current-phase PANEL + its task meter, side by side — each
          # half of the 12-col grid, stacking full-width on phones. Both are framed
          # widgets with a header label ("Fase atual" / "Tarefas") + a boxless body,
          # so the row reads uniformly and the grid stretches them to equal height.
          # `panel` = header-labeled single-record panel (title + muted body, no inner
          # box) — aiDeck docs/component-spec-labeled-callout-panel.md.
          - widget: panel
            colSpan: 6
            responsive: { sm: { colSpan: 12 } }
            source: { ref: initiatives, filter: { current: true } }
            repeat: parentPlan
            repeatLabel: never
            repeatDirection: vertical
            # Click the phase title → its initiative (phase) detail. projectId + slug
            # are on the current-initiative record; route shape owned by the consumer.
            config: { title: 'Fase atual', titleField: title, bodyField: summary, linkTo: 'phase/:projectId/:slug' }
          - widget: progress-bar
            colSpan: 6
            responsive: { sm: { colSpan: 12 } }
            source: { ref: initiatives, filter: { current: true } }
            repeat: parentPlan
            repeatLabelField: planTitle   # group header = human plan title, not the slug (aiDeck §2a)
            repeatDirection: vertical
            config: { title: 'Tarefas', valueField: tasksDone, maxField: tasksTotal, pct: true }
          - widget: table
            colSpan: 12
            source: { ref: tasks, filter: { current: true } }
            repeat: parentPlan
            repeatLabelField: planTitle   # group header = human plan title, not the slug (aiDeck §2a)
            repeatDirection: vertical
            config:
              # `summary` = the one-line "what does this task do" (skill-authored,
              # user-validated; see find-missing-task-summaries.js). Folded UNDER
              # the title (config.subtitles) instead of its own column, so the
              # focus panel reads as work — title in front, summary muted beneath —
              # not a wide id/title/summary table that's hard to scan.
              columns: [id, title, status, blockedBy]
              subtitles: { title: summary }
              # Click a task → its phase (initiative) detail, where the full task
              # list + description live. A task has no page of its own (thin unique
              # data + the detail route is 2-param max: projectId/slug). The task
              # `title` renders as a VISIBLE link (linkField) — not just a row click.
              linkTo: 'phase/:projectId/:slug'
              linkField: title
              emptyNote: 'Sem tarefas nesta fase.'
              # Consumer status vocabulary (§2 obl.4 — "own your words"): aiDeck's
              # built-in map lacks archived/met/deferred; declared once here as a
              # YAML anchor and aliased (*statusvocab) by every status widget below.
              statuses: &statusvocab
                active:   { tone: info,    glyph: "◉" }
                pending:  { tone: neutral, glyph: "·" }
                paused:   { tone: warning, glyph: "‖" }
                blocked:  { tone: warning, glyph: "!" }
                done:     { tone: success, glyph: "✓" }
                archived: { tone: neutral, glyph: "▪", label: "archived" }
                met:      { tone: success, glyph: "✓" }
                deferred: { tone: warning, glyph: "⏸" }
            slots:
              "cell:blockedBy":
                - widget: tag-chip
                  config: { field: blockedBy, hideCounts: true }
      - title: 'Onde estou no plano'
        widgets:
          - widget: phase-timeline
            colSpan: 12
            # The full phase skeleton lives in the plan's phases[] descriptor
            # (phases are materialized lazily), scoped to active plans via the
            # carried planActive marker. The current phase highlights on status;
            # each step shows its concise `summary`.
            source: { ref: phases, filter: { planActive: true } }
            repeat: planSlug
            repeatLabelField: planTitle   # group header = human plan title, not the slug (aiDeck §2a)
            repeatDirection: vertical
            config:
              idField: id
              titleField: title
              statusField: status
              nextActionField: summary
              # Each step's title → its initiative (phase) detail. The exploded phase
              # row carries projectId + the descriptor `slug` (== the materialized
              # initiative slug), so the consumer route resolves per node.
              linkTo: 'phase/:projectId/:slug'
              statuses: *statusvocab

  - slug: overview
    title: 'Overview'
    icon: 'mdi:view-dashboard'
    layout: sections
    sections:
      - title: 'At a glance'
        columns: 12
        gap: 16
        widgets:
          - widget: stat
            colSpan: 3
            source: { ref: plans }
            config: { value: 'count(status=active)', label: 'Active Plans', tone: info }
          - widget: stat
            colSpan: 3
            source: { ref: plans }
            config: { value: 'count()', label: 'Total Plans' }
          - widget: stat
            colSpan: 3
            source: { ref: initiatives }
            config: { value: 'count(status=active)', label: 'Active Phases', tone: info }
          - widget: stat
            colSpan: 3
            source: { ref: initiatives }
            config: { value: 'count(status=done)', label: 'Phases Done', tone: success }
      - title: 'Plans'
        widgets:
          - widget: table
            colSpan: 12
            source: { ref: plans }
            config:
              columns: [title, status, currentPhase, branch, projectId]
              emptyNote: 'No plans tracked yet — run the project-status skill to start one.'
              linkTo: 'plan/:projectId/:slug'   # §2c row-scoped drill-down → Plan detail
              linkField: title                  # plan title renders as a visible link
              statuses: *statusvocab            # vocabulary anchored on the Home page
      - title: 'Phases by status'
        widgets:
          - widget: kanban-board
            colSpan: 12
            source: { ref: initiatives }
            config:
              columns: [pending, active, paused, done, archived]
              statusField: status
              idField: phaseId
              titleField: title
              linkTo: 'phase/:projectId/:slug'   # card title → initiative detail (slug on the record)
              statuses: *statusvocab
            slots:                               # §2b composed card: task-progress overlay
              card:
                - widget: progress-bar
                  config: { valueField: tasksDone, maxField: tasksTotal, pct: true }

  - slug: plans
    title: 'Plans'
    icon: 'mdi:format-list-checks'
    layout: sections
    sections:
      - title: 'Portfolio'
        columns: 12
        gap: 16
        widgets:
          - widget: stat
            colSpan: 3
            source: { ref: plans }
            config: { value: 'count(status=active)', label: 'Active', tone: info }
          - widget: stat
            colSpan: 3
            source: { ref: plans }
            config: { value: 'count(status=paused)', label: 'Paused', tone: warning }
          - widget: stat
            colSpan: 3
            source: { ref: plans }
            config: { value: 'count(status=done)', label: 'Done', tone: success }
          - widget: stat
            colSpan: 3
            source: { ref: plans }
            config: { value: 'count(status=archived)', label: 'Archived' }
      - title: 'All plans'
        widgets:
          - widget: table
            colSpan: 12
            source: { ref: plans }
            config:
              columns: [title, status, currentPhase, branch, projectId]
              emptyNote: 'No plans tracked yet.'
              linkTo: 'plan/:projectId/:slug'
              linkField: title
              statuses: *statusvocab
      - title: 'By project'
        widgets:
          - widget: card-grid
            colSpan: 12
            source: { ref: plans }
            repeat: projectId
            repeatDirection: vertical
            config:
              titleField: title
              subtitleField: currentPhase
              fields: [status, branch]
              linkTo: 'plan/:projectId/:slug'
              statuses: *statusvocab

  - slug: phases
    title: 'Phases'
    icon: 'mdi:view-column'
    layout: sections
    sections:
      - title: 'Initiatives'
        widgets:
          - widget: card-grid
            colSpan: 12
            source: { ref: initiatives }
            repeat: parentPlan
            repeatLabelField: planTitle   # group header = human plan title, not the slug (aiDeck §2a)
            repeatDirection: vertical
            config:
              titleField: title
              subtitleField: status
              fields: [phaseId, nextAction]
              linkTo: 'phase/:projectId/:slug'   # §2c drill-down → Initiative detail
              statuses: *statusvocab

  # ── Drill-down detail pages (§2c). Reached via row-scoped linkTo above; the
  # route /:consumerId/<plan|phase>/:projectId/:slug carries the project scope +
  # the record slug, matched by each widget's composite source.param. ──────────
  - slug: plan
    title: 'Plan detail'
    icon: 'mdi:file-tree-outline'
    layout: sections
    sections:
      - title: 'Plan'
        columns: 12
        gap: 16
        widgets:
          - widget: callout
            colSpan: 12
            source: { ref: plans, param: { match: [projectId, slug] } }
            config: { variant: attention, title: 'Active phase', bodyField: currentPhase }
          - widget: key-value
            colSpan: 12
            source: { ref: plans, param: { match: [projectId, slug] } }
            config:
              fields: [status, currentPhase, branch, started, lastUpdated]
              statuses: *statusvocab
      - title: 'Phase timeline'
        widgets:
          - widget: phase-timeline
            colSpan: 12
            source: { ref: initiatives, param: { match: [projectId, { field: planSlug, param: slug }] } }
            config:
              idField: phaseId
              titleField: title
              statusField: status
              nextActionField: nextAction
              linkTo: 'phase/:projectId/:slug'   # each phase node → its initiative detail
              statuses: *statusvocab
              meters:                            # surface the precomputed rollups per phase
                - { label: 'Tasks', valueField: tasksDone, maxField: tasksTotal, style: bar }
                - { label: 'Gates', valueField: gatesMet, maxField: gatesTotal, style: pips }
      - title: 'Exit gates'
        widgets:
          - widget: table
            colSpan: 12
            source: { ref: exit_gates, param: { match: [projectId, { field: planSlug, param: slug }] } }
            config:
              # verifierLabel/evidenceSummary are flat scalars derived by
              # compute-rollups.js (aiDeck can't read the nested verifier/evidence).
              columns: [phaseId, id, description, status, verifierLabel, evidenceSummary]
              statuses: *statusvocab
              emptyNote: 'No exit gates.'
      - title: 'Narrative'
        widgets:
          - widget: markdown
            colSpan: 12
            source: { ref: plans, param: { match: [projectId, slug] } }

  - slug: phase
    title: 'Initiative detail'
    icon: 'mdi:flag-checkered'
    layout: sections
    sections:
      - title: 'Initiative'
        columns: 12
        gap: 16
        widgets:
          - widget: callout
            colSpan: 12
            source: { ref: initiatives, param: { match: [projectId, slug] } }
            config: { variant: attention, title: 'Next action', bodyField: nextAction }
          - widget: key-value
            colSpan: 12
            source: { ref: initiatives, param: { match: [projectId, slug] } }
            config:
              fields: [status, phaseId, parentPlan, branch, started, lastUpdated]
              statuses: *statusvocab
      - title: 'Tasks'
        widgets:
          - widget: table
            colSpan: 12
            source: { ref: tasks, param: { match: [projectId, slug] } }
            config:
              columns: [id, title, summary, status, blockedBy]
              statuses: *statusvocab
              emptyNote: 'No tasks.'
            slots:
              "cell:blockedBy":                  # §2b detail slot: blockers as chips
                - widget: tag-chip
                  config: { field: blockedBy, hideCounts: true }
      - title: 'Exit gates'
        widgets:
          - widget: table
            colSpan: 12
            source: { ref: exit_gates, param: { match: [projectId, slug] } }
            config:
              columns: [id, description, status, verifierLabel, evidenceSummary]
              statuses: *statusvocab
              emptyNote: 'No exit gates.'
      - title: 'Stack'
        widgets:
          - widget: list
            colSpan: 12
            source: { ref: stack_frames, param: { match: [projectId, slug] } }
            config: { titleField: title, leadField: type, subtitleField: openedAt, emptyNote: 'Stack empty.' }
      - title: 'Parked & emerged'
        columns: 12
        gap: 16
        widgets:
          - widget: list
            colSpan: 6
            source: { ref: parked_items, param: { match: [projectId, slug] } }
            config: { title: 'Parked', titleField: title, emptyNote: 'Nothing parked.' }
          - widget: list
            colSpan: 6
            source: { ref: emerged_items, param: { match: [projectId, slug] } }
            config: { title: 'Emerged', titleField: title, emptyNote: 'Nothing emerged.' }
      - title: 'Narrative'
        widgets:
          - widget: markdown
            colSpan: 12
            source: { ref: initiatives, param: { match: [projectId, slug] } }

# MCP tools — registered as aideck_atomic_skills_<name>. Script handlers read the
# pre-loaded data map (project-scoped) and, for mutations, append an intent to the
# repo's .atomic-skills/bootstrap-drafts/inbox/ which the atomic-skills skill applies.
tools:
  - name: mark_task_done
    description: 'Record an intent to mark a task done; returns phaseCompleteHint when it was the last open task.'
    input:
      type: object
      required: [initiativeSlug, taskId]
      properties:
        initiativeSlug: { type: string }
        taskId: { type: string }
        # Optional: disambiguates a slug shared across projects/<id>/ (F-001). Omit
        # in a single-project repo; required only when a slug collides.
        projectId: { type: string }
        verifierResultId: { type: string }
        by: { type: string, enum: [human, ai] }
    handler: { type: script, source: handlers/mark-task-done.js }

  - name: verify_exit_gate
    description: 'Record an exit-gate criterion result (met|deferred) on a plan phase or initiative; hints allGatesMet. A failed verification leaves the criterion pending — gate status is pending/met/deferred only.'
    input:
      type: object
      required: [criterionId, result]
      properties:
        initiativeSlug: { type: string }
        planSlug: { type: string }
        phaseId: { type: string }
        projectId: { type: string }   # optional project scope (F-001)
        criterionId: { type: string }
        result: { type: string, enum: [met, deferred] }
        deferredReason: { type: string }
        evidence: { type: object }
        by: { type: string, enum: [human, ai] }
    handler: { type: script, source: handlers/verify-exit-gate.js }

  - name: get_next_action
    description: 'Compute the next recommended action across plans and initiatives.'
    input:
      type: object
      properties:
        planSlug: { type: string }
        initiativeSlug: { type: string }
        projectId: { type: string }   # optional project scope (F-001)
    handler: { type: script, source: handlers/get-next-action.js }

  - name: get_dependencies
    description: 'Resolve dependencies for a phase (plan) or task (initiative).'
    input:
      type: object
      required: [scope]
      properties:
        scope: { type: string, enum: [phase, task] }
        planSlug: { type: string }
        phaseId: { type: string }
        initiativeSlug: { type: string }
        taskId: { type: string }
        projectId: { type: string }   # optional project scope (F-001)
    handler: { type: script, source: handlers/get-dependencies.js }

  - name: health
    description: 'Cross-entity health: stale initiatives, unmet gates, unconsumed inbox intents.'
    input:
      type: object
      properties:
        staleDays: { type: number }
    handler: { type: script, source: handlers/health.js }

  - name: pop_frame
    description: 'Record an intent to pop the top stack frame from an initiative.'
    input:
      type: object
      required: [initiativeSlug]
      properties:
        initiativeSlug: { type: string }
        destination: { type: string }
        projectId: { type: string }   # optional project scope (F-001)
        by: { type: string, enum: [human, ai] }
    handler: { type: script, source: handlers/pop-frame.js }

  - name: promote_parked
    description: 'Record an intent to promote a parked item (by title or index) to a task.'
    input:
      type: object
      required: [initiativeSlug, parkedTitleOrIndex]
      properties:
        initiativeSlug: { type: string }
        parkedTitleOrIndex: {}
        projectId: { type: string }   # optional project scope (F-001)
        by: { type: string, enum: [human, ai] }
    handler: { type: script, source: handlers/promote-parked.js }
