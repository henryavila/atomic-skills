scope: both
name: codex-bridge
display_name:
  pt: Ponte Codex
  en: Codex Bridge
description:
  pt: |
    Infraestrutura compartilhada para invocar OpenAI Codex CLI como reviewer
    adversarial em padrão two-pass sealed envelope. Usado pelo codex sub-flow
    dentro de review-plan e review-code (modos codex/both).
  en: |
    Shared infrastructure to invoke OpenAI Codex CLI as adversarial reviewer
    in two-pass sealed envelope pattern. Used by the codex sub-flow inside
    review-plan and review-code (codex/both modes).
variables:
  timeout_seconds:
    description:
      pt: Timeout total por invocação
      en: Total timeout per invocation
    default: "600"
  reviews_dir:
    description:
      pt: Diretório para salvar reviews
      en: Directory to save reviews
    default: ".atomic-skills/reviews/"
