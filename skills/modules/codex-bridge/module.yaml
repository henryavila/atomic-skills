scope: both
name: codex-bridge
# Compatibility alias of cross-model-bridge (F2 / L7). Keep installable so
# catalog entries, docs, and codex-bridge-assets/ continue to resolve.
alias_of: cross-model-bridge
display_name:
  pt: Ponte Codex (alias)
  en: Codex Bridge (alias)
description:
  pt: |
    Alias de compatibilidade de `cross-model-bridge`. Infraestrutura compartilhada
    para invocar OpenAI Codex CLI como reviewer adversarial em padrão two-pass
    sealed envelope. Preferir o nome `cross-model-bridge` em documentação nova;
    este módulo permanece instalável e mantém a pasta de assets
    `skills/shared/codex-bridge-assets/`.
  en: |
    Compatibility alias of `cross-model-bridge`. Shared infrastructure to invoke
    OpenAI Codex CLI as adversarial reviewer in the two-pass sealed envelope
    pattern. Prefer `cross-model-bridge` in new docs; this module remains
    installable and owns the on-disk asset tree
    `skills/shared/codex-bridge-assets/`.
variables:
  timeout_seconds:
    description:
      pt: Timeout total por invocação
      en: Total timeout per invocation
    default: "600"
  reviews_dir:
    description:
      pt: Diretório para salvar reviews
      en: Directory to save reviews
    default: ".atomic-skills/reviews/"
