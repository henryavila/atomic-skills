scope: both
name: cross-model-bridge
display_name:
  pt: Ponte cross-model
  en: Cross-Model Bridge
description:
  pt: |
    Infraestrutura compartilhada para invocar um reviewer adversarial de família
    de modelo diferente (Codex ou Grok) em padrão two-pass sealed envelope.
    Usado pelos sub-flows externos de review-plan e review-code. Substitui o
    módulo lógico codex-bridge (que permanece como alias de compatibilidade).
  en: |
    Shared infrastructure to invoke a family-different adversarial reviewer
    (Codex or Grok) in the two-pass sealed envelope pattern. Used by the
    external sub-flows inside review-plan and review-code. Supersedes the
    logical codex-bridge module (kept as a compatibility alias).
variables:
  timeout_seconds:
    description:
      pt: Timeout total por invocação
      en: Total timeout per invocation
    default: "600"
  reviews_dir:
    description:
      pt: Diretório para salvar reviews
      en: Directory to save reviews
    default: ".atomic-skills/reviews/"
