<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>aiDeck — Initiative view</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg-canvas);
    color: var(--fg-default);
    font-family: var(--font-sans);
    overflow: hidden;
  }
  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  main { background-color: transparent !important; }

  @keyframes aideck-pulse {
    0%   { transform: scale(0.85); opacity: 0.7; }
    100% { transform: scale(2.2);  opacity: 0;   }
  }

  /* Scrollbar */
  main::-webkit-scrollbar { width: 12px; }
  main::-webkit-scrollbar-track { background: var(--bg-canvas); }
  main::-webkit-scrollbar-thumb {
    background: var(--border-default);
    border: 3px solid var(--bg-canvas);
    border-radius: 999px;
  }
  main::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="has-texture-canvas">
<div id="app"></div>

<script type="text/babel" src="initiative-data.jsx"></script>
<script type="text/babel" src="atoms.jsx"></script>

<script type="text/babel" src="TopChrome.jsx"></script>
