<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:250px;}</style>
</head>
<body>
<div class="card" style="height:250px;">

<div style="background:var(--bg-surface); border:1px solid var(--border-default); border-radius:8px; padding:12px 14px;">
  <div class="row" style="gap:8px; margin-bottom:8px;">
    <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle);">► v3-redesign/phases.F2/tasks.T-005</span>
  </div>
  <div class="row" style="gap:6px; margin-bottom:8px;">
    <span class="chip" style="height:18px; font-size:10px; color:var(--status-emerged); background:var(--status-emerged-bg); border-color:color-mix(in srgb, var(--status-emerged) 35%, transparent);">ai</span>
    <span class="t-meta">2 hrs ago</span>
  </div>
  <div style="font-family:var(--font-sans); font-size:13px; color:var(--fg-default); line-height:1.55; border-left:2px solid var(--border-strong); padding-left:10px; margin-bottom:10px;">
    Need to verify unicode normalization for emoji edge cases. Suggest adding a fixture with U+1F3F4 and ZWJ sequences before claiming exit gate G2 is met.
  </div>
  <div class="row" style="gap:10px;">
    <button style="height:24px; padding:0 10px; background:transparent; color:var(--accent-link); border:1px solid var(--border-default); border-radius:4px; font-family:var(--font-mono); font-size:11px; cursor:pointer;">[Resolve]</button>
    <button style="height:24px; padding:0 10px; background:transparent; color:var(--fg-muted); border:none; font-family:var(--font-mono); font-size:11px; cursor:pointer;">[Reply]</button>
  </div>
</div>

</div>
</body>
</html>
