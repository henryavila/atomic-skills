<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:230px;}</style>
</head>
<body>
<div class="card" style="height:230px;">

<div class="col" style="gap:14px;">
  <div class="swatch-grid swatch-grid-7" style="gap:8px;">
    
      <div class="swatch-cell">
        <div class="swatch-sm" style="background:var(--status-done); display:flex; align-items:center; justify-content:center; color:var(--bg-canvas); font-family:var(--font-mono); font-size:20px; font-weight:600; box-shadow:0 0 16px -4px var(--status-done), inset 0 1px 0 rgba(255,255,255,0.15);">✓</div>
        <div class="label">done</div>
        <div class="value">#4cc28e</div>
      </div>
    
      <div class="swatch-cell">
        <div class="swatch-sm" style="background:var(--status-active); display:flex; align-items:center; justify-content:center; color:var(--bg-canvas); font-family:var(--font-mono); font-size:20px; font-weight:600; box-shadow:0 0 16px -4px var(--status-active), inset 0 1px 0 rgba(255,255,255,0.15);">◉</div>
        <div class="label">active</div>
        <div class="value">#5fb1ff</div>
      </div>
    
      <div class="swatch-cell">
        <div class="swatch-sm" style="background:var(--status-pending); display:flex; align-items:center; justify-content:center; color:var(--bg-canvas); font-family:var(--font-mono); font-size:20px; font-weight:600; box-shadow:0 0 16px -4px var(--status-pending), inset 0 1px 0 rgba(255,255,255,0.15);">·</div>
        <div class="label">pending</div>
        <div class="value">#98a1ad</div>
      </div>
    
      <div class="swatch-cell">
        <div class="swatch-sm" style="background:var(--status-blocked); display:flex; align-items:center; justify-content:center; color:var(--bg-canvas); font-family:var(--font-mono); font-size:20px; font-weight:600; box-shadow:0 0 16px -4px var(--status-blocked), inset 0 1px 0 rgba(255,255,255,0.15);">⊘</div>
        <div class="label">blocked</div>
        <div class="value">#e0a44a</div>
      </div>
    
      <div class="swatch-cell">
        <div class="swatch-sm" style="background:var(--status-parked); display:flex; align-items:center; justify-content:center; color:var(--bg-canvas); font-family:var(--font-mono); font-size:20px; font-weight:600; box-shadow:0 0 16px -4px var(--status-parked), inset 0 1px 0 rgba(255,255,255,0.15);">⌂</div>
        <div class="label">parked</div>
        <div class="value">#e668a8</div>
      </div>
    
      <div class="swatch-cell">
        <div class="swatch-sm" style="background:var(--status-emerged); display:flex; align-items:center; justify-content:center; color:var(--bg-canvas); font-family:var(--font-mono); font-size:20px; font-weight:600; box-shadow:0 0 16px -4px var(--status-emerged), inset 0 1px 0 rgba(255,255,255,0.15);">⇥</div>
        <div class="label">emerged</div>
        <div class="value">#8b5cf6</div>
      </div>
    
      <div class="swatch-cell">
        <div class="swatch-sm" style="background:var(--status-highlighted); display:flex; align-items:center; justify-content:center; color:var(--bg-canvas); font-family:var(--font-mono); font-size:20px; font-weight:600; box-shadow:0 0 16px -4px var(--status-highlighted), inset 0 1px 0 rgba(255,255,255,0.15);">⚑</div>
        <div class="label">highlighted</div>
        <div class="value">#f0c757</div>
      </div>
    
  </div>
  <div class="t-caption">First-class status vocabulary. Each pair (color + Unicode glyph) is redundant so colorblind users never depend on hue alone.</div>
</div>

</div>
</body>
</html>
