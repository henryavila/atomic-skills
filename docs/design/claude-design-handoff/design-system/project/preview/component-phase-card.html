<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:230px;}</style>
</head>
<body>
<div class="card" style="height:230px;">

<div style="background:var(--bg-surface); border:1px solid var(--border-default); border-radius:8px; padding:14px 16px;">
  <div class="row" style="gap:8px; margin-bottom:6px;">
    <span style="font-family:var(--font-mono); font-size:18px; color:var(--status-active); line-height:1;">◉</span>
    <span style="font-family:var(--font-sans); font-size:13px; font-weight:600; color:var(--fg-muted); letter-spacing:0.04em;">F0</span>
    <span style="font-family:var(--font-sans); font-size:16px; font-weight:600; color:var(--fg-default); flex:1; letter-spacing:-0.01em;">Foundation Repair</span>
    <span class="chip" style="color:var(--severity-warn); background:color-mix(in srgb, var(--severity-warn) 14%, var(--bg-surface)); border-color:color-mix(in srgb, var(--severity-warn) 35%, transparent);">⚑ 2 warn</span>
  </div>
  <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle); margin-bottom:10px;">audience: developer · scope: backend/app/Console/Commands/…</div>
  <div class="row" style="gap:14px; padding:8px 0; border-top:1px solid var(--border-subtle); border-bottom:1px solid var(--border-subtle);">
    <div class="col" style="gap:2px;">
      <div class="label">progress</div>
      <div style="font-family:var(--font-mono); font-size:13px; color:var(--fg-default);">3<span style="color:var(--fg-subtle);">/8</span> tasks</div>
    </div>
    <div class="col" style="gap:2px;">
      <div class="label">exit gates</div>
      <div style="font-family:var(--font-mono); font-size:13px; color:var(--status-blocked);">0<span style="color:var(--fg-subtle);">/3</span> met</div>
    </div>
    <div class="col" style="gap:2px; flex:1;">
      <div class="label">exit summary</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-default);">tag core-v2 + pipeline + 0 dup</div>
    </div>
  </div>
  <div style="font-family:var(--font-sans); font-size:13px; color:var(--fg-muted); margin-top:10px;">
    Next: <span style="color:var(--fg-default);">T-002</span> Pipeline dumps → PostgreSQL
  </div>
</div>

</div>
</body>
</html>
