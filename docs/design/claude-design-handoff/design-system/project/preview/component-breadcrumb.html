<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:160px;}</style>
</head>
<body>
<div class="card" style="height:160px;">

<div style="background:var(--bg-canvas); border:1px solid var(--border-default); border-radius:8px; padding:12px 16px;">
  <div class="row" style="gap:6px; font-family:var(--font-mono); font-size:13px;">
    <span style="color:var(--accent-link); text-decoration:none; cursor:pointer;">/v3-redesign</span>
    <span style="color:var(--fg-subtle);">·</span>
    <span style="color:var(--accent-link); cursor:pointer;">F0</span>
    <span style="color:var(--fg-subtle);">·</span>
    <span style="color:var(--fg-default);">v3-f0-foundation-repair</span>
  </div>
  <div class="t-caption" style="margin-top:10px;">Path-style breadcrumb. Mono throughout — these are file slugs. Last segment is the active node, never linked.</div>
</div>

</div>
</body>
</html>
