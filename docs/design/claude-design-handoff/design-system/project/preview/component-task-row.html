<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:240px;}</style>
</head>
<body>
<div class="card" style="height:240px;">

<div style="background:var(--bg-surface); border:1px solid var(--border-default); border-radius:8px; overflow:hidden;">
  
    <div class="row" style="gap:10px; padding:8px 12px; border-bottom:1px solid var(--border-subtle); ">
      <span style="font-family:var(--font-mono); color:var(--status-done); width:14px; font-size:13px;">✓</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); width:42px;">T-001</span>
      <span style="font-family:var(--font-sans); font-size:13px; color:var(--fg-default); flex:1;">Restore local infra </span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle);">done · 2 hrs ago</span>
      
    </div>
  
    <div class="row" style="gap:10px; padding:8px 12px; border-bottom:1px solid var(--border-subtle); background:color-mix(in srgb, var(--status-active) 6%, transparent);">
      <span style="font-family:var(--font-mono); color:var(--status-active); width:14px; font-size:13px;">◉</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); width:42px;">T-002</span>
      <span style="font-family:var(--font-sans); font-size:13px; color:var(--fg-default); flex:1;">Pipeline dumps → PostgreSQL </span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle);">active · 30 min ago</span>
      <span style="font-family:var(--font-mono); font-size:10px; color:var(--status-active); letter-spacing:0.08em;">HERE</span>
    </div>
  
    <div class="row" style="gap:10px; padding:8px 12px; border-bottom:1px solid var(--border-subtle); ">
      <span style="font-family:var(--font-mono); color:var(--status-pending); width:14px; font-size:13px;">·</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); width:42px;">T-003</span>
      <span style="font-family:var(--font-sans); font-size:13px; color:var(--fg-default); flex:1;">Unificação do modelo Álbum </span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle);">pending</span>
      
    </div>
  
    <div class="row" style="gap:10px; padding:8px 12px; border-bottom:1px solid var(--border-subtle); ">
      <span style="font-family:var(--font-mono); color:var(--status-blocked); width:14px; font-size:13px;">⊘</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); width:42px;">T-005</span>
      <span style="font-family:var(--font-sans); font-size:13px; color:var(--fg-default); flex:1;">Reescrever matcher <span class="chip" style="margin-left:4px; color:var(--severity-critical); background:transparent; border-color:color-mix(in srgb, var(--severity-critical) 50%, transparent); border-radius:4px; font-size:10px;">critical</span></span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle);">blocked by: T-003, T-004</span>
      
    </div>
  
    <div class="row" style="gap:10px; padding:8px 12px;  ">
      <span style="font-family:var(--font-mono); color:var(--status-pending); width:14px; font-size:13px;">·</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); width:42px;">T-008</span>
      <span style="font-family:var(--font-sans); font-size:13px; color:var(--fg-default); flex:1;">Tag core-v2 + archive + snapshot </span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle);">pending</span>
      
    </div>
  
</div>

</div>
</body>
</html>
