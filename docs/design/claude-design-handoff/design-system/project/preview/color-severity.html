<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:220px;}</style>
</head>
<body>
<div class="card" style="height:220px;">

<div class="col" style="gap:14px;">
  <div class="row" style="gap:12px;">
    
      <div style="flex:1; background:var(--bg-surface); border:1px solid var(--border-default); border-left:3px solid var(--severity-info); border-radius:8px; padding:14px 16px; box-shadow:var(--shadow-ambient);">
        <div class="row" style="gap:8px; margin-bottom:6px;">
          <div style="width:8px; height:8px; border-radius:50%; background:var(--severity-info); box-shadow:0 0 8px var(--severity-info);"></div>
          <div style="font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--fg-default); text-transform:uppercase; letter-spacing:0.06em;">info</div>
        </div>
        <div class="value">#5fb1ff</div>
        <div class="t-caption" style="margin-top:8px; font-size:11px;">Decorative use OK</div>
      </div>
    
      <div style="flex:1; background:var(--bg-surface); border:1px solid var(--border-default); border-left:3px solid var(--severity-warn); border-radius:8px; padding:14px 16px; box-shadow:var(--shadow-ambient);">
        <div class="row" style="gap:8px; margin-bottom:6px;">
          <div style="width:8px; height:8px; border-radius:50%; background:var(--severity-warn); box-shadow:0 0 8px var(--severity-warn);"></div>
          <div style="font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--fg-default); text-transform:uppercase; letter-spacing:0.06em;">warn</div>
        </div>
        <div class="value">#e0a44a</div>
        <div class="t-caption" style="margin-top:8px; font-size:11px;">Decorative use OK</div>
      </div>
    
      <div style="flex:1; background:var(--bg-surface); border:1px solid var(--border-default); border-left:3px solid var(--severity-critical); border-radius:8px; padding:14px 16px; box-shadow:var(--shadow-ambient);">
        <div class="row" style="gap:8px; margin-bottom:6px;">
          <div style="width:8px; height:8px; border-radius:50%; background:var(--severity-critical); box-shadow:0 0 8px var(--severity-critical);"></div>
          <div style="font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--fg-default); text-transform:uppercase; letter-spacing:0.06em;">critical</div>
        </div>
        <div class="value">#ff5c5c</div>
        <div class="t-caption" style="margin-top:8px; font-size:11px;">RESERVED — highlights only</div>
      </div>
    
  </div>
  <div class="t-caption" style="color:var(--severity-critical);">⚑ Critical red is reserved. Never decorative — it must always mean "human, look at this now".</div>
</div>

</div>
</body>
</html>
