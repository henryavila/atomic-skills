<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:200px;}</style>
</head>
<body>
<div class="card" style="height:200px;">

<div class="col" style="gap:14px;">
  <div class="row" style="gap:24px; padding:24px; background:var(--bg-canvas); border:1px solid var(--border-default); border-radius:8px;">
    <div class="col" style="gap:6px; flex:1;">
      <span style="font-family:var(--font-sans); font-size:34px; font-weight:600; letter-spacing:-0.025em; color:var(--fg-default);">ai<span>Deck</span><span style="display:inline-block; width:10px; height:10px; background:var(--status-active); margin-left:6px; vertical-align:1px;"></span></span>
      <span class="label">primary · sans</span>
    </div>
    <div class="col" style="gap:6px; flex:1;">
      <span style="font-family:var(--font-mono); font-size:30px; font-weight:500; color:var(--fg-default);">aiDeck<span style="color:var(--status-active);">_</span></span>
      <span class="label">mono · cursor variant</span>
    </div>
  </div>
  <div class="t-caption">Wordmark is typographic. The cyan square / blinking cursor is the only graphic mark — it doubles as the "running" indicator in the chrome.</div>
</div>

</div>
</body>
</html>
