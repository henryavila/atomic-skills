<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:200px;}</style>
</head>
<body>
<div class="card" style="height:200px;">

<div class="col" style="gap:12px;">
  <div style="position:relative;">
    <input type="text" placeholder="🔍 Search skills…" style="width:100%; height:34px; padding:0 12px; background:var(--bg-sunken); color:var(--fg-default); border:1px solid var(--border-default); border-radius:6px; font-family:var(--font-sans); font-size:13px; outline:none;"/>
  </div>
  <div class="row" style="gap:10px;">
    <select style="height:30px; padding:0 28px 0 10px; background:var(--bg-elevated); color:var(--fg-default); border:1px solid var(--border-default); border-radius:6px; font-family:var(--font-sans); font-size:12px; appearance:none; background-image:linear-gradient(45deg,transparent 50%,var(--fg-muted) 50%),linear-gradient(135deg,var(--fg-muted) 50%,transparent 50%); background-position:calc(100% - 14px) 14px, calc(100% - 10px) 14px; background-size:4px 4px; background-repeat:no-repeat;">
      <option>Filter: All</option>
    </select>
    <select style="height:30px; padding:0 28px 0 10px; background:var(--bg-elevated); color:var(--fg-default); border:1px solid var(--border-default); border-radius:6px; font-family:var(--font-sans); font-size:12px; appearance:none;">
      <option>In repo</option>
    </select>
    <span class="chip" style="color:var(--status-active); background:var(--status-active-bg); border-color:color-mix(in srgb, var(--status-active) 40%, transparent);">target ▾</span>
  </div>
  <div class="row" style="gap:8px;">
    
      <button style="height:24px; padding:0 10px; background:var(--bg-elevated); color:var(--fg-default); border:1px solid var(--border-strong); border-radius:999px; font-family:var(--font-sans); font-size:11px; cursor:pointer;">all</button>
    
      <button style="height:24px; padding:0 10px; background:transparent; color:var(--fg-muted); border:1px solid var(--border-subtle); border-radius:999px; font-family:var(--font-sans); font-size:11px; cursor:pointer;">human</button>
    
      <button style="height:24px; padding:0 10px; background:transparent; color:var(--fg-muted); border:1px solid var(--border-subtle); border-radius:999px; font-family:var(--font-sans); font-size:11px; cursor:pointer;">ai</button>
    
      <button style="height:24px; padding:0 10px; background:transparent; color:var(--fg-muted); border:1px solid var(--border-subtle); border-radius:999px; font-family:var(--font-sans); font-size:11px; cursor:pointer;">resolved</button>
    
  </div>
</div>

</div>
</body>
</html>
