<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:200px;}</style>
</head>
<body>
<div class="card" style="height:200px;">

<div class="col" style="gap:14px;">
  <div class="swatch-grid swatch-grid-4">
    
      <div class="swatch-cell">
        <div class="swatch-sm" style="background:color-mix(in srgb, var(--verifier-shell) 16%, var(--bg-surface)); border:1px solid color-mix(in srgb, var(--verifier-shell) 40%, transparent); display:flex; align-items:center; justify-content:center; color:var(--verifier-shell); font-family:var(--font-mono); font-size:14px; font-weight:600; box-shadow:var(--shadow-ambient);">$_</div>
        <div class="label">shell</div>
        <div class="value" style="color:var(--verifier-shell);">#4cc28e</div>
      </div>
    
      <div class="swatch-cell">
        <div class="swatch-sm" style="background:color-mix(in srgb, var(--verifier-query) 16%, var(--bg-surface)); border:1px solid color-mix(in srgb, var(--verifier-query) 40%, transparent); display:flex; align-items:center; justify-content:center; color:var(--verifier-query); font-family:var(--font-mono); font-size:14px; font-weight:600; box-shadow:var(--shadow-ambient);">SQL</div>
        <div class="label">query</div>
        <div class="value" style="color:var(--verifier-query);">#8b5cf6</div>
      </div>
    
      <div class="swatch-cell">
        <div class="swatch-sm" style="background:color-mix(in srgb, var(--verifier-test) 16%, var(--bg-surface)); border:1px solid color-mix(in srgb, var(--verifier-test) 40%, transparent); display:flex; align-items:center; justify-content:center; color:var(--verifier-test); font-family:var(--font-mono); font-size:14px; font-weight:600; box-shadow:var(--shadow-ambient);">✓✓</div>
        <div class="label">test</div>
        <div class="value" style="color:var(--verifier-test);">#5fb1ff</div>
      </div>
    
      <div class="swatch-cell">
        <div class="swatch-sm" style="background:color-mix(in srgb, var(--verifier-manual) 16%, var(--bg-surface)); border:1px solid color-mix(in srgb, var(--verifier-manual) 40%, transparent); display:flex; align-items:center; justify-content:center; color:var(--verifier-manual); font-family:var(--font-mono); font-size:14px; font-weight:600; box-shadow:var(--shadow-ambient);">👁</div>
        <div class="label">manual</div>
        <div class="value" style="color:var(--verifier-manual);">#e668a8</div>
      </div>
    
  </div>
  <div class="t-caption">Exit-gate verifier kinds — what the gate actually checks. Shell command, SQL query, test pattern, or human approval.</div>
</div>

</div>
</body>
</html>
