<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:200px;}</style>
</head>
<body>
<div class="card" style="height:200px;">

<div class="col" style="gap:14px;">
  <div class="row" style="gap:12px;">
    <div style="flex:1; height:72px; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:8px; display:flex; align-items:flex-end; padding:8px 12px;">
      <div><div class="label">border-subtle</div><div class="value">#1a2029</div></div>
    </div>
    <div style="flex:1; height:72px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:8px; display:flex; align-items:flex-end; padding:8px 12px;">
      <div><div class="label">border-default</div><div class="value">#262d38</div></div>
    </div>
    <div style="flex:1; height:72px; background:var(--bg-surface); border:1px solid var(--border-bright); border-radius:8px; display:flex; align-items:flex-end; padding:8px 12px;">
      <div><div class="label">border-bright</div><div class="value">#555f72</div></div>
    </div>
    <div style="flex:1; height:72px; background:var(--bg-surface); border:1px solid var(--border-strong); border-radius:8px; display:flex; align-items:flex-end; padding:8px 12px;">
      <div><div class="label">border-strong</div><div class="value">#3d4656</div></div>
    </div>
  </div>
  <div class="t-caption">Four 1px hairline weights. <code class="t-code-inline">subtle</code> for inner dividers, <code class="t-code-inline">default</code> for cards, <code class="t-code-inline">bright</code> for hover, <code class="t-code-inline">strong</code> for focus.</div>
</div>

</div>
</body>
</html>
