<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:90px;}</style>
</head>
<body>
<div class="card" style="height:90px;">

<div style="background:var(--bg-canvas); border:1px solid var(--border-default); border-radius:8px; height:48px; display:flex; align-items:center; padding:0 14px; gap:16px;">
  <div class="row" style="gap:8px;">
    <span style="font-family:var(--font-sans); font-size:16px; font-weight:600; letter-spacing:-0.02em;">ai<span style="color:var(--fg-default);">Deck</span></span>
    <span style="display:inline-block; width:6px; height:6px; background:var(--status-active);"></span>
  </div>
  <div style="flex:1; font-family:var(--font-mono); font-size:12px; color:var(--fg-muted);">
    <span style="color:var(--accent-link);">/v3-redesign</span> <span style="color:var(--fg-subtle);">·</span> <span style="color:var(--accent-link);">F0</span> <span style="color:var(--fg-subtle);">·</span> <span style="color:var(--fg-default);">v3-f0-foundation-repair</span>
  </div>
  <div class="row" style="gap:6px;">
    <span style="font-family:var(--font-mono); font-size:10px; color:var(--status-done); padding:2px 6px; border:1px solid color-mix(in srgb, var(--status-done) 40%, transparent); border-radius:3px;">● 127.0.0.1</span>
    <button style="height:24px; width:24px; background:var(--bg-elevated); color:var(--fg-muted); border:1px solid var(--border-default); border-radius:4px; font-family:var(--font-mono);">?</button>
    <button style="height:24px; padding:0 7px; background:var(--bg-elevated); color:var(--status-highlighted); border:1px solid var(--border-default); border-radius:4px; font-family:var(--font-mono); font-size:11px;">⚑ 3</button>
    <button style="height:24px; width:24px; background:var(--bg-elevated); color:var(--fg-muted); border:1px solid var(--border-default); border-radius:4px;">≡</button>
  </div>
</div>

</div>
</body>
</html>
