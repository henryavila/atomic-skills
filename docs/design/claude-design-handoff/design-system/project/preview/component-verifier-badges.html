<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:230px;}</style>
</head>
<body>
<div class="card" style="height:230px;">

<div class="col" style="gap:14px;">
  <div class="col" style="gap:6px;">
    
      <div class="row" style="gap:10px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; padding:7px 10px;">
        <span style="display:inline-flex; align-items:center; justify-content:center; min-width:38px; height:22px; padding:0 8px; border-radius:4px; background:color-mix(in srgb, var(--verifier-shell) 18%, var(--bg-surface)); color:var(--verifier-shell); font-family:var(--font-mono); font-size:11px; font-weight:600; border:1px solid color-mix(in srgb, var(--verifier-shell) 35%, transparent);">$_ shell</span>
        <div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">git tag | grep core-v2</div>
      </div>
    
      <div class="row" style="gap:10px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; padding:7px 10px;">
        <span style="display:inline-flex; align-items:center; justify-content:center; min-width:38px; height:22px; padding:0 8px; border-radius:4px; background:color-mix(in srgb, var(--verifier-query) 18%, var(--bg-surface)); color:var(--verifier-query); font-family:var(--font-mono); font-size:11px; font-weight:600; border:1px solid color-mix(in srgb, var(--verifier-query) 35%, transparent);">SQL query</span>
        <div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">SELECT COUNT(*) FROM duplicates</div>
      </div>
    
      <div class="row" style="gap:10px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; padding:7px 10px;">
        <span style="display:inline-flex; align-items:center; justify-content:center; min-width:38px; height:22px; padding:0 8px; border-radius:4px; background:color-mix(in srgb, var(--verifier-test) 18%, var(--bg-surface)); color:var(--verifier-test); font-family:var(--font-mono); font-size:11px; font-weight:600; border:1px solid color-mix(in srgb, var(--verifier-test) 35%, transparent);">✓✓ test</span>
        <div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">tests/integration/pipeline.spec.ts</div>
      </div>
    
      <div class="row" style="gap:10px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; padding:7px 10px;">
        <span style="display:inline-flex; align-items:center; justify-content:center; min-width:38px; height:22px; padding:0 8px; border-radius:4px; background:color-mix(in srgb, var(--verifier-manual) 18%, var(--bg-surface)); color:var(--verifier-manual); font-family:var(--font-mono); font-size:11px; font-weight:600; border:1px solid color-mix(in srgb, var(--verifier-manual) 35%, transparent);">👁 manual</span>
        <div style="font-family:var(--font-mono); font-size:12px; color:var(--fg-muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">Visual diff — 3 viewports + dark</div>
      </div>
    
  </div>
</div>

</div>
</body>
</html>
