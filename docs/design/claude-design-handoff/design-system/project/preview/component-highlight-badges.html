<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:210px;}</style>
</head>
<body>
<div class="card" style="height:210px;">

<div class="col" style="gap:14px;">
  <div class="col" style="gap:8px;">
    
      <div class="row" style="gap:12px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; padding:8px 12px;">
        <div style="font-family:var(--font-sans); font-size:14px; color:var(--fg-default); flex:1;">F2 Nuxt Redesign</div>
        <span class="chip" style="color:var(--severity-info); background:color-mix(in srgb, var(--severity-info) 14%, var(--bg-surface)); border-color:color-mix(in srgb, var(--severity-info) 35%, transparent); font-weight:600;">⚑ 1 info</span>
      </div>
    
      <div class="row" style="gap:12px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; padding:8px 12px;">
        <div style="font-family:var(--font-sans); font-size:14px; color:var(--fg-default); flex:1;">F3 Planning Mode</div>
        <span class="chip" style="color:var(--severity-warn); background:color-mix(in srgb, var(--severity-warn) 14%, var(--bg-surface)); border-color:color-mix(in srgb, var(--severity-warn) 35%, transparent); font-weight:600;">⚑ 2 warn</span>
      </div>
    
      <div class="row" style="gap:12px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; padding:8px 12px;">
        <div style="font-family:var(--font-sans); font-size:14px; color:var(--fg-default); flex:1;">F0 Foundation Repair</div>
        <span class="chip" style="color:var(--severity-critical); background:color-mix(in srgb, var(--severity-critical) 14%, var(--bg-surface)); border-color:color-mix(in srgb, var(--severity-critical) 35%, transparent); font-weight:600;">⚑ 1 critical</span>
      </div>
    
  </div>
  <div class="t-caption">Highlights are the human↔AI flag channel. Count + severity always visible inline next to the entity name.</div>
</div>

</div>
</body>
</html>
