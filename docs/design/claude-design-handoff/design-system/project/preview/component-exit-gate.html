<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:200px;}</style>
</head>
<body>
<div class="card" style="height:200px;">

<div style="background:var(--bg-surface); border:1px solid var(--border-default); border-radius:8px; overflow:hidden;">
  <div class="row" style="gap:8px; padding:8px 12px; border-bottom:1px solid var(--border-subtle); background:var(--bg-elevated);">
    <span class="label">Exit gates (3)</span>
    <span style="margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--status-blocked);">0 / 3 met</span>
  </div>
  
    <div class="row" style="gap:10px; padding:8px 12px; border-bottom:1px solid var(--border-subtle);">
      <span style="font-family:var(--font-mono); color:var(--status-pending); width:14px;">·</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); width:48px;">F0-G1</span>
      <span style="font-family:var(--font-sans); font-size:13px; color:var(--fg-default); flex:1;">Tag git core-v2 criada</span>
      <span style="display:inline-flex; align-items:center; padding:1px 6px; border-radius:3px; background:color-mix(in srgb, var(--verifier-shell) 18%, var(--bg-surface)); color:var(--verifier-shell); font-family:var(--font-mono); font-size:10px; font-weight:600; border:1px solid color-mix(in srgb, var(--verifier-shell) 35%, transparent);">shell</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">git tag | grep core-v2</span>
    </div>
  
    <div class="row" style="gap:10px; padding:8px 12px; border-bottom:1px solid var(--border-subtle);">
      <span style="font-family:var(--font-mono); color:var(--status-pending); width:14px;">·</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); width:48px;">F0-G2</span>
      <span style="font-family:var(--font-sans); font-size:13px; color:var(--fg-default); flex:1;">Query retorna 0 duplicatas</span>
      <span style="display:inline-flex; align-items:center; padding:1px 6px; border-radius:3px; background:color-mix(in srgb, var(--verifier-query) 18%, var(--bg-surface)); color:var(--verifier-query); font-family:var(--font-mono); font-size:10px; font-weight:600; border:1px solid color-mix(in srgb, var(--verifier-query) 35%, transparent);">query</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">SELECT COUNT(*) FROM …</span>
    </div>
  
    <div class="row" style="gap:10px; padding:8px 12px; ">
      <span style="font-family:var(--font-mono); color:var(--status-pending); width:14px;">·</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted); width:48px;">F0-G3</span>
      <span style="font-family:var(--font-sans); font-size:13px; color:var(--fg-default); flex:1;">scripts/full-pipeline.sh exit 0</span>
      <span style="display:inline-flex; align-items:center; padding:1px 6px; border-radius:3px; background:color-mix(in srgb, var(--verifier-shell) 18%, var(--bg-surface)); color:var(--verifier-shell); font-family:var(--font-mono); font-size:10px; font-weight:600; border:1px solid color-mix(in srgb, var(--verifier-shell) 35%, transparent);">shell</span>
      <span style="font-family:var(--font-mono); font-size:11px; color:var(--fg-subtle); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">bash scripts/full-pipeline.sh</span>
    </div>
  
</div>

</div>
</body>
</html>
