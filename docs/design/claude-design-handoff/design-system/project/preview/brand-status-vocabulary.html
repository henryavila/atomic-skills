<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:240px;}</style>
</head>
<body>
<div class="card" style="height:240px;">

<div class="col" style="gap:8px;">
  <div class="label">canonical states</div>
  <div class="row wrap" style="gap:6px;">
    <span class="chip" style="color:var(--status-done); background:var(--status-done-bg); border-color:color-mix(in srgb, var(--status-done) 30%, transparent);">✓ done</span><span class="chip" style="color:var(--status-active); background:var(--status-active-bg); border-color:color-mix(in srgb, var(--status-active) 30%, transparent);">◉ active</span><span class="chip" style="color:var(--status-pending); background:var(--status-pending-bg); border-color:color-mix(in srgb, var(--status-pending) 30%, transparent);">· pending</span><span class="chip" style="color:var(--status-blocked); background:var(--status-blocked-bg); border-color:color-mix(in srgb, var(--status-blocked) 30%, transparent);">⊘ blocked</span><span class="chip" style="color:var(--status-parked); background:var(--status-parked-bg); border-color:color-mix(in srgb, var(--status-parked) 30%, transparent);">⌂ parked</span><span class="chip" style="color:var(--status-emerged); background:var(--status-emerged-bg); border-color:color-mix(in srgb, var(--status-emerged) 30%, transparent);">⇥ emerged</span><span class="chip" style="color:var(--status-highlighted); background:var(--status-highlighted-bg); border-color:color-mix(in srgb, var(--status-highlighted) 30%, transparent);">⚑ highlighted</span>
  </div>
  <div class="label" style="margin-top:6px;">severity (highlights)</div>
  <div class="row wrap" style="gap:6px;">
    <span class="chip" style="color:var(--severity-info); background:color-mix(in srgb, var(--severity-info) 14%, var(--bg-surface)); border-color:color-mix(in srgb, var(--severity-info) 35%, transparent);">info</span><span class="chip" style="color:var(--severity-warn); background:color-mix(in srgb, var(--severity-warn) 14%, var(--bg-surface)); border-color:color-mix(in srgb, var(--severity-warn) 35%, transparent);">warn</span><span class="chip" style="color:var(--severity-critical); background:color-mix(in srgb, var(--severity-critical) 14%, var(--bg-surface)); border-color:color-mix(in srgb, var(--severity-critical) 35%, transparent);">critical</span>
  </div>
  <div class="label" style="margin-top:6px;">verifier kinds (exit gates)</div>
  <div class="row wrap" style="gap:6px;">
    <span class="chip" style="color:var(--verifier-shell); background:color-mix(in srgb, var(--verifier-shell) 16%, var(--bg-surface)); border-color:color-mix(in srgb, var(--verifier-shell) 35%, transparent); border-radius:4px;">$_ shell</span><span class="chip" style="color:var(--verifier-query); background:color-mix(in srgb, var(--verifier-query) 16%, var(--bg-surface)); border-color:color-mix(in srgb, var(--verifier-query) 35%, transparent); border-radius:4px;">SQL query</span><span class="chip" style="color:var(--verifier-test); background:color-mix(in srgb, var(--verifier-test) 16%, var(--bg-surface)); border-color:color-mix(in srgb, var(--verifier-test) 35%, transparent); border-radius:4px;">✓✓ test</span><span class="chip" style="color:var(--verifier-manual); background:color-mix(in srgb, var(--verifier-manual) 16%, var(--bg-surface)); border-color:color-mix(in srgb, var(--verifier-manual) 35%, transparent); border-radius:4px;">👁 manual</span>
  </div>
  <div class="t-caption" style="margin-top:6px;">Three vocabularies: <b style="color:var(--fg-default);">state</b> (what's the entity doing?), <b style="color:var(--fg-default);">severity</b> (how loud is this flag?), <b style="color:var(--fg-default);">verifier</b> (how do we check?).</div>
</div>

</div>
</body>
</html>
