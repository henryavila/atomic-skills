<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:220px;}</style>
</head>
<body>
<div class="card" style="height:220px;">

<div class="col" style="gap:12px;">
  <div style="background:var(--bg-surface); border:1px solid var(--border-default); border-radius:10px; padding:18px 20px; box-shadow:var(--shadow-ambient);">
    <div style="font-size:24px; font-weight:600; color:var(--fg-default); letter-spacing:-0.02em; line-height:1.1;">fg-default · #e9eef5</div>
    <div style="font-size:13px; color:var(--fg-default); margin-top:2px;">primary text — headings, body</div>
    <div style="font-size:14px; color:var(--fg-muted); margin-top:10px;">fg-muted · #98a1ad — labels, secondary copy</div>
    <div style="font-size:13px; color:var(--fg-subtle); margin-top:4px;">fg-subtle · #6b7585 — metadata, timestamps</div>
    <div style="font-size:13px; color:var(--fg-faint); margin-top:4px;">fg-faint · #424a5a — disabled, vertical rules</div>
    <div class="row" style="margin-top:12px; gap:8px;">
      <span style="background:var(--status-active); color:var(--fg-on-accent); padding:3px 10px; border-radius:999px; font-family:var(--font-mono); font-size:11px; font-weight:600;">fg-on-accent · text on fill</span>
    </div>
  </div>
</div>

</div>
</body>
</html>
