<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:200px;}</style>
</head>
<body>
<div class="card" style="height:200px;">

<div class="col" style="gap:14px;">
  <div class="swatch-grid swatch-grid-7" style="gap:6px;">
    
      <div class="swatch-cell">
        <div style="height:48px; display:flex; align-items:center; justify-content:center; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; font-family:var(--font-mono); font-size:22px; color:var(--status-done);">✓</div>
        <div class="label" style="text-align:center;">done</div>
      </div>
    
      <div class="swatch-cell">
        <div style="height:48px; display:flex; align-items:center; justify-content:center; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; font-family:var(--font-mono); font-size:22px; color:var(--status-active);">◉</div>
        <div class="label" style="text-align:center;">active</div>
      </div>
    
      <div class="swatch-cell">
        <div style="height:48px; display:flex; align-items:center; justify-content:center; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; font-family:var(--font-mono); font-size:22px; color:var(--status-pending);">·</div>
        <div class="label" style="text-align:center;">pending</div>
      </div>
    
      <div class="swatch-cell">
        <div style="height:48px; display:flex; align-items:center; justify-content:center; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; font-family:var(--font-mono); font-size:22px; color:var(--status-blocked);">⊘</div>
        <div class="label" style="text-align:center;">blocked</div>
      </div>
    
      <div class="swatch-cell">
        <div style="height:48px; display:flex; align-items:center; justify-content:center; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; font-family:var(--font-mono); font-size:22px; color:var(--status-parked);">⌂</div>
        <div class="label" style="text-align:center;">parked</div>
      </div>
    
      <div class="swatch-cell">
        <div style="height:48px; display:flex; align-items:center; justify-content:center; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; font-family:var(--font-mono); font-size:22px; color:var(--status-emerged);">⇥</div>
        <div class="label" style="text-align:center;">emerged</div>
      </div>
    
      <div class="swatch-cell">
        <div style="height:48px; display:flex; align-items:center; justify-content:center; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; font-family:var(--font-mono); font-size:22px; color:var(--status-highlighted);">⚑</div>
        <div class="label" style="text-align:center;">highlighted</div>
      </div>
    
  </div>
  <div class="t-caption">Status glyphs are Unicode — no SVG, no PNG, no icon font for these. Renders identically in terminal, browser, and dumps to text.</div>
</div>

</div>
</body>
</html>
