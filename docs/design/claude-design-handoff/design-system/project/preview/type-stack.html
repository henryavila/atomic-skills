<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:220px;}</style>
</head>
<body>
<div class="card" style="height:220px;">

<div class="col" style="gap:14px;">
  <div class="row" style="gap:14px;">
    <div style="flex:1; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:8px; padding:14px 16px;">
      <div class="label" style="margin-bottom:6px;">Sans · Geist</div>
      <div style="font-family:var(--font-sans); font-size:30px; font-weight:600; line-height:1.1; letter-spacing:-0.02em;">Aa Bb Cc</div>
      <div style="font-family:var(--font-sans); font-size:13px; color:var(--fg-muted); margin-top:8px;">UI · 300 / 400 / 500 / 600 / 700</div>
    </div>
    <div style="flex:1; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:8px; padding:14px 16px;">
      <div class="label" style="margin-bottom:6px;">Mono · Geist Mono</div>
      <div style="font-family:var(--font-mono); font-size:30px; font-weight:500; line-height:1.1;">Aa Bb 01</div>
      <div style="font-family:var(--font-mono); font-size:13px; color:var(--fg-muted); margin-top:8px;">paths, ids, code · 400 / 500 / 600</div>
    </div>
  </div>
  <div class="t-caption">Two-family pairing. Strong mono is non-negotiable — developers read paths, ids, and code constantly. Sans handles everything else.</div>
</div>

</div>
</body>
</html>
