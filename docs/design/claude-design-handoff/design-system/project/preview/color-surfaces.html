<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:200px;}</style>
</head>
<body>
<div class="card" style="height:200px;">

<div class="col" style="gap:14px;">
  <div class="row" style="gap:0; border:1px solid var(--border-default); border-radius:10px; overflow:hidden; height:120px; box-shadow:var(--shadow-ambient);">
    <div style="flex:1; height:100%; background:var(--bg-sunken); padding:12px; display:flex; flex-direction:column; justify-content:flex-end;">
      <div class="label">L0 · sunken</div>
      <div class="value">#07090d</div>
    </div>
    <div style="flex:1; height:100%; background:var(--bg-canvas); padding:12px; display:flex; flex-direction:column; justify-content:flex-end;">
      <div class="label">L1 · canvas</div>
      <div class="value">#0a0d12</div>
    </div>
    <div style="flex:1; height:100%; background:var(--bg-surface); padding:12px; display:flex; flex-direction:column; justify-content:flex-end;">
      <div class="label">L2 · surface</div>
      <div class="value">#12161d</div>
    </div>
    <div style="flex:1; height:100%; background:var(--bg-elevated); padding:12px; display:flex; flex-direction:column; justify-content:flex-end;">
      <div class="label">L3 · elevated</div>
      <div class="value">#1a1f28</div>
    </div>
    <div style="flex:1; height:100%; background:var(--bg-overlay); padding:12px; display:flex; flex-direction:column; justify-content:flex-end;">
      <div class="label">L4 · overlay</div>
      <div class="value">#232936</div>
    </div>
    <div style="flex:1; height:100%; background:var(--bg-highlight); padding:12px; display:flex; flex-direction:column; justify-content:flex-end;">
      <div class="label">L5 · highlight</div>
      <div class="value">#2d3340</div>
    </div>
  </div>
  <div class="t-caption">Six dark surface steps. Each card or panel composites <b style="color:var(--fg-default);">surface step + 1px hairline + subtle inner highlight</b> — never drop shadows.</div>
</div>

</div>
</body>
</html>
