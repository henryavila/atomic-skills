<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:200px;}</style>
</head>
<body>
<div class="card" style="height:200px;">

<div class="col" style="gap:14px;">
  <div class="row" style="gap:12px;">
    
      <div class="swatch-cell" style="flex:1;">
        <div style="height:54px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:2px; "></div>
        <div class="label">radius-xs</div>
        <div class="value">2px</div>
      </div>
    
      <div class="swatch-cell" style="flex:1;">
        <div style="height:54px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:4px; "></div>
        <div class="label">radius-sm</div>
        <div class="value">4px</div>
      </div>
    
      <div class="swatch-cell" style="flex:1;">
        <div style="height:54px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:6px; "></div>
        <div class="label">radius-md</div>
        <div class="value">6px</div>
      </div>
    
      <div class="swatch-cell" style="flex:1;">
        <div style="height:54px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:8px; "></div>
        <div class="label">radius-lg</div>
        <div class="value">8px</div>
      </div>
    
      <div class="swatch-cell" style="flex:1;">
        <div style="height:54px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:12px; "></div>
        <div class="label">radius-xl</div>
        <div class="value">12px</div>
      </div>
    
      <div class="swatch-cell" style="flex:1;">
        <div style="height:54px; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:999px; aspect-ratio:auto;"></div>
        <div class="label">radius-pill</div>
        <div class="value">999px</div>
      </div>
    
  </div>
  <div class="t-caption">Modest radii — this is DevTools, not pillows. <code class="t-code-inline">radius-md</code> is the default; <code class="t-code-inline">pill</code> reserved for chips.</div>
</div>

</div>
</body>
</html>
