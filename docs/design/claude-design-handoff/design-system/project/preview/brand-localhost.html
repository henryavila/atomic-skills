<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>html,body{height:170px;}</style>
</head>
<body>
<div class="card" style="height:170px;">

<div class="col" style="gap:12px;">
  <div class="row" style="gap:14px;">
    <div style="flex:1; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:8px; padding:14px 16px;">
      <div class="row" style="gap:8px;">
        <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--status-done); box-shadow:0 0 8px color-mix(in srgb, var(--status-done) 60%, transparent);"></span>
        <span style="font-family:var(--font-mono); font-size:13px; color:var(--fg-default);">127.0.0.1:7777</span>
      </div>
      <div class="t-caption" style="margin-top:8px;">Persistent chrome indicator — green dot = runtime live, localhost-bound, zero telemetry.</div>
    </div>
  </div>
  <div class="t-caption">"Files are canonical. Localhost-only." The 127.0.0.1 badge is brand: it reinforces the trust contract on every screen.</div>
</div>

</div>
</body>
</html>
