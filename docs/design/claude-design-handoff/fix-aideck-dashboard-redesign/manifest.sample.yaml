# ───────────────────────────────────────────────────────────────────────────
# manifest.yaml — AMOSTRA gerada a partir da tela "Atomic Skills Dashboard"
#
# Como ler este arquivo:
#  • Estrutura (páginas/widgets/bindings) → gerada por Claude Code a partir do design.
#  • `source.ref` aponta para DATA FILES lidos do disco — os dados NÃO entram aqui.
#  • Linhas marcadas  # ⬅ DERIVED  são campos que o EMITTER (atomic-skills) precisa
#    escrever nos data files. O aiDeck não os calcula — ele só lê, valida e renderiza.
#  • Widgets marcados  # ⬅ NOVO  dependem dos componentes em aideck-widgets-spec.md.
#  • Nada de vocabulário de domínio nos WIDGETS: status é dado-do-consumer, mapeado a
#    tons via statusMap. Os nomes de coleção/campo abaixo são do CONSUMER, não do aiDeck.
# ───────────────────────────────────────────────────────────────────────────

schemaVersion: "2.0"
name: project-tracker

# ── Data sources: lidos do disco, validados contra JSON Schema ───────────────
sources:
  projects:     { path: state/projects.json,     schema: schemas/project.json }
  plans:        { path: state/plans.json,         schema: schemas/plan.json }
  phases:       { path: state/phases.json,        schema: schemas/phase.json }
  initiatives:  { path: state/initiatives.json,   schema: schemas/initiative.json }
  tasks:        { path: state/tasks.json,         schema: schemas/task.json }
  gates:        { path: state/gates.json,         schema: schemas/gate.json }
  catalog:      { path: meta/catalog.json,        schema: schemas/catalog-entry.json }

# ── Vocabulário de status do consumer → tons do DS (o widget só conhece tons) ─
statusMap:
  active:   info
  pending:  neutral
  paused:   warning
  blocked:  error
  done:     success
  archived: neutral
  met:      success
  deferred: warning

# ── Chrome do runtime (header-nav) ───────────────────────────────────────────
chrome:
  trustSignal: "127.0.0.1"            # localhost-only, zero telemetry
  commandPalette:                     # ⬅ NOVO (header-nav): atalho global ⌘K
    shortcut: "mod+k"
    search:
      - { ref: plans,  fields: [title, slug, branch, status], scopeBy: projectId,
          navigate: { page: plan,  param: slug } }
      - { kind: pages, navigate: { page: "$id" } }
    order: [record, page]             # registros antes de páginas
  help:                               # ⬅ NOVO (header-nav): botão ? abre a página `help`
    button: "?"
    opens: help

# ── Home cross-project (landing) ─────────────────────────────────────────────
pages:
  - id: panorama
    title: Panorama
    home: true                        # default ao abrir, sem rota específica
    layout: sections
    sections:
      - widgets:
          # faixa de totais cross-project (4 × colSpan 3) — agregações expressáveis no binding
          - { type: stat, colSpan: 3, source: { ref: projects, agg: count },
              config: { label: "PROJETOS" } }
          - { type: stat, colSpan: 3, source: { ref: plans, agg: count, where: { status: active } },
              config: { label: "FRENTES ATIVAS", tone: info } }
          - { type: stat, colSpan: 3,
              source: { ref: projects, agg: count, where: { activeCount: { gt: 1 } } }, # ⬅ DERIVED activeCount
              config: { label: "EM PARALELO", tone: info } }
          - { type: stat, colSpan: 3, source: { ref: tasks, agg: count, where: { blocked: true } }, # ⬅ DERIVED blocked
              config: { label: "TASKS TRAVADAS", tone: error } }
      - title: Projetos
        subtitle: "o que cada um está rodando — paralelo, isolado ou ocioso"
        widgets:
          - type: collection-grid       # ⬅ NOVO
            colSpan: 12
            source: { ref: projects }
            minColWidth: 340px
            attention: { when: blockedCount, gt: 0, tone: error }   # ⬅ DERIVED blockedCount
            card:
              title:  { field: name, link: { to: foco-agora, param: id } }
              badge:  { field: mode }                                # ⬅ DERIVED mode (paralelo N|isolado|ocioso)
              live:   { when: hasActiveFront }                       # ⬅ DERIVED hasActiveFront
              metrics:
                - { label: "PLANOS",       field: plansSummary }     # ⬅ DERIVED "13 · 8 ✓"
                - { label: "FASES ATIVAS", field: phasesActiveText } # ⬅ DERIVED "3/20"
                - { label: "TRAVADAS",     field: blockedCount, tone: { when: { gt: 0 }, use: error } }
              nested:                                                # frentes vivas (até 3)
                source: { ref: plans, where: { projectId: "$record.id", status: active }, limit: 3 }
                show:   { status: status, title: title, caption: nextText, badge: currentPhase } # ⬅ DERIVED nextText
                onItem: { to: plan, param: slug }
              overflow: { field: moreFrontsText }                    # ⬅ DERIVED "+2 frentes"
              footer:   { field: updatedRel }                        # ⬅ DERIVED tempo relativo

  # ── Páginas scoped por projeto (repetidas por projeto no menu lateral) ─────
  - id: foco-agora
    title: Foco agora
    scope: project                      # herda o projeto selecionado
    layout: sections
    sections:
      - widgets:
          - type: headline-banner       # ⬅ NOVO — paralelo vs isolado
            colSpan: 12
            source: { ref: plans, where: { projectId: "$scope", status: [active, paused] } }
            count: { agg: count, where: { status: active } }
            tone:  { from: parallelTone }                            # ⬅ DERIVED (info|success|neutral)
            lanes: { perRecord: true, tone: status }                 # 1 marca por plano
            config: { title: bannerTitle, sub: bannerSub }           # ⬅ DERIVED rótulos
      - title: Frentes em foco
        subtitle: "onde estou — fase atual e próxima ação de cada frente viva"
        widgets:
          # 1 card por plano ativo (preset record-card = card + stepper + progress + callout)
          - repeat: { source: { ref: plans, where: { projectId: "$scope", status: active } } }
            colSpan: { 1: 12, default: 6 }                           # 1 ativo = full; 2+ = meia
            type: card                  # composição (preset) — ver §11 da spec
            live: { when: status, eq: active }
            slots:
              header:  { title: title, caption: branch, link: { to: plan, param: slug } }
              stepper:                                               # ⬅ NOVO — trilha macro
                type: stepper
                orientation: horizontal
                source: { ref: phases, where: { planSlug: "$record.slug" } }
                fieldMap: { id: id, status: status }
                currentId: { field: currentPhase }
                label: { field: phasesText }                         # ⬅ DERIVED "2/7 fases"
              progress:                                              # micro (tasks da fase atual)
                type: progress
                label: "TASKS DA FASE ATUAL"
                valueText: { field: focusTasksText }                 # ⬅ DERIVED "5/12"
                value:     { field: focusTasksPct }                  # ⬅ DERIVED 0..100
                caption:   { field: focusMeta }                      # ⬅ DERIVED "gates 1/1 · 1 frame"
              callout:                                               # ⬅ NOVO — próxima ação
                type: callout
                tone: info
                fieldMap: { eyebrow: "PRÓXIMA AÇÃO", body: nextText } # ⬅ DERIVED nextText
              footer: { field: updatedRel }
      - title: "Suspenso & travado"
        widgets:
          - type: table
            colSpan: 12
            source: { ref: plans, where: { projectId: "$scope", status: [paused, blocked] } }
            columns: [ title, status, currentPhaseText, nextText ]   # ⬅ DERIVED currentPhaseText, nextText
            rowLink: { to: plan, param: slug }
            empty: "nada suspenso ou travado"

  - id: visao-geral
    title: Visão geral
    scope: project
    layout: sections
    sections:
      - widgets:    # 6 stats — ver Panorama para o padrão (count/ratio/where)
          - { type: stat, colSpan: 2, source: { ref: plans, agg: count, where: { projectId: "$scope", status: active } }, config: { label: "FRENTES ATIVAS", tone: info } }
          - { type: stat, colSpan: 2, source: { ref: plans, agg: count, where: { projectId: "$scope", status: paused } }, config: { label: "SUSPENSAS", tone: warning } }
          - { type: stat, colSpan: 2, source: { ref: phases, agg: count, where: { projectId: "$scope", status: active } }, config: { label: "FASES ATIVAS" } }
          - { type: stat, colSpan: 2, source: { ref: tasks, agg: ratio, of: { status: done }, where: { projectId: "$scope" } }, config: { label: "TASKS" } }
          - { type: stat, colSpan: 2, source: { ref: gates, agg: ratio, of: { status: met }, where: { projectId: "$scope" } }, config: { label: "EXIT GATES" } }
          - { type: stat, colSpan: 2, source: { ref: tasks, agg: count, where: { projectId: "$scope", blocked: true } }, config: { label: "TASKS TRAVADAS", tone: error } }
      - title: Frentes vivas
        widgets:
          - type: table
            colSpan: 12
            source: { ref: plans, where: { projectId: "$scope", status: [active, paused] } }
            columns:
              - title
              - status
              - currentPhaseText                                     # ⬅ DERIVED
              - { field: phasesStepper, render: stepper, dense: true } # ⬅ NOVO stepper inline (dense)
              - nextText                                             # ⬅ DERIVED
              - updatedRel                                           # ⬅ DERIVED
            rowLink: { to: plan, param: slug }

  - id: plan
    title: Detalhe do plano
    scope: project
    param: { match: [slug] }            # /plan/:slug
    layout: sections
    sections:
      - widgets:
          - type: record-switcher        # ⬅ NOVO — seletor no título (substitui tabs)
            trigger: title
            source: { ref: plans, where: { projectId: "$scope", status: [active, paused] } }
            fieldMap: { id: slug, title: title, status: status, caption: switcherCaption } # ⬅ DERIVED
            emits: { onSelect: { set: "$param.slug" } }
      - widgets:
          - type: stepper                # ⬅ NOVO — roteiro vertical selecionável c/ deps
            colSpan: 5
            source: { ref: phases, where: { planSlug: "$param.slug" } }
            orientation: vertical
            selectable: true
            showDependencies: true
            fieldMap: { id: id, label: title, status: status, dependsOn: dependsOn, metric: tasksText } # ⬅ DERIVED tasksText
            currentId: { field: currentPhase }
            emits: { onSelect: { set: selectedPhase } }     # default = currentPhase
            header: { label: roteiroSub }                   # ⬅ DERIVED "2/7 fases concluídas"

          - type: container              # preset record-detail (lado direito)
            colSpan: 7
            title: "Tasks da fase"
            subtitle: { field: selectedPhaseLabel }         # ⬅ DERIVED "F1 · fase atual"
            source: { ref: initiatives, where: { planSlug: "$param.slug", phaseId: "$selectedPhase" } }
            empty: "fase ainda não decomposta em tasks"
            slots:
              callout: { type: callout, tone: info, fieldMap: { eyebrow: "PRÓXIMA AÇÃO", body: nextText } }
              metrics: { row: [ { label: "TASKS", field: tasksText },
                                { label: "GATES", field: gatesText },
                                { label: "STACK", field: stackText } ] }   # ⬅ DERIVED
              tasks:                       # ⬅ NOVO status-list (agrupada)
                type: status-list
                source: { ref: tasks, where: { initiativeId: "$record.id" } }
                groupBy: status
                groupOrder: [active, blocked, pending, done]
                fieldMap: { id: id, label: title, status: status, annotation: blockedByText } # ⬅ DERIVED
              gates:                       # ⬅ NOVO status-list / checklist
                type: status-list
                variant: checklist
                source: { ref: gates, where: { initiativeId: "$record.id" } }
                fieldMap: { id: id, status: status, meta: verifierLabel }

  - id: concluidos
    title: Concluídos
    scope: project
    layout: single
    widget:
      type: table
      source: { ref: plans, where: { projectId: "$scope", status: [done, archived] } }
      columns: [ title, status, phasesSummary, updatedRel ]          # ⬅ DERIVED phasesSummary "5/7 fases"
      summary: [ { count: archived }, { count: done } ]
      rowLink: { to: plan, param: slug }

  # ── Ajuda (catálogo plano, ortogonal; aberta pelo botão ? do chrome) ───────
  - id: help
    title: Ajuda
    layout: master-detail
    widget:
      type: catalog                       # ⬅ NOVO
      source: { ref: catalog }
      list:
        search: true                      # casa title, id, oneLiner, summary, facets, subItems
        facets: { field: tags }
        denseBadge: { field: subcommands, as: count }
      detail:
        identifier: { field: id, prefix: "/atomic-skills:" }  # o prefixo é DADO do consumer, não do widget
        sections:
          - { kind: summary,  field: summary }
          - { kind: examples, field: examples }                # code blocks
          - { kind: prosCons, pros: when, cons: whenNot,
              labels: { pros: "quando usar", cons: "quando NÃO usar" } }
          - { kind: subItems, field: subcommands, groupBy: group }  # caso denso
          - { kind: fields,   field: args }                    # table
          - { kind: meta,     fields: { deps: dependencies, outputs: outputArtifacts } }
          - { kind: refs,     field: related, navigate: { within: catalog } }  # grafo entre entradas
      fieldMap:
        id: id, title: title, icon: emoji, oneLiner: oneLiner, summary: summary,
        version: versionAdded, facets: tags, examples: examples,
        subItems: subcommands, fields: args, refs: related, deps: dependencies, outputs: outputArtifacts

# ───────────────────────────────────────────────────────────────────────────
# Contrato de campos DERIVED (o emitter atomic-skills precisa escrever nos files):
#   projects[]:  activeCount, blockedCount, mode, hasActiveFront, plansSummary,
#                phasesActiveText, moreFrontsText, updatedRel, parallelTone,
#                bannerTitle, bannerSub
#   plans[]:     status, currentPhase, currentPhaseText, phasesText, nextText,
#                focusTasksText, focusTasksPct, focusMeta, switcherCaption,
#                phasesStepper, phasesSummary, roteiroSub, updatedRel
#   phases[]:    id, title, status, dependsOn, tasksText
#   initiatives[]: phaseId, nextText, tasksText, gatesText, stackText, selectedPhaseLabel
#   tasks[]:     status, blocked(bool), blockedByText, initiativeId
#   gates[]:     status, verifierLabel, initiativeId
#   catalog[]:   (já completo nos fixtures — nada derivado)
#
# Alternativa: se preferir manter os files "crus", esses campos viram EXPRESSÕES
# no manifest — mas só as agregáveis (count/ratio/where) cabem hoje; as de escolha
# (focus, tempo relativo, mode) exigiriam expressões que o aiDeck ainda não tem.
# ───────────────────────────────────────────────────────────────────────────
