<style>
/* ── aiDeck DS foundations (tokens + type) — inlined, offline ── */
/* ─────────────────────────────────────────────────────────────────────
   aiDeck Design System — Foundations (v2)
   Dark-first only. Light theme is explicitly out of scope.

   aiDeck is a GENERIC dashboard runtime: it reads consumer manifests
   and projects 25 built-in widgets across 3 layout modes. Tokens here
   are intentionally domain-agnostic — `status-success` not `phase-done`,
   `chart-1..8` not `verifier-shell`.

   Calibration target: a consumer with 5+ pages, each containing 10-20
   widgets across sections, must fit a 13" laptop without horizontal
   scroll, overflow, truncation, or pagination tricks. Density is a
   feature, not a problem to be solved with whitespace.
   ───────────────────────────────────────────────────────────────────── */

/* Fonts — Inter (sans, UI + narrative) + JetBrains Mono (identifiers,
   paths, code, all monospace surfaces). Both Google Fonts, both free. */
/* Google Fonts @import removed for offline — falls back to the system stack in --font-sans/--font-mono */

:root {
  /* ── Surfaces ─────────────────────────────────────────────────
     Six steps so nested widgets/cards step up without clashing.
     Cooler, deeper canvas → reads as premium dev-tool (Vercel,
     Linear, Raycast). Hairline borders separate steps as primary
     elevation signal; shadows are reserved for floating layers. */
  --bg-sunken:      #07090d;   /* inputs, code blocks, deepest wells */
  --bg-canvas:      #0a0d12;   /* page background */
  --bg-surface:     #12161d;   /* widget cards, section panels */
  --bg-elevated:    #1a1f28;   /* hover, popovers, dropdowns */
  --bg-overlay:     #232936;   /* selected rows, focus halos */
  --bg-highlight:   #2d3340;   /* highest — used sparingly */

  /* ── Glass (premium translucent surfaces) ──────────────────────
     For the chrome header, command palette, drawers, popovers.
     Always paired with backdrop-filter: blur. Falls back gracefully
     when blur is unsupported (still readable). */
  --glass-thin:     rgba(18, 22, 29, 0.55);
  --glass-medium:   rgba(18, 22, 29, 0.72);
  --glass-thick:    rgba(10, 13, 18, 0.85);
  --glass-border:   rgba(255, 255, 255, 0.06);
  --glass-blur:     saturate(180%) blur(20px); /* @kind other */
  --glass-blur-sm:  saturate(160%) blur(10px); /* @kind other */

  /* ── Borders ──────────────────────────────────────────────────
     Three weights. All hairlines are 1px — never thicker. */
  --border-subtle:  #1a2029;   /* faint dividers inside a widget */
  --border-default: #262d38;   /* widget outlines, cards, panels */
  --border-strong:  #3d4656;   /* focus indication, selected */
  --border-bright:  #555f72;   /* hover on interactive elements */

  /* ── Foreground (text + icons) ────────────────────────────────
     Five steps. Captions and metadata default to muted; only primary
     content gets the brightest level. */
  --fg-default:     #e9eef5;   /* primary text — body, headings */
  --fg-muted:       #98a1ad;   /* secondary — captions, labels */
  --fg-subtle:      #6b7585;   /* tertiary — metadata, placeholders */
  --fg-faint:       #424a5a;   /* lowest — disabled, vertical rules */
  --fg-on-accent:   #08090d;   /* text on a saturated chip fill */

  /* ── Semantic status (consumer-agnostic) ──────────────────────
     Five canonical states. Consumers map their domain vocabulary
     onto these tokens — a Kanban "Done" column, a CI "passed" row,
     a metric "trending up" indicator all reach for `success`. */
  --status-success: #4cc28e;   /* emerald   — passed, done, healthy */
  --status-warning: #e0a44a;   /* amber     — needs attention, blocked */
  --status-error:   #ff5c5c;   /* coral red — failed, critical, broken */
  --status-info:    #5fb1ff;   /* azure     — active, running, current */
  --status-neutral: #8b95a3;   /* slate     — idle, pending, unknown */

  /* Soft fills (alpha-mixed onto surface) — for chip & badge backgrounds.
     `color-mix` computes alpha against the underlying surface so chips
     nest correctly inside elevated cards. */
  --status-success-bg: color-mix(in srgb, var(--status-success) 14%, var(--bg-surface));
  --status-warning-bg: color-mix(in srgb, var(--status-warning) 14%, var(--bg-surface));
  --status-error-bg:   color-mix(in srgb, var(--status-error)   16%, var(--bg-surface));
  --status-info-bg:    color-mix(in srgb, var(--status-info)    14%, var(--bg-surface));
  --status-neutral-bg: var(--bg-elevated);

  /* Border-tinted versions, for outlined chips and inline badges */
  --status-success-line: color-mix(in srgb, var(--status-success) 42%, var(--border-default));
  --status-warning-line: color-mix(in srgb, var(--status-warning) 42%, var(--border-default));
  --status-error-line:   color-mix(in srgb, var(--status-error)   48%, var(--border-default));
  --status-info-line:    color-mix(in srgb, var(--status-info)    42%, var(--border-default));
  --status-neutral-line: var(--border-default);

  /* ── Chart palette ─────────────────────────────────────────────
     8 distinguishable hues for multi-series data, ordered for
     legibility on dark surfaces. Tuned in OKLCH for consistent
     luminance — no series is louder than another. Use in order;
     if a chart has 3 series, use --chart-1, -2, -3.
     Modern + elegant, not crayon-box. */
  --chart-1: #5fb1ff;   /* azure       — series A (primary) */
  --chart-2: #4cc28e;   /* emerald     — series B */
  --chart-3: #e668a8;   /* magenta     — series C */
  --chart-4: #e0a44a;   /* amber       — series D */
  --chart-5: #8b5cf6;   /* violet      — series E */
  --chart-6: #2dd4bf;   /* teal        — series F */
  --chart-7: #f0c757;   /* gold        — series G */
  --chart-8: #f87171;   /* coral       — series H (kept last; reads as warning) */

  /* Translucent versions for area fills & bar washes */
  --chart-1-fill: color-mix(in srgb, var(--chart-1) 22%, transparent);
  --chart-2-fill: color-mix(in srgb, var(--chart-2) 22%, transparent);
  --chart-3-fill: color-mix(in srgb, var(--chart-3) 22%, transparent);
  --chart-4-fill: color-mix(in srgb, var(--chart-4) 22%, transparent);
  --chart-5-fill: color-mix(in srgb, var(--chart-5) 22%, transparent);
  --chart-6-fill: color-mix(in srgb, var(--chart-6) 22%, transparent);
  --chart-7-fill: color-mix(in srgb, var(--chart-7) 22%, transparent);
  --chart-8-fill: color-mix(in srgb, var(--chart-8) 22%, transparent);

  /* ── Functional accents (UI chrome) ───────────────────────────
     Primary is `info` (azure) — it's the runtime's signature color.
     The cyan square in the wordmark uses the same hue. */
  --accent-primary: var(--status-info);
  --accent-focus:   #88c4ff;     /* focus-visible ring */
  --accent-link:    #88c4ff;

  /* ── Typography stacks ────────────────────────────────────────
     Inter for sans (UI, narrative, headings). JetBrains Mono for
     identifiers, paths, commands, code, IDs — anywhere fixed-width
     glyph alignment matters. Ligatures off for mono (developers
     want to see exactly what's there). */
  --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system,
               "Segoe UI", Roboto, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono",
               "Menlo", "Consolas", monospace;
  --font-display: var(--font-sans); /* @kind font */

  /* ── Type scale (dense — 10 → 56) ─────────────────────────────
     Base body is 13–14px. View headers 24px. Page titles 28–32px.
     Intentionally tighter than a marketing page: developers prefer
     more rows over taller rows. */
  --fs-2xs: 10px;    /* micro labels — use sparingly */
  --fs-xs:  11px;    /* timestamps, IDs, metadata */
  --fs-sm:  12px;    /* table cells, captions */
  --fs-base:13px;    /* dense body default */
  --fs-md:  14px;    /* primary body, UI controls */
  --fs-lg:  16px;    /* widget titles */
  --fs-xl:  20px;    /* section headers */
  --fs-2xl: 24px;    /* page headers */
  --fs-3xl: 32px;    /* page titles, stat-widget value */
  --fs-4xl: 40px;    /* hero stat / dashboard headline */
  --fs-5xl: 56px;    /* display — single-page hero only */

  /* ── Line heights ─────────────────────────────────────────────  */
  --lh-tight:  1.15;   /* @kind font */ /* headings, large numbers */
  --lh-snug:   1.35;   /* @kind font */ /* UI text, widget body */
  --lh-normal: 1.5;    /* @kind font */ /* body */
  --lh-relaxed:1.65;   /* @kind font */ /* long-form narrative (markdown widget) */

  /* ── Letter spacing ───────────────────────────────────────────  */
  --tracking-tight:  -0.015em; /* @kind font */
  --tracking-normal: 0; /* @kind font */
  --tracking-wide:   0.04em;     /* uppercase eyebrows · @kind font */
  --tracking-wider:  0.08em;     /* status pills, all-caps labels · @kind font */

  /* ── Font weights (Inter) ─────────────────────────────────────  */
  --fw-regular:  400; /* @kind font */
  --fw-medium:   500; /* @kind font */
  --fw-semibold: 600; /* @kind font */
  --fw-bold:     700; /* @kind font */

  /* ── Spacing scale (4px base) ─────────────────────────────────
     Dense. Calibrated so a sections-layout page with 8 widgets
     (mix of stat tiles and tables) fits the visible fold of a
     13" laptop without horizontal scroll. */
  --space-0:  0;
  --space-1:  2px;
  --space-2:  4px;
  --space-3:  6px;
  --space-4:  8px;
  --space-5:  10px;
  --space-6:  12px;
  --space-7:  14px;
  --space-8:  16px;
  --space-10: 20px;
  --space-12: 24px;
  --space-14: 28px;
  --space-16: 32px;
  --space-20: 40px;
  --space-24: 48px;
  --space-32: 64px;

  /* ── Radii ─────────────────────────────────────────────────────
     Modest. Default for widgets and buttons is 8px. Pills (status
     chips) are 999px. This is DevTools — not consumer-app pillows. */
  --radius-none: 0;
  --radius-xs:   2px;
  --radius-sm:   4px;
  --radius-md:   6px;       /* inline chips, small controls */
  --radius-lg:   8px;       /* default widget, button */
  --radius-xl:   12px;      /* large panels, drawer */
  --radius-2xl:  16px;      /* hero stat tile, modal */
  --radius-pill: 999px;

  /* ── Borders ──────────────────────────────────────────────────  */
  --border-width: 1px; /* @kind spacing */

  /* ── Elevation ────────────────────────────────────────────────
     Dark surfaces get a SUBTLE inner highlight (1px top, 4-7% white)
     to mimic top-light. Drop shadows used only for floating layers
     (menus, popovers, drawer). Hairline borders + surface step are
     the primary elevation signal. */
  --highlight-inset:        inset 0 1px 0 rgba(255, 255, 255, 0.045);
  --highlight-inset-strong: inset 0 1px 0 rgba(255, 255, 255, 0.075);
  --shadow-none:    none;
  --shadow-ambient: 0 1px 0 rgba(0, 0, 0, 0.4),
                    var(--highlight-inset);
  --shadow-sm:      0 2px 4px -2px rgba(0, 0, 0, 0.5),
                    var(--highlight-inset);
  --shadow-md:      0 8px 24px -8px rgba(0, 0, 0, 0.6),
                    0 2px 6px -2px rgba(0, 0, 0, 0.4),
                    var(--highlight-inset);
  --shadow-lg:      0 24px 48px -16px rgba(0, 0, 0, 0.7),
                    0 8px 16px -4px rgba(0, 0, 0, 0.45),
                    var(--highlight-inset-strong);
  --shadow-xl:      0 40px 80px -24px rgba(0, 0, 0, 0.8),
                    0 16px 32px -8px rgba(0, 0, 0, 0.5),
                    var(--highlight-inset-strong);
  --shadow-focus:   0 0 0 2px var(--bg-canvas),
                    0 0 0 4px var(--accent-focus);
  --shadow-glow-info: 0 0 0 1px color-mix(in srgb, var(--status-info) 50%, transparent),
                      0 0 32px -8px color-mix(in srgb, var(--status-info) 50%, transparent),
                      var(--highlight-inset);

  /* ── Motion ───────────────────────────────────────────────────
     Quick & quiet. No bouncy springs — this is a cockpit. */
  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */
  --duration-instant: 80ms; /* @kind other */
  --duration-fast:    120ms; /* @kind other */
  --duration-normal:  200ms; /* @kind other */
  --duration-slow:    320ms; /* @kind other */

  /* ── Textures ─────────────────────────────────────────────────
     Two canonical textures. Grid is the default canvas background —
     it gives the runtime its engineered, graph-paper feel. Scan
     overlays "live data is streaming" surfaces (SSE-connected widgets).
     Both respect prefers-reduced-motion. */
  --texture-grid: radial-gradient(circle at 1px 1px,
    rgba(255, 255, 255, 0.085) 1px, transparent 0); /* @kind other */
  --texture-grid-size: 28px 28px;

  --texture-scan: repeating-linear-gradient(0deg,
    transparent 0,
    transparent 2px,
    rgba(255, 255, 255, 0.045) 2px,
    rgba(255, 255, 255, 0.045) 3px); /* @kind other */

  /* Larger feature-grid for hero / empty backdrops */
  --texture-grid-lg: linear-gradient(
      rgba(255, 255, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg,
      rgba(255, 255, 255, 0.04) 1px, transparent 1px); /* @kind other */
  --texture-grid-lg-size: 64px 64px;
}

/* ─────────────────────────────────────────────────────────────────────
   Semantic typography presets

   Use these classes; do not hand-pick font-size + weight on every
   element. Anything not covered (rare) is a sign the scale needs
   extending — bring the proposal back to the design system, don't
   one-off it.
   ───────────────────────────────────────────────────────────────────── */

.t-display {
  font-family: var(--font-display);
  font-size: var(--fs-4xl);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--fg-default);
}

.t-display-mono {
  font-family: var(--font-mono);
  font-size: var(--fs-4xl);
  font-weight: var(--fw-medium);
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--fg-default);
  font-feature-settings: "calt" 0;
}

.t-h1 {
  font-family: var(--font-sans);
  font-size: var(--fs-3xl);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--fg-default);
}

.t-h2 {
  font-family: var(--font-sans);
  font-size: var(--fs-2xl);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-tight);
  color: var(--fg-default);
}

.t-h3 {
  font-family: var(--font-sans);
  font-size: var(--fs-xl);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--fg-default);
}

.t-h4 {
  font-family: var(--font-sans);
  font-size: var(--fs-lg);
  font-weight: var(--fw-semibold);
  line-height: var(--lh-snug);
  color: var(--fg-default);
}

.t-body {
  font-family: var(--font-sans);
  font-size: var(--fs-md);
  font-weight: var(--fw-regular);
  line-height: var(--lh-normal);
  color: var(--fg-default);
}

.t-body-sm {
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: var(--lh-normal);
  color: var(--fg-default);
}

.t-caption {
  font-family: var(--font-sans);
  font-size: var(--fs-sm);
  line-height: var(--lh-snug);
  color: var(--fg-muted);
}

.t-meta {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  line-height: var(--lh-snug);
  color: var(--fg-subtle);
  letter-spacing: 0;
  font-feature-settings: "calt" 0;
}

.t-eyebrow {
  font-family: var(--font-sans);
  font-size: var(--fs-2xs);
  font-weight: var(--fw-semibold);
  line-height: 1;
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--fg-muted);
}

.t-code {
  font-family: var(--font-mono);
  font-size: var(--fs-base);
  font-feature-settings: "calt" 0;
  color: var(--fg-default);
}

.t-code-inline {
  font-family: var(--font-mono);
  font-size: 0.92em;
  padding: 0.08em 0.4em;
  background: var(--bg-sunken);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xs);
  color: var(--fg-default);
  font-feature-settings: "calt" 0;
}

.t-link {
  color: var(--accent-link);
  text-decoration: none;
  border-bottom: 1px dotted color-mix(in srgb, var(--accent-link) 50%, transparent);
}
.t-link:hover { border-bottom-style: solid; }

/* Tabular numbers — for stats, tables, anything numeric.
   JetBrains Mono is fixed-pitch; this only helps Inter. */
.t-num {
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1;
}

/* ─────────────────────────────────────────────────────────────────────
   Reset + base
   ───────────────────────────────────────────────────────────────────── */

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-canvas);
  color: var(--fg-default);
  font-family: var(--font-sans);
  font-size: var(--fs-md);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

:focus-visible {
  outline: none;
  box-shadow: var(--shadow-focus);
  border-radius: var(--radius-sm);
}

::selection {
  background: color-mix(in srgb, var(--accent-primary) 35%, transparent);
  color: var(--fg-default);
}

/* ─────────────────────────────────────────────────────────────────────
   Texture utility classes
   ───────────────────────────────────────────────────────────────────── */

/* Default canvas: graph-paper dots. Apply on body or page wrapper. */
.has-texture-grid {
  background-image: var(--texture-grid);
  background-size: var(--texture-grid-size);
  background-attachment: fixed;
}

/* Heavier feature-grid for empty states, hero backdrops, login walls */
.has-texture-grid-lg {
  background-image: var(--texture-grid-lg);
  background-size: var(--texture-grid-lg-size);
}

/* SSE-live widget — slow scan sweep. Apply to a relative-positioned
   widget body; emits a ::after layer above the content. */
.is-live::after {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--texture-scan);
  background-size: 100% 6px;
  pointer-events: none;
  border-radius: inherit;
  animation: aideck-scan-shift 12s linear infinite;
  opacity: 0.45;
  mix-blend-mode: lighten;
}
.is-live { position: relative; }

@keyframes aideck-scan-shift {
  from { background-position: 0 0; }
  to   { background-position: 0 240px; }
}

/* ─────────────────────────────────────────────────────────────────────
   Glass utility — chrome header, drawers, command palette, popovers.

   The translucent dark-surface look is intentional and load-bearing:
   it tells the user the chrome floats above content (the data is
   what matters; chrome is utility). Always paired with backdrop-filter.
   ───────────────────────────────────────────────────────────────────── */

.glass {
  background: var(--glass-medium);
  -webkit-backdrop-filter: var(--glass-blur);
          backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
}
.glass-thin {
  background: var(--glass-thin);
  -webkit-backdrop-filter: var(--glass-blur-sm);
          backdrop-filter: var(--glass-blur-sm);
  border: 1px solid var(--glass-border);
}
.glass-thick {
  background: var(--glass-thick);
  -webkit-backdrop-filter: var(--glass-blur);
          backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
}

/* ─────────────────────────────────────────────────────────────────────
   Skeleton shimmer — loading state for any widget body.
   Apply `.skeleton` to a div sized to the placeholder shape.
   ───────────────────────────────────────────────────────────────────── */

.skeleton {
  position: relative;
  overflow: hidden;
  background: var(--bg-elevated);
  border-radius: var(--radius-sm);
}
.skeleton::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(255, 255, 255, 0.04) 50%,
    transparent 100%);
  animation: aideck-shimmer 1.6s ease-in-out infinite;
}
@keyframes aideck-shimmer {
  from { transform: translateX(-100%); }
  to   { transform: translateX(100%);  }
}

/* ─────────────────────────────────────────────────────────────────────
   Reduced motion — silence all kinetic textures.
   ───────────────────────────────────────────────────────────────────── */

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
  .is-live::after,
  .skeleton::after { animation: none; }
}

</style>
<style>
/* ── aiDeck widget classes — inlined, offline ── */
/* ─────────────────────────────────────────────────────────────────────
   aiDeck v2.1 widget classes — lifted verbatim from the DS specimens
   (preview/widget-*.html). Same class names + values the DS ships, so the
   dashboard renders the canonical widgets, not a re-skin.
   Foundations (tokens) come from colors_and_type.css; chrome/layout from kit.css.
   ───────────────────────────────────────────────────────────────────── */

/* ── status chip (shared atom: stepper, status-list, record-switcher) ── */
.sc { display:inline-flex; align-items:center; gap:5px; height:18px; padding:0 7px; border-radius:var(--radius-pill); font-family:var(--font-sans); font-size:10px; font-weight:500; border:1px solid transparent; white-space:nowrap; }
.sc .d { width:5px; height:5px; border-radius:50%; flex:none; }
.sc.s-active  { background:var(--status-info-bg);    border-color:var(--status-info-line);    color:var(--status-info); }
.sc.s-warn    { background:var(--status-warning-bg); border-color:var(--status-warning-line); color:var(--status-warning); }
.sc.s-error   { background:var(--status-error-bg);   border-color:var(--status-error-line);   color:var(--status-error); }
.sc.s-done    { background:var(--status-success-bg); border-color:var(--status-success-line); color:var(--status-success); }
.sc.s-pending { background:var(--status-neutral-bg); border-color:var(--status-neutral-line); color:var(--fg-muted); }
.sc .d.t-active  { background:var(--status-info); }
.sc .d.t-warn    { background:var(--status-warning); }
.sc .d.t-error   { background:var(--status-error); }
.sc .d.t-done    { background:var(--status-success); }
.sc .d.t-pending { background:var(--status-neutral); }

/* ── stepper · horizontal ───────────────────────────────────────────── */
.hstep { display:flex; align-items:center; }

    html { scroll-behavior: smooth; scroll-padding-top: 24px; }

    .gp-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    .gp-scroll::-webkit-scrollbar-track { background: transparent; }
    .navlink { display:flex; align-items:baseline; gap:9px; padding:7px 10px; border-radius:6px; text-decoration:none; color:var(--fg-muted); transition:background 120ms var(--ease-out), color 120ms var(--ease-out); border-left:2px solid transparent; }
    .navlink:hover { background:var(--bg-elevated); color:var(--fg-default); }
    .navlink .nn { font-family:var(--font-mono); font-size:10px; color:var(--fg-subtle); font-feature-settings:'calt' 0; }
    .cmd-card { transition:border-color 120ms var(--ease-out), background 120ms var(--ease-out); }
    .cmd-card:hover { border-color:var(--border-bright); background:var(--bg-elevated); }
    .mstate:hover { filter:brightness(1.12); }
    .facet { white-space:nowrap; }
  </style>
</head>
<body>
<div id="dc-root"></div>
<template id="dc-tpl">
<div class="has-texture-grid" style="min-height:100vh;display:flex;align-items:flex-start;gap:0">

  <!-- ── side nav ─────────────────────────────────────────────── -->
  <aside class="gp-scroll" style="position:sticky;top:0;flex:none;width:236px;height:100vh;overflow-y:auto;padding:22px 16px;border-right:1px solid var(--border-subtle);background:color-mix(in srgb, var(--bg-canvas) 82%, transparent);backdrop-filter:blur(6px);display:flex;flex-direction:column;gap:4px">
    <div style="display:flex;align-items:center;gap:8px;padding:2px 10px 14px">
      <span style="width:15px;height:15px;border-radius:4px;background:var(--status-info);box-shadow:0 0 10px -1px var(--status-info)"></span>
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--fg-default);font-feature-settings:'calt' 0">atomic-skills<span style="color:var(--fg-subtle)">:</span>project</span>
    </div>
    <div class="t-eyebrow" style="padding:4px 10px 6px;color:var(--fg-subtle)">a constituição</div>
    <a class="navlink" href="#topo"><span class="nn">00</span><span>Modelo mental</span></a>
    <a class="navlink" href="#fluxo"><span class="nn">01</span><span>Fluxo de vida</span></a>
    <a class="navlink" href="#estados"><span class="nn">02</span><span>Máquinas de estado</span></a>
    <a class="navlink" href="#regras"><span class="nn">03</span><span>Pode / Não pode</span></a>
    <a class="navlink" href="#comandos"><span class="nn">04</span><span>Comandos</span></a>
    <a class="navlink" href="#skills"><span class="nn">05</span><span>Skills conectadas</span></a>
    <a class="navlink" href="#perdido"><span class="nn">06</span><span>Estou perdido</span></a>
    <span style="flex:1"></span>
    <div style="margin-top:18px;padding:9px 10px;border:1px solid var(--border-subtle);border-radius:8px;background:var(--bg-surface)">
      <div style="display:flex;align-items:center;gap:7px"><i style="width:6px;height:6px;border-radius:50%;background:var(--status-success);box-shadow:0 0 6px var(--status-success);flex:none"></i><span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);font-feature-settings:'calt' 0">127.0.0.1</span><span style="margin-left:auto;font-family:var(--font-mono);font-size:9px;color:var(--fg-subtle);font-feature-settings:'calt' 0">só leitura</span></div>
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-faint);margin-top:7px;line-height:1.7;font-feature-settings:'calt' 0">estado canônico:<br>~/.atomic-skills/</div>
    </div>
  </aside>

  <!-- ── content ──────────────────────────────────────────────── -->
  <main style="flex:1;min-width:0;max-width:1160px;margin:0 auto;padding:0 clamp(24px,4vw,64px) 96px">

    <!-- HERO -->
    <section id="topo" style="padding:76px 0 8px">
      <div style="display:grid;grid-template-columns:1.15fr 0.85fr;gap:48px;align-items:center">
        <div>
          <div style="display:inline-flex;align-items:center;gap:8px;padding:4px 10px;border:1px solid var(--status-error-line);background:var(--status-error-bg);border-radius:999px;margin-bottom:22px;white-space:nowrap">
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--status-error);font-feature-settings:'calt' 0;white-space:nowrap">IRON LAW</span>
          </div>
          <h1 style="font-family:var(--font-sans);font-size:clamp(30px,3.6vw,46px);font-weight:700;line-height:1.05;letter-spacing:-0.03em;margin:0;color:var(--fg-default);text-wrap:balance">
            Nenhuma implementação<br>sem <span style="color:var(--status-info)">initiative ancorada</span>.
          </h1>
          <p style="font-family:var(--font-sans);font-size:16px;line-height:1.6;color:var(--fg-muted);max-width:52ch;margin:22px 0 0;text-wrap:pretty">
            A skill <span class="t-code-inline">project</span> rastreia trabalho multi-dia como uma máquina de estados sob contrato de gates. Esta página é a <b style="color:var(--fg-default);font-weight:600">constituição</b> — o modelo mental estável, não o estado vivo. Entenda a máquina antes de tocar em qualquer comando.
          </p>
          <div style="display:flex;gap:8px;margin-top:26px;flex-wrap:wrap">
            <a href="#fluxo" style="text-decoration:none"><span class="sc s-active" style="height:26px;padding:0 12px;font-size:11px;cursor:pointer"><span class="d t-active"></span>ver o fluxo de vida →</span></a>
            <a href="#regras" style="text-decoration:none"><span class="sc s-error" style="height:26px;padding:0 12px;font-size:11px;cursor:pointer"><span class="d t-error"></span>o que NÃO pode</span></a>
          </div>
        </div>
        <!-- nested containment glyph -->
        <div style="border:1px solid var(--border-default);border-radius:12px;background:linear-gradient(180deg, var(--bg-surface), var(--bg-canvas));box-shadow:var(--shadow-md);padding:20px">
          <div class="t-eyebrow" style="margin-bottom:14px">o aninhamento · em 30s</div>
          <div style="border:1px solid var(--chart-1);border-radius:10px;padding:12px;background:color-mix(in srgb, var(--chart-1) 7%, transparent)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--chart-1);font-feature-settings:'calt' 0">PLANO</span>
              <span style="font-family:var(--font-mono);font-size:9px;color:var(--fg-subtle);font-feature-settings:'calt' 0">plan/&lt;slug&gt;</span>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px">
              <div style="border:1px solid var(--chart-3);border-radius:8px;padding:9px 10px;background:color-mix(in srgb, var(--chart-3) 8%, transparent)">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                  <span style="font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--chart-3);font-feature-settings:'calt' 0">FASE · F1</span>
                  <span style="font-family:var(--font-mono);font-size:9px;color:var(--fg-subtle);font-feature-settings:'calt' 0">initiative · exit-gate</span>
                </div>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                  <span style="font-family:var(--font-mono);font-size:9px;color:var(--status-info);background:var(--bg-sunken);border:1px solid var(--border-default);border-radius:4px;padding:2px 7px;font-feature-settings:'calt' 0">T-001</span>
                  <span style="font-family:var(--font-mono);font-size:9px;color:var(--status-info);background:var(--bg-sunken);border:1px solid var(--border-default);border-radius:4px;padding:2px 7px;font-feature-settings:'calt' 0">T-002</span>
                  <span style="font-family:var(--font-mono);font-size:9px;color:var(--fg-subtle);background:var(--bg-sunken);border:1px solid var(--border-default);border-radius:4px;padding:2px 7px;font-feature-settings:'calt' 0">T-003</span>
                </div>
              </div>
              <div style="border:1px dashed var(--border-bright);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between">
                <span style="font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--fg-subtle);font-feature-settings:'calt' 0">FASE · F2</span>
                <span style="font-family:var(--font-mono);font-size:9px;color:var(--fg-faint);font-feature-settings:'calt' 0">descriptor-only</span>
              </div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:12px;font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);font-feature-settings:'calt' 0">
            <span style="color:var(--chart-1)">Plano</span> ⊃ <span style="color:var(--chart-3)">Fases</span> ⊃ <span style="color:var(--status-info)">Tasks</span>
          </div>
        </div>
      </div>
    </section>

    <!-- MODELO MENTAL -->
    <section id="modelo" style="padding:52px 0 8px">
      <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:6px">
        <span class="t-eyebrow" style="color:var(--status-info)">00 · entidades</span>
      </div>
      <h2 class="t-h2" style="margin:0 0 4px">As peças que a skill rastreia</h2>
      <p class="t-body-sm" style="color:var(--fg-muted);margin:0 0 24px;max-width:70ch">Uma hierarquia de 3 níveis, mais um inbox e frames laterais. O estado canônico vive em <span class="t-code-inline">.atomic-skills/</span> — versionado em git, <b style="color:var(--fg-default);font-weight:600">nunca editado à mão</b>.</p>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        <sc-for list="{{ entities }}" as="e" hint-placeholder-count="6">
          <div style="border:1px solid var(--border-default);border-left:2px solid {{ e.accent }};border-radius:8px;background:var(--bg-surface);box-shadow:var(--shadow-ambient);padding:13px 14px;display:flex;flex-direction:column;gap:7px">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <span style="font-family:var(--font-sans);font-size:13px;font-weight:600;color:var(--fg-default)">{{ e.name }}</span>
              <span style="font-family:var(--font-mono);font-size:9px;color:{{ e.accent }};font-feature-settings:'calt' 0">{{ e.tag }}</span>
            </div>
            <p style="font-family:var(--font-sans);font-size:11.5px;line-height:1.5;color:var(--fg-muted);margin:0">{{ e.what }}</p>
            <div style="font-family:var(--font-mono);font-size:9.5px;color:var(--fg-subtle);font-feature-settings:'calt' 0;border-top:1px solid var(--border-subtle);padding-top:7px">{{ e.nest }}</div>
          </div>
        </sc-for>
      </div>

      <h3 class="t-h4" style="margin:34px 0 4px">Três conceitos que decidem tudo</h3>
      <p class="t-body-sm" style="color:var(--fg-muted);margin:0 0 18px">Sem eles, o resto do sistema não faz sentido.</p>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
        <sc-for list="{{ concepts }}" as="c" hint-placeholder-count="3">
          <div style="border:1px solid var(--border-default);border-radius:10px;background:var(--bg-surface);box-shadow:var(--shadow-sm);overflow:hidden;display:flex;flex-direction:column">
            <div style="padding:12px 14px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:9px">
              <span style="width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;font-weight:600;background:color-mix(in srgb, {{ c.accent }} 16%, var(--bg-surface));border:1px solid {{ c.accent }};color:{{ c.accent }};font-feature-settings:'calt' 0">{{ c.num }}</span>
              <span style="font-family:var(--font-sans);font-size:13px;font-weight:600;color:var(--fg-default)">{{ c.title }}</span>
            </div>
            <div style="padding:13px 14px;display:flex;flex-direction:column;gap:10px;flex:1">
              <p style="font-family:var(--font-sans);font-size:11.5px;line-height:1.55;color:var(--fg-muted);margin:0">{{ c.body }}</p>
              <div style="margin-top:auto;display:flex;flex-direction:column;gap:6px">
                <sc-for list="{{ c.rows }}" as="r" hint-placeholder-count="2">
                  <div style="display:flex;gap:8px;align-items:flex-start">
                    <span style="font-family:var(--font-mono);font-size:9.5px;color:{{ r.color }};background:var(--bg-sunken);border:1px solid var(--border-subtle);border-radius:4px;padding:2px 6px;white-space:nowrap;font-feature-settings:'calt' 0;flex:none">{{ r.key }}</span>
                    <span style="font-family:var(--font-sans);font-size:11px;color:var(--fg-muted);line-height:1.45">{{ r.val }}</span>
                  </div>
                </sc-for>
              </div>
            </div>
          </div>
        </sc-for>
      </div>
    </section>

    <!-- FLUXO DE VIDA -->
    <section id="fluxo" style="padding:56px 0 8px;border-top:1px solid var(--border-subtle);margin-top:44px">
      <span class="t-eyebrow" style="color:var(--status-info)">01 · a espinha</span>
      <h2 class="t-h2" style="margin:6px 0 4px">Da ideia ao arquivamento</h2>
      <p class="t-body-sm" style="color:var(--fg-muted);margin:0 0 22px;max-width:74ch">Cada seta é gateada: <b style="color:var(--fg-default);font-weight:600">não se avança de um estágio com uma pergunta em aberto.</b> Clique num estágio para ver o que ele faz, qual gate o fecha e o que produz.</p>

      <div class="gp-scroll" style="overflow-x:auto;padding:6px 2px 14px">
        <div style="display:flex;align-items:stretch;min-width:min-content;height:96px">
          <sc-for list="{{ spine }}" as="s" hint-placeholder-count="10">
            <sc-if value="{{ s.notFirst }}" hint-placeholder-val="{{ true }}">
              <div style="flex:none;width:74px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding-top:2px">
                <span style="font-family:var(--font-mono);font-size:15px;color:{{ s.gateArrowColor }};line-height:1">→</span>
                <sc-if value="{{ s.hasGate }}" hint-placeholder-val="{{ false }}">
                  <span style="font-family:var(--font-mono);font-size:8.5px;color:var(--status-warning);border:1px solid var(--status-warning-line);background:var(--status-warning-bg);border-radius:4px;padding:2px 5px;text-align:center;line-height:1.2;white-space:nowrap;font-feature-settings:'calt' 0">{{ s.gate }}</span>
                </sc-if>
              </div>
            </sc-if>
            <div style="flex:none;display:flex;align-items:center">
              <div onClick="{{ s.onClick }}" style="{{ s.boxStyle }}">
                <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:0.02em;color:{{ s.labelColor }};font-feature-settings:'calt' 0">{{ s.label }}</span>
                <span style="font-family:var(--font-mono);font-size:8px;color:var(--fg-subtle);font-feature-settings:'calt' 0">{{ s.tier }}</span>
              </div>
            </div>
          </sc-for>
        </div>
      </div>

      <!-- selected stage detail -->
      <div style="margin-top:14px;border:1px solid var(--status-info-line);border-radius:12px;background:var(--bg-surface);box-shadow:var(--shadow-md);overflow:hidden">
        <div style="display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border-subtle);background:color-mix(in srgb, var(--status-info) 6%, var(--bg-surface))">
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-on-accent);background:var(--status-info);border-radius:6px;padding:4px 10px;font-weight:600;font-feature-settings:'calt' 0;white-space:nowrap;flex:none">{{ stage.step }}</span>
          <span style="font-family:var(--font-sans);font-size:18px;font-weight:700;letter-spacing:-0.01em;color:var(--fg-default)">{{ stage.label }}</span>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);font-feature-settings:'calt' 0">{{ stage.tier }}</span>
        </div>
        <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:0">
          <div style="padding:16px 18px;border-right:1px solid var(--border-subtle)">
            <div class="sec-h" style="margin-bottom:8px">o que acontece</div>
            <p style="font-family:var(--font-sans);font-size:13px;line-height:1.6;color:var(--fg-default);margin:0">{{ stage.what }}</p>
            <div class="sec-h" style="margin:16px 0 7px">comandos</div>
            <div style="display:flex;flex-direction:column;gap:6px">
              <sc-for list="{{ stage.cmds }}" as="c" hint-placeholder-count="1">
                <div class="code"><span class="pfx">/atomic-skills:project </span>{{ c }}</div>
              </sc-for>
            </div>
          </div>
          <div style="padding:16px 18px;display:flex;flex-direction:column;gap:14px">
            <sc-if value="{{ stage.hasGate }}" hint-placeholder-val="{{ true }}">
              <div class="callout co-warn">
                <div class="eyebrow">gate que fecha a seta</div>
                <div class="body">{{ stage.gateFull }}</div>
              </div>
            </sc-if>
            <sc-if value="{{ stage.hasProduces }}" hint-placeholder-val="{{ true }}">
              <div>
                <div class="sec-h" style="margin-bottom:6px">produz</div>
                <span style="font-family:var(--font-mono);font-size:11px;color:var(--status-success);background:var(--status-success-bg);border:1px solid var(--status-success-line);border-radius:6px;padding:4px 9px;display:inline-block;font-feature-settings:'calt' 0">{{ stage.produces }}</span>
              </div>
            </sc-if>
            <sc-if value="{{ stage.hasDelegates }}" hint-placeholder-val="{{ false }}">
              <div>
                <div class="sec-h" style="margin-bottom:6px">delega para</div>
                <span style="font-family:var(--font-mono);font-size:11px;color:var(--chart-5);background:color-mix(in srgb, var(--chart-5) 12%, var(--bg-surface));border:1px solid color-mix(in srgb, var(--chart-5) 42%, var(--border-default));border-radius:6px;padding:4px 9px;display:inline-block;font-feature-settings:'calt' 0">↳ {{ stage.delegates }}</span>
              </div>
            </sc-if>
          </div>
        </div>
      </div>

      <!-- two supporting diagrams -->
      <div style="display:grid;grid-template-columns:1.25fr 1fr;gap:16px;margin-top:24px">
        <div style="border:1px solid var(--border-default);border-radius:10px;background:var(--bg-surface);box-shadow:var(--shadow-ambient);padding:16px 18px">
          <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px">
            <h4 class="t-h4" style="margin:0">Criar um plano · <span class="t-code" style="font-size:13px">new plan</span></h4>
            <span class="t-meta">9 estágios · cada um gateia o próximo</span>
          </div>
          <p class="t-body-sm" style="color:var(--fg-subtle);margin:0 0 14px;font-size:11.5px">O bootstrap real, em ordem.</p>
          <div class="vstep">
            <sc-for list="{{ steps }}" as="st" hint-placeholder-count="9">
              <div class="vrow" style="cursor:default;grid-template-columns:26px 1fr auto">
                <div class="vnode"><span class="vnum {{ st.numCls }}">{{ st.n }}</span><span class="vline"></span></div>
                <div style="min-width:0">
                  <div class="vtitle">{{ st.title }}</div>
                  <div class="vdep">{{ st.note }}</div>
                </div>
                <sc-if value="{{ st.hasGate }}" hint-placeholder-val="{{ false }}">
                  <span class="sc {{ st.gateCls }}" style="align-self:center"><span class="d {{ st.gateDot }}"></span>{{ st.gate }}</span>
                </sc-if>
              </div>
            </sc-for>
          </div>
        </div>

        <div style="border:1px solid var(--border-default);border-radius:10px;background:var(--bg-surface);box-shadow:var(--shadow-ambient);padding:16px 18px;display:flex;flex-direction:column">
          <h4 class="t-h4" style="margin:0 0 4px">O loop de execução</h4>
          <p class="t-body-sm" style="color:var(--fg-subtle);margin:0 0 16px;font-size:11.5px">Por fase, depois que o plano existe.</p>
          <div style="display:flex;flex-direction:column;gap:0;flex:1">
            <sc-for list="{{ loop }}" as="l" hint-placeholder-count="4">
              <div style="display:flex;gap:12px;align-items:flex-start">
                <div style="display:flex;flex-direction:column;align-items:center;flex:none;width:22px">
                  <span style="width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:{{ l.color }};border:1px solid {{ l.line }};background:color-mix(in srgb, {{ l.color }} 12%, var(--bg-surface));font-feature-settings:'calt' 0">{{ l.glyph }}</span>
                  <sc-if value="{{ l.notLast }}" hint-placeholder-val="{{ true }}"><span style="width:1px;flex:1;min-height:22px;background:var(--border-default)"></span></sc-if>
                </div>
                <div style="padding-bottom:16px;min-width:0">
                  <div style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--fg-default);font-feature-settings:'calt' 0">{{ l.cmd }}</div>
                  <div style="font-family:var(--font-sans);font-size:11px;color:var(--fg-muted);margin-top:3px;line-height:1.45">{{ l.desc }}</div>
                  <sc-if value="{{ l.hasGate }}" hint-placeholder-val="{{ false }}">
                    <span style="display:inline-block;margin-top:6px;font-family:var(--font-mono);font-size:9px;color:var(--status-warning);border:1px solid var(--status-warning-line);border-radius:4px;padding:2px 6px;font-feature-settings:'calt' 0">⚑ {{ l.gate }}</span>
                  </sc-if>
                </div>
              </div>
            </sc-for>
          </div>
        </div>
      </div>
    </section>

    <!-- MÁQUINAS DE ESTADO -->
    <section id="estados" style="padding:56px 0 8px;border-top:1px solid var(--border-subtle);margin-top:44px">
      <span class="t-eyebrow" style="color:var(--status-info)">02 · transições reais</span>
      <h2 class="t-h2" style="margin:6px 0 4px">Máquinas de estado</h2>

<script>

/* ── minimal offline DC runtime — no React, no Babel, no network ──
   Runs the component class natively; evaluates {{expr}} with new Function;
   expands <sc-for>/<sc-if>; wires on* handlers; re-renders on setState.
   cloneNode preserves SVG namespace, so the state-machine diagram renders
   and no raw {{ }} ever reaches the live parser. */
class DCLogic {
  setState(patch){ Object.assign(this.state, patch); schedule(); }
}
let instance = null, root = null, tpl = null, pending = false;
function evalExpr(expr, scope){
  try { return (new Function('$s', 'with($s){ return (' + expr + ') }'))(scope); }
  catch (e) { return undefined; }
}
function interp(str, scope){
  return str.replace(/\{\{([\s\S]*?)\}\}/g, (_, e) => {
    const v = evalExpr(e.trim(), scope); return v == null ? '' : String(v);
  });
}
function attrExpr(node, name){
  const v = node.getAttribute(name) || '';
  return v.replace(/^\{\{|\}\}$/g, '').trim();
}
function processNodes(nodes, scope, out){
  for (let i = 0; i < nodes.length; i++) processNode(nodes[i], scope, out);
}
function processNode(node, scope, out){
  if (node.nodeType === 3){
    const t = node.nodeValue;
    out.appendChild(document.createTextNode(t.indexOf('{{') >= 0 ? interp(t, scope) : t));
    return;
  }
  if (node.nodeType !== 1){ out.appendChild(node.cloneNode(true)); return; }
  const ln = node.localName;
  if (ln === 'sc-for'){
    const arr = evalExpr(attrExpr(node, 'list'), scope) || [];
    const as = node.getAttribute('as') || 'item';
    for (let k = 0; k < arr.length; k++){
      const child = Object.create(scope); child[as] = arr[k]; child.$index = k;
      processNodes(node.childNodes, child, out);
    }
    return;
  }
  if (ln === 'sc-if'){
    if (evalExpr(attrExpr(node, 'value'), scope)) processNodes(node.childNodes, scope, out);
    return;
  }
  const el = node.cloneNode(false);
  const attrs = Array.prototype.slice.call(el.attributes || []);
  for (const at of attrs){
    const name = at.name, val = at.value;
    if (name.indexOf('hint-') === 0){ el.removeAttribute(name); continue; }
    if (/^on/i.test(name) && val.indexOf('{{') >= 0){
      el.removeAttribute(name);
      const fn = evalExpr(val.replace(/^\{\{|\}\}$/g, '').trim(), scope);
      if (typeof fn === 'function') el.addEventListener(name.slice(2).toLowerCase(), fn);
      continue;
    }
    if (val.indexOf('{{') >= 0) el.setAttribute(name, interp(val, scope));
  }
  if (el.localName === 'input'){
    const vexpr = node.getAttribute('value');
    if (vexpr && vexpr.indexOf('{{') >= 0) el.value = interp(vexpr, scope);
  }
  processNodes(node.childNodes, scope, el);
  out.appendChild(el);
}
function render(){
  const scope = instance.renderVals();
  const active = document.activeElement;
  const wasInput = !!(active && active.localName === 'input' && root.contains(active));
  const caret = wasInput && 'selectionStart' in active ? active.selectionStart : null;
  const frag = document.createDocumentFragment();
  processNodes(tpl.content.childNodes, scope, frag);
  root.textContent = '';
  root.appendChild(frag);
  if (wasInput){
    const el = root.querySelector('input');
    if (el){ el.focus(); if (caret != null){ try { el.setSelectionRange(caret, caret); } catch (e) {} } }
  }
}
function schedule(){
  if (pending) return; pending = true;
  requestAnimationFrame(() => { pending = false; render(); });
}
function boot(){
  root = document.getElementById('dc-root');
  tpl = document.getElementById('dc-tpl');
  instance = new Component();
  render();
  if (instance.componentDidMount) instance.componentDidMount();
}


class Component extends DCLogic {
  state = { stage: 'IDEIA', machine: 'task', sel: 'active', q: '', grp: 'all', diagScale: 1 };

  componentDidMount(){
    const measure = () => {
      const el = document.querySelector('.gp-diag-wrap');
      if (!el) return;
      const w = el.clientWidth - 24; // minus padding allowance

      const style = isSel
        ? base + 'background:color-mix(in srgb, var(--status-info) 13%, var(--bg-surface));border:1px solid var(--status-info-line);box-shadow:0 0 0 1px var(--status-info-line), 0 0 26px -8px var(--status-info);'
        : base + 'background:var(--bg-surface);border:1px solid var(--border-default);box-shadow:var(--shadow-ambient);';
      return {
        label:s.key, tier:s.tier, gate:s.gate, hasGate:s.hasGate, notFirst:i>0,
        gateArrowColor: s.hasGate ? 'var(--status-warning)' : 'var(--border-bright)',
        labelColor: isSel ? 'var(--status-info)' : 'var(--fg-default)',
        boxStyle: style,
        onClick: () => this.setState({ stage: s.key }),
      };
    });
  }
  stageVM(){
    const s = this.SPINE.find(x => x.key === this.state.stage) || this.SPINE[0];
    const i = this.SPINE.indexOf(s);
    return {
      label:s.key, tier:s.tier, step:'estágio ' + (i+1) + '/10', what:s.what, cmds:s.cmds,
      hasGate: s.hasGate && !!s.gateFull, gateFull:s.gateFull,
      hasProduces: !!s.produces, produces:s.produces,
      hasDelegates: !!s.delegates, delegates:s.delegates,
    };
  }
  stepsVM(){
    return this.STEPS.map((st, i) => ({
      n:String(i+1), title:st.title, note:st.note,
      numCls: st.gate ? (st.gate==='HARD'||st.gate==='SPEC' ? 'error' : 'warn') : '',
      hasGate: !!st.gate, gate:st.gate,
      gateCls: (st.gate==='HARD'||st.gate==='SPEC') ? 's-error' : 's-warn',
      gateDot: (st.gate==='HARD'||st.gate==='SPEC') ? 't-error' : 't-warn',
    }));
  }
  loopVM(){
    return this.LOOP.map((l, i) => {
      const v = this.TVAR[l.tone];
      return { glyph:l.glyph, cmd:l.cmd, desc:l.desc, color:'var('+v+')', line:'var('+v+'-line)',
        hasGate:!!l.gate, gate:l.gate, notLast:i<this.LOOP.length-1 };
    });
  }
  machineVM(){
    const mk = this.state.machine;
    const m = this.MACHINES[mk];
    const sel = this.state.sel;
    const nodes = m.nodes.map(n => {
      const v = this.TVAR[n.tone];
      const isSel = n.id === sel;
      const st = 'position:absolute;left:'+n.x+'px;top:'+n.y+'px;width:'+n.w+'px;height:'+n.h+'px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:9px;cursor:pointer;transition:all 120ms var(--ease-out);'
        + 'background:color-mix(in srgb, var('+v+') '+(isSel?'20':'11')+'%, var(--bg-surface));'
        + 'border:1px solid ' + (isSel ? 'var('+v+')' : 'var('+v+'-line)') + ';'
        + (isSel ? 'box-shadow:0 0 0 1px var('+v+'), 0 0 26px -8px var('+v+');' : 'box-shadow:var(--shadow-ambient);');
      return { label:n.label, sub:n.sub||'', hasSub:!!n.sub, color:'var('+v+')', style:st, onEnter:() => this.setState({ sel:n.id }) };
    });
    const edges = m.edges.map(e => {
      const src = m.nodes.find(x => x.id === e.from);
      const v = this.TVAR[src ? src.tone : 'neutral'];
      const hl = e.from === sel;
      return { d:e.d, label:e.label,
        stroke: hl ? 'var('+v+')' : 'var(--border-bright)', w: hl ? '2.4' : '1.4',
        lx:e.lx, ly:e.ly, lcolor: hl ? 'var('+v+')' : 'var(--fg-subtle)' };
    });
    const node = m.nodes.find(x => x.id === sel) || m.nodes[0];
    const nv = this.TVAR[node.tone];
    const toneCls = { info:'s-active', success:'s-done', warning:'s-warn', error:'s-error', neutral:'s-pending' }[node.tone];
    const dotCls = { info:'t-active', success:'t-done', warning:'t-warn', error:'t-error', neutral:'t-pending' }[node.tone];
    return {
      nodes, edges,
      innerStyle: 'width:760px;height:300px;position:relative;flex:none;transform:scale('+(this.state.diagScale||1)+');transform-origin:center center;transition:transform 120ms var(--ease-out)',
      hasNote: !!m.note,
      note: m.note,
      noteStyle: 'position:absolute;left:'+m.noteXY[0]+'px;top:'+m.noteXY[1]+'px;transform:translateX(-50%);font-family:var(--font-mono);font-size:9.5px;color:var(--fg-subtle);white-space:nowrap;font-feature-settings:\'calt\' 0;text-align:center',
      sel: {
        label:node.label, chipCls:toneCls, dotCls:dotCls, desc:node.desc,
        outs:node.outs, hasOuts:node.outs.length>0, noOuts:node.outs.length===0,
        hasRule:!!node.rule, rule:node.rule,
      },
    };
  }
  cmdVM(){
    const q = (this.state.q||'').trim().toLowerCase();
    const grp = this.state.grp;
    const facets = [{ key:'all', label:'todos' }].concat(this.CMD_GROUPS.map(g => ({ key:g.key, label:g.label })))
      .map(f => ({ label:f.label, onCls: (grp===f.key || (grp==null&&f.key==='all')) ? 'on' : '', onClick:() => this.setState({ grp:f.key }) }));
    const match = (c) => !q || (c.name+' '+c.sig+' '+c.desc).toLowerCase().split(/\s+/).join(' ').includes(q) || q.split(/\s+/).every(t => (c.name+' '+c.sig+' '+c.desc).toLowerCase().includes(t));
    const groups = this.CMD_GROUPS
      .filter(g => grp==='all' || grp==null || g.key===grp)
      .map(g => ({ label:g.label, items: g.items.filter(match).map(c => ({ name:c.name, sig:c.sig, hasSig:!!c.sig, desc:c.desc })) }))
      .filter(g => g.items.length>0)
      .map(g => ({ ...g, count: g.items.length + (g.items.length===1?' comando':' comandos') }));
    const total = groups.reduce((a,g)=>a+g.items.length,0);
    return { q:this.state.q, onSearch:(e)=>this.setState({ q:e.target.value }), facets, groups, hasResults: total>0, noResults: total===0 };
  }

  renderVals(){
    const tabs = [{k:'task',l:'Task'},{k:'fase',l:'Fase'},{k:'plano',l:'Plano'}].map(t => ({
      label:t.l, onCls: this.state.machine===t.k ? 'on' : '',
      onClick: () => this.setState({ machine:t.k, sel:this.MACHINE_DEFAULT[t.k] }),
    }));
    return {
      entities:this.ENTITIES, concepts:this.CONCEPTS,
      spine:this.spineVM(), stage:this.stageVM(),
      steps:this.stepsVM(), loop:this.loopVM(),
      machineTabs:tabs, machine:this.machineVM(),
      canDo:this.CANDO, cannotDo:this.CANNOT,
      cmd:this.cmdVM(), delegation:this.DELEGATION,
    };
  }
}


if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
else boot();

</script>
